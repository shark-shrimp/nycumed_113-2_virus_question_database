<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>醫學系微免學國考測驗</title>
    <style>
        :root { --primary: #3498db; --success: #2ecc71; --danger: #e74c3c; --bg: #f4f7f6; --warning: #f39c12; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: #333; line-height: 1.6; padding: 15px; margin: 0; }
        .container { max-width: 700px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .screen { display: none; }
        .screen.active { display: block; }
        .btn { display: block; width: 100%; padding: 12px; margin-top: 15px; border: none; border-radius: 8px; font-size: 1.1em; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-outline { background: transparent; border: 2px solid var(--warning); color: var(--warning); margin-bottom: 20px; }
        .status-bar { display: flex; justify-content: space-between; color: #7f8c8d; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .question-text { font-size: 1.2em; font-weight: bold; margin-bottom: 20px; }
        .options { list-style: none; padding: 0; }
        .options li { background: #ecf0f1; margin-bottom: 10px; padding: 15px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
        .options li.selected { border-color: var(--primary); background: #e8f4fd; }
        .explanation-box { display: none; margin-top: 20px; padding: 15px; background: #f9f9f9; border-left: 5px solid var(--primary); border-radius: 8px; }
        .correct-border { border-left-color: var(--success); background: #f0fdf4; }
        .wrong-border { border-left-color: var(--danger); background: #fef2f2; }
        .wrong-item { background: #fff5f5; border: 1px solid #fed7d7; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen" class="screen active">
        <h1 style="text-align:center; color:#2c3e50;">🏥 醫師國考：微免病毒學測驗。</h1>
        <p style="text-align:center;">備註：此為100-115國考題，題號順序1-227是由最近考115年度--->100年度。</p>若正確答案及解釋仍以國考公告為主。同學若有疑問可google該題目，發現錯誤可通知老師或助教，祝大家國考病毒都滿分。</p>整理者：蔡明翰老師/郭玥婷助教。</p>題目解釋：Gemini 3 pro。</p>軟體開發：蔡明翰老師。</p>原始版本20260603 V1 </p>加密移除：鯊蝦。
        <p style="text-align:center;">共 227 題，測驗途中可隨時暫停並查看錯題。</p>
        <button class="btn btn-primary" onclick="startQuiz()">開始測驗</button>
    </div>

    <div id="quiz-screen" class="screen">
        <button class="btn btn-outline" onclick="pauseQuiz()">⏸ 暫停並查看目前錯題</button>
        <div class="status-bar">
            <span id="progress-text">進度：0/0</span>
            <span id="original-q-num">原始題號：0</span>
        </div>
        <div id="question-text" class="question-text"></div>
        <ul class="options" id="options-list"></ul>
        <button class="btn btn-primary" id="submit-btn" onclick="checkAnswer()">提交答案</button>
        <div id="explanation-box" class="explanation-box">
            <div id="result-title" style="font-size:1.2em;font-weight:bold;margin-bottom:10px;"></div>
            <div><strong>【解析】：</strong></div>
            <div id="explanation-text" style="margin-top:10px;"></div>
            <button class="btn btn-success" onclick="nextQuestion()">下一題</button>
        </div>
    </div>

    <div id="pause-screen" class="screen">
        <h2 style="text-align:center; color:var(--warning);">⏸ 測驗已暫停</h2>
        <p style="text-align:center; font-size:1.2em; font-weight:bold;" id="pause-progress"></p>
        <button class="btn btn-success" onclick="resumeQuiz()">▶️ 繼續測驗</button>
        <hr style="margin: 20px 0;">
        <div id="current-wrong-list"></div>
    </div>

    <div id="result-screen" class="screen">
        <h1 style="text-align:center;">📊 測驗完成！</h1>
        <h2 id="final-score" style="text-align:center;"></h2>
        <div id="wrong-answers-list" style="margin-top:20px;"></div>
        <button class="btn btn-primary" onclick="location.reload()">重新測驗</button>
    </div>
</div>

<script>
    const isRandom = true;
    const originalData = [{"originalId":1,"question":"關於抗病毒藥物的敘述，下列何者最適當？","options":["A. 高效抗反轉錄病毒療法（Highly Active Antiretroviral Therapy, HAART）通常使用單一藥物進行治療，主要是為了減少副作用","B. C 型肝炎病毒（Hepatitis C virus, HCV）抗病毒藥物可有效清除體內病毒，而其成分皆針對病毒 RNA 聚合酶（RNA polymerase）","C. 抗病毒藥物只能對單一種病毒有效，無法用於治療不同種類的病毒感染","D. Zidovudine（Retrovir）是一種反轉錄酶（reverse transcriptase）抑制劑，可用來針對人類免疫缺乏病毒"],"correctIndex":3,"explanation":"關於抗病毒藥物的敘述，下列何者最適當？<br>•\tA. 錯誤： 高效抗反轉錄病毒療法（HAART，俗稱雞尾酒療法）是使用三種或以上不同機轉的藥物進行聯合治療，主要是為了避免單一藥物使用時病毒迅速產生「抗藥性突變」，而非使用單一藥物 。 <br>•\tB. 錯誤： C肝的直接抗病毒藥物（DAAs）種類繁多，除了針對 RNA 聚合酶（NS5B 抑制劑，如 Sofosbuvir）之外，還包含針對蛋白酶（NS3/4A 抑制劑）及 NS5A 蛋白的成分，並非「皆針對」RNA 聚合酶 。 <br>•\tC. 錯誤： 有些廣效性抗病毒藥物對多種病毒都有效，例如雷巴威林（Ribavirin）可用於治療 C 型肝炎、呼吸道融合病毒（RSV）以及拉薩熱等不同病毒 。 <br>•\tD. 正確： Zidovudine（AZT）是一種核苷酸類反轉錄酶抑制劑（NRTI），它能與正常的核苷酸競爭，從而阻斷人類免疫缺乏病毒（HIV）的反轉錄複製過程 。 <br>•\t正確答案：D"},{"originalId":2,"question":"下列關於各類型肝炎病毒的敘述中，何者最適當？","options":["A. C 型肝炎病毒（HCV）目前有有效的疫苗可預防，並且可以通過食物和水傳播","B. D 型肝炎病毒（HDV）無法獨立複製，必須依賴 B 型肝炎病毒（HBV），並且主要通過血液與性接觸傳播","C. A 型肝炎病毒（HAV）主要通過血液與性接觸傳播，並且目前有有效疫苗可預防","D. 除 D 型肝炎病毒（HDV）基因體屬於 DNA 外，其他皆屬於 RNA 病毒"],"correctIndex":1,"explanation":"下列關於各類型肝炎病毒的敘述中，何者最適當？<br>•\tA. 錯誤： C 型肝炎病毒（HCV）目前沒有有效的疫苗可供預防，且它主要透過血液傳播，而非通過食物和水（糞口傳播） 。 <br>•\tB. 正確： D 型肝炎病毒（HDV）是一種缺陷病毒，無法獨立複製，必須依賴 B 型肝炎病毒的外套膜（HBsAg）才能組裝成具感染性的病毒顆粒，其傳播途徑也與 B 肝相同（血液與性接觸） 。 <br>•\tC. 錯誤： A 型肝炎病毒（HAV）主要通過糞口途徑（受污染的食物和水）傳播，而非血液傳播 。 <br>•\tD. 錯誤： 在所有常見肝炎病毒中，唯有 B 型肝炎病毒（HBV） 屬於去氧核醣核酸（DNA）病毒，其他（HAV、HCV、HDV、HEV）皆屬於 RNA 病毒 。 <br>•\t正確答案：B"},{"originalId":3,"question":"下列何種情況會使患者更容易受到伊科病毒（echovirus）感染呼吸道 and 胃腸道而引起嚴重疾病？","options":["A. 低伽瑪球蛋白血症（hypogammaglobulinemia）","B. 鐮狀細胞貧血（sickle cell anemia）","C. 發炎性腸道疾病（inflammatory bowel disease）","D. 消化性潰瘍（peptic ulcer）"],"correctIndex":0,"explanation":"下列何種情況會使患者更容易受到伊科病毒（echovirus）感染呼吸道 and 胃腸道而引起嚴重疾病？<br>•\tA. 正確： 伊科病毒（Echovirus）屬於小 RNA 病毒科的腸病毒屬 。人體防禦腸病毒全身性擴散主要依賴體液免疫（抗體），因此低伽瑪球蛋白血症（缺乏抗體）的患者極易受到此類病毒的嚴重感染，甚至引發慢性中樞神經系統重症 。 <br>•\tB、C、D. 錯誤： 鐮狀細胞貧血容易增加 Parvovirus B19 或莢膜細菌感染風險 ；發炎性腸道疾病與消化性潰瘍主要與消化道局部黏膜病變有關 ，皆非伊科病毒嚴重全身感染的特異性危險因子。 <br>•\t正確答案：A"},{"originalId":4,"question":"有一種正股 RNA 病毒（positive-sense RNA virus）具有二十面體病毒殼體（capsid），無套膜（envelope），經糞口傳播，在罕見病例中會引起癱瘓。此病毒屬於那一病毒科？","options":["A. 腺病毒科（Adenoviridae）","B. 小 RNA 病毒科（Picornaviridae）","C. 呼腸孤病毒科（Reoviridae）","D. 披衣病毒科（Togaviridae）"],"correctIndex":1,"explanation":"有一種正股 RNA 病毒具有二十面體病毒殼體，無套膜，經糞口傳播，在罕見病例中會引起癱瘓。此病毒屬於那一病毒科？<br>•\tA. 錯誤： 腺病毒科（Adenoviridae）屬於雙股 DNA 病毒 。 <br>•\tB. 正確： 題幹描述的正是小兒麻痺病毒（Poliovirus） 的典型特徵：正股單股 RNA、無套膜、二十面體衣殼、糞口傳播、罕見引起肢體麻痺（癱瘓）。Poliovirus 屬於小 RNA 病毒科（Picornaviridae） 。 <br>•\tC. 錯誤： 呼腸孤病毒科（Reoviridae，如輪狀病毒）屬於雙股 RNA 病毒 。 <br>•\tD. 錯誤： 披衣病毒科（Togaviridae，如德國麻疹病毒）是「有套膜」的病毒，主要透過呼吸道飛沫傳播 。 <br>•\t正確答案：B"},{"originalId":5,"question":"第一型干擾素（interferon）α及β做為抗病毒藥物，最主要是抑制病毒複製的下列何項步驟？","options":["A. 病毒的入侵","B. 病毒轉錄","C. 病毒蛋白質合成","D. 病毒的組裝"],"correctIndex":2,"explanation":"第一型干擾素（interferon）α及β做為抗病毒藥物，最主要是抑制病毒複製的下列何項步驟？<br>•\tA、B、D. 錯誤： 雖然干擾素可以引導全方位的抗病毒狀態，但其最經典、最核心的分子機制不是針對病毒的參入或組裝 。 <br>•\tC. 正確： 第一型干擾素與細胞受體結合後，會活化多種抗病毒蛋白質，其中最重要的機制是活化 PKR 途徑，使蛋白質轉譯起始因子 eIF-2α 磷酸化，從而強烈阻斷病毒蛋白質的合成（轉譯） 。 <br>•\t正確答案：C"},{"originalId":6,"question":"有關病毒感染與疾病的關係，下列何者錯誤？","options":["A. human papillomavirus 與毛樣白斑病（hairy leukoplakia）","B. human herpesvirus 8 與原發性體液淋巴瘤（primary effusion lymphoma）","C. Epstein-Barr virus 與淋巴結外鼻腔型自然殺手／T 細胞淋巴瘤（extranodal nasal type NK/T-cell lymphoma）","D. JC polyomavirus 與進行性多灶性白質腦病（progressive multifocal leukoencephalopathy）"],"correctIndex":0,"explanation":"有關病毒感染與疾病的關係，下列何者錯誤？<br>•\tA. 錯誤（本題選A）： 口腔毛樣白斑病（Hairy leukoplakia）好發於免疫缺乏（如愛滋病）患者，是由 EB 病毒（Epstein-Barr virus, EBV） 引起的，而非人類乳突病毒（HPV） 。 <br>•\tB. 正確： 人類疱疹病毒第八型（HHV-8）與原發性體液淋巴瘤（PEL）及卡波西氏肉瘤高度相關 。 <br>•\tC. 正確： 淋巴結外鼻腔型 NK/T 細胞淋巴瘤是與 EB 病毒（EBV）高度密切相關的惡性腫瘤 。 <br>•\tD. 正確： JC 多瘤病毒（JCV）會在免疫抑制患者體內活化，破壞少突神經膠細胞，引發進行性多灶性白質腦病（PML） 。 <br>•\t正確答案：A"},{"originalId":7,"question":"下列有關病毒複製之敘述，何者最不適當？","options":["A. 病毒的基因體複製是在病毒結構蛋白合成之後才開始進行","B. 所有病毒複製過程中均需合成 RNA","C. B 型肝炎病毒之外套膜來自寄主細胞之細胞膜","D. 在隱蝕期（eclipse period）時可測到極少量之感染性病毒"],"correctIndex":0,"explanation":"下列有關病毒複製之敘述，何者最不適當？（本題有雙答案爭議）<br>•\tA. 錯誤（可選）： 病毒生命週期中，通常是早期蛋白（如聚合酶）先合成，接著進行基因體複製，最後才大量合成晚期結構蛋白。因此「基因體複製是在結構蛋白合成之後才開始進行」在生物學序位上是不適當的 。 <br>•\tB. 正確： 所有 DNA 或 RNA 病毒在複製過程中，都需要合成 mRNA 來轉譯成蛋白質，因此都需要合成 RNA 。 <br>•\tC. 錯誤（可選）： B 型肝炎病毒的外套膜主要來自寄主細胞的內質網和高基氏體膜系統，而非直接來自「細胞膜（表面膜）」 。 <br>•\tD. 錯誤（可選）： 隱蝕期（Eclipse period） 的嚴格定義是病毒脫殼後，直到第一個具有完整感染力的子代病毒顆粒組裝完成前的這段時期。在此期間，細胞內是完全測不到任何具有感染性的病毒顆粒的 。 <br>•\t<br>o\t國考分析說明： 本題在醫學國考中屬於瑕疵爭議題。定義上 A、C、D 均有錯誤。若以最嚴謹的微生物學概念來看，D 的定義錯誤最為絕對（隱蝕期為零，而非極少量） ；但若依據某些課本的廣義敘述，官方有時會將 A 或是 D 判定為主要考點。"},{"originalId":8,"question":"下列有關致癌性病毒（oncogenic virus）的敘述，何者最適當？","options":["A. 多瘤病毒（polyomavirus, SV40）之 T 抗原可與寄主細胞中之腫瘤抑制蛋白結合","B. 多瘤病毒（polyomavirus, SV40）可在人類形成腫瘤","C. 乳突瘤病毒（papillomavirus）之 E7 蛋白可與寄主細胞中之 p53 蛋白結合","D. 腺病毒（adenovirus）之 E1B 可與寄主細胞中之 p105RB 蛋白結合"],"correctIndex":0,"explanation":"下列有關致癌性病毒（oncogenic virus）的敘述，何者最適當？<br>•\tA. 正確： 多瘤病毒（如 SV40）的大 T 抗原（Large T antigen）能同時結合並去活化宿主細胞中的 p53 和 pRb（腫瘤抑制蛋白），從而引發細胞失控轉型 。 <br>•\tB. 錯誤： SV40 屬於猴多瘤病毒，主要在齧齒類動物中致癌，臨床上並非在人類形成腫瘤的常見致癌病毒 。 <br>•\tC. 錯誤： 乳突瘤病毒（HPV）是 E6 蛋白與 p53 結合 ，而 E7 蛋白才是與 pRb 結合 。 <br>•\tD. 錯誤： 腺病毒（Adenovirus）是 E1A 蛋白與 pRb 結合 ，而 E1B 蛋白才是與 p53 結合 。 <br>•\t正確答案：A"},{"originalId":9,"question":"下列那一個肝炎病毒尚未有疫苗可預防其感染，但已經可以經由抗病毒藥物治療病患使其痊癒？","options":["A. HAV","B. HBV","C. HCV","D. HDV"],"correctIndex":2,"explanation":"下列那一個肝炎病毒尚未有疫苗可預防其感染，但已經可以經由抗病毒藥物治療病患使其痊癒？<br>•\tA. 錯誤： A 肝（HAV）有非常高效的死毒疫苗可以預防，且通常為急性自限性感染，無須特效藥即可自行痊癒 。 <br>•\tB. 錯誤： B 肝（HBV）有疫苗可預防（常規三劑施打） 。目前的抗病毒藥物只能長期抑制病毒複製，極難達到完全清除（表面抗原陰轉痊癒） 。 <br>•\tC. 正確： C 肝（HCV）目前沒有疫苗，但近年發展出的口服直接抗病毒藥物（DAAs）可以達到 95% 以上的病毒完全根除（SVR），在臨床上被定義為「痊癒」 。 <br>•\tD. 錯誤： D 肝（HDV）可透過施打 B 肝疫苗來間接預防，目前缺乏高治癒率的特定特效藥 。 <br>•\t正確答案：C"},{"originalId":10,"question":"有關流行性感冒病毒蛋白 neuraminidase（NA）的敘述，下列何者最不適當？","options":["A. 為一種酵素，能幫助病毒離開宿主細胞","B. A 型流感病毒具有多種 NA 亞型","C. 為抗病毒藥物金剛烷胺類（amantadine）主要抑制對象","D. 在病毒外套膜上形成四倍體（tetramer）"],"correctIndex":2,"explanation":"有關流行性感冒病毒蛋白 neuraminidase（NA）的敘述，下列何者最不適當？<br>•\tA. 正確： NA（神經胺酸酶）能切斷宿主細胞表面的唾液酸（Sialic acid），幫助新組裝的子代病毒顆粒從小組中釋放並離開細胞 。 <br>•\tB. 正確： A 型流感病毒的 NA 擁有多種亞型（如 N1 ~ N11） 。 <br>•\tC. 錯誤（本題選C）： 金剛烷胺類藥物（Amantadine）主要抑制的是流感病毒的 M2 離子通道蛋白（阻斷脫殼步驟），而非 NA 。抑制 NA 的藥物是克流感（Oseltamivir）與瑞樂沙（Zanamivir）。 <br>•\tD. 正確： NA 蛋白質在病毒外套膜上是以四聚體（Tetramer）的結構形式存在 。 <br>•\t正確答案：C"},{"originalId":11,"question":"有關輪狀病毒（rotaviruses）的特色，下列敘述何者最不適當？","options":["A. 是一個雙股 RNA（double-stranded RNA）病毒","B. 被蛋白酶降解後形成的 intermediate subviral particle（ISVP）不具感染力","C. 基因體（genome）由多段的 RNA 組成","D. 对腸胃道環境的耐受性很高"],"correctIndex":1,"explanation":"有關輪狀病毒（rotaviruses）的特色，下列敘述何者最不適當？<br>•\tA. 正確： 輪狀病毒屬於呼腸孤病毒科（Reoviridae），具有雙股 RNA 基因體 。 <br>•\tB. 錯誤（本題選B）： 輪狀病毒在腸道中經胰蛋白酶（trypsin）消化剪切外殼後，會形成中介次病毒顆粒（ISVP），此時其感染力會大幅增強，這是病毒成功入侵細胞的關鍵，而非「不具感染力」 。 <br>•\tC. 正確： 輪狀病毒的基因體是由 11 個片段組成的片段 RNA（Segmented RNA） 。 <br>•\tD. 正確： 由於不具外套膜且結構穩固，它對胃酸、膽汁等腸胃道環境耐受性極高 。 <br>•\t正確答案：B"},{"originalId":12,"question":"關於麻疹（Measles）的敘述，下列何者最適當？","options":["A. 其致病原麻疹病毒屬黏液病毒（Myxovirus）","B. 麻疹病毒之基因體為八段單股的 RNA","C. 麻疹病毒具有多種血清型","D. 病毒感染時，體內 T 細胞會攻擊被病毒感染的上皮細胞，造成病人身上的大塊紅斑（maculopapular measles rash）"],"correctIndex":3,"explanation":"關於麻疹（Measles）的敘述，下列何者最適當？<br>•\tA. 錯誤： 麻疹病毒屬於副黏液病毒科（Paramyxoviridae），而非正黏液病毒科 。 <br>•\tB. 錯誤： 麻疹病毒的基因體是單段、不分段的負股單股 RNA（流感病毒才是分段的） 。 <br>•\tC. 錯誤： 麻疹病毒只有一種穩定的血清型，因此得過一次或施打 MMR 疫苗即可終身免疫 。 <br>•\tD. 正確： 麻疹典型的紅斑丘疹（rash）並非病毒直接殺死細胞，而是人體特異性 T 細胞免疫反應攻擊微血管內皮及被感染的上皮細胞所引發的免疫病理反應 。 <br>•\t正確答案：D"},{"originalId":13,"question":"在 2015～2016 年間爆發茲卡（Zika）病毒大流行，下列有關該病毒的敘述何者最不適當？","options":["A. 猴子是茲卡病毒的宿主之一","B. 不需要蚊子的媒介，病毒可以直接人傳人","C. 該病毒的遺傳基因為負股(-)RNA","D. 懷孕婦女被茲卡病毒感染會造成胎兒小腦症（microcephaly）"],"correctIndex":2,"explanation":"在 2015～2016 年間爆發茲卡（Zika）病毒大流行，下列有關該病毒的敘述何者最不適當？<br>•\tA. 正確： 靈長類（如猴子）是茲卡病毒在自然界中的主要儲存宿主之一 。 <br>•\tB. 正確： 除了主要透過斑蚊叮咬傳播外，茲卡病毒也能透過性接觸或母嬰垂直感染直接人傳人 。 <br>•\tC. 錯誤（本題選C）： 茲卡病毒屬於黃病毒科（Flaviviridae），其遺傳基因為正股（+）單股 RNA，而非負股 。 <br>•\tD. 正確： 孕婦若感染茲卡病毒，病毒會侵犯胎兒的中樞神經系統，導致嚴重的先天性小頭畸形（Microcephaly） 。 <br>•\t正確答案：C"},{"originalId":14,"question":"下列有關鼻咽癌的敘述，何者錯誤？","options":["A. 與高風險人類乳突病毒（high-risk human papillomavirus, HR-HPV）有關","B. 臺灣與中國東南方的盛行率高於美國及歐洲","C. 形態學上主要分為角化（keratinizing）、非角化（nonkeratinizing）或類基底（basaloid）鱗狀細胞癌","D. 頸部腫塊、聽力障礙或閉塞感、痰中或鼻涕中帶血、鼻塞、頭痛是常見症狀"],"correctIndex":0,"explanation":"下列有關鼻咽癌的敘述，何者錯誤？<br>•\tA. 錯誤（本題選A）： 鼻咽癌（NPC）與 EB 病毒（Epstein-Barr virus, EBV） 具有強烈的因果關係 ，而非 HPV（HPV 主要與子宮頸癌、口咽癌/扁桃腺癌相關） 。 <br>•\tB、C、D. 正確： 鼻咽癌高發於華南及台灣一帶 ；病理分類包括非角化鱗狀細胞癌等 ；臨床常見單側耳鳴、頸部腫塊與鼻涕帶血等症狀 。 <br>•\t正確答案：A"},{"originalId":15,"question":"下列有關病毒感染細胞之病變機制，何者最適當？","options":["A. 単純疱疹病毒（herpes simplex virus）感染之細胞核內可形成 Cowdry type A 包涵體（Cowdry type A inclusion body）","B. 腸病毒（enterovirus）感染之細胞會發生細胞融合（syncytia）現象","C. 德國麻疹病毒（rubella virus）感染之細胞質會形成 Negri 包涵體（Negri body）","D. 腺病毒（adenovirus）主要是透過與細胞膜的融合入侵細胞"],"correctIndex":0,"explanation":"下列有關病毒感染細胞之病變機制，何者最適當？<br>•\tA. 正確： 單純疱疹病毒（HSV）感染細胞後，會在細胞核內留下嗜酸性的包涵體，稱為 Cowdry type A 包涵體 。 <br>•\tB. 錯誤： 腸病毒（Enterovirus）沒有外套膜，不具備融合蛋白，感染細胞時會引發細胞裂解，但不會引起細胞融合（syncytia） 。 <br>•\tC. 錯誤： Negri 包涵體是狂犬病病毒（Rabies virus） 感染神經細胞時在細胞質中形成的特異性結構 。 <br>•\tD. 錯誤： 腺病毒（Adenovirus）為無外套膜病毒，主要透過「受體介導的內吞作用（receptor-mediated endocytosis）」入侵細胞，無法與細胞膜直接融合 。 <br>•\t正確答案：A"},{"originalId":16,"question":"抗流感病毒（influenza virus）藥物金剛烷胺（amantadine），其主要作用是抑制該病毒複製的何項步驟？","options":["A. 接觸（attachment）","B. 穿過細胞膜進入細胞及解散外殼","C. 病毒轉錄","D. 蛋白質合成"],"correctIndex":1,"explanation":"抗流感病毒藥物金剛烷胺（amantadine），其主要作用是抑制該病毒複製的何項步驟？<br>•\tB. 正確： Amantadine 能阻斷 A 型流感病毒的 M2 離子通道，防止宿主內吞體（endosome）中的氫離子進入病毒顆粒。若無法酸化，病毒核衣殼便無法與基質蛋白解離，會直接阻斷病毒的「解散外殼（脫殼，uncoating）」步驟 。 <br>•\t正確答案：B"},{"originalId":17,"question":"下列那一個肝炎病毒感染最有可能在一般人造成約 1%～2%的致死率，但在懷孕婦女則可能有高達 20%的致死率？","options":["A. Hepatitis A virus","B. Hepatitis C virus","C. Hepatitis D virus","D. Hepatitis E virus"],"correctIndex":3,"explanation":"下列那一個肝炎病毒感染最有可能在一般人造成約 1%～2%的致死率，但在懷孕婦女則可能有高達 20%的致死率？<br>•\tD. 正確： E 型肝炎病毒（HEV） 的一大核心臨床考點為：一般人感染多為急性自限性，但孕婦（尤其是懷孕第三期） 感染後極易演變為暴發性肝衰竭，致死率高達 15% - 20% 。 <br>•\t正確答案：D"},{"originalId":18,"question":"有關水痘病毒的敘述，下列何者最不適當？","options":["A. 水痘病毒會復發（reactivation），但終身只會得到一次帶狀疱疹","B. 有治療水痘病毒感染的抗病毒藥物","C. 有水痘病毒疫苗","D. 潛伏在神經細胞中"],"correctIndex":0,"explanation":"有關水痘病毒的敘述，下列何者最不適當？<br>•\tA. 錯誤（本題選A）： 雖然多數人一生只發作一次帶狀疱疹，但在高齡、免疫力低下或特定臨床情況下，帶狀疱疹是可以多次復發（再活化）的，並非終身只能得到一次 。 <br>•\tB、C、D. 正確： 水痘病毒（VZV）有特效藥 Acyclovir 治療 ；有常規減毒活疫苗可接種 ；初次感染後會潛伏在感觉神经元（背根神經節）中 。 <br>•\t正確答案：A"},{"originalId":19,"question":"有關腸病毒（enterovirus）的敘述，何者最不適當？","options":["A. 腸病毒只在腸胃道細胞複製","B. 屬於小 RNA 病毒科（Picornaviridae）","C. 糞口為主要傳染管道","D. 大部分的腸病毒感染不會造成如肢體麻痺（paralytic disease）等重症"],"correctIndex":0,"explanation":"有關腸病毒（enterovirus）的敘述，何者最不適當？<br>•\tA. 錯誤（本題選A）： 腸病毒雖然初次在口咽及腸道黏膜複製並由糞便排出，但它們隨後會進入血液引發病毒血症，擴散至全身，並在目標器官（如中樞神經系統、心臟、皮膚等）大量複製 。因此「只在腸胃道細胞複製」是明顯錯誤的描述 。 <br>•\t正確答案：A"},{"originalId":20,"question":"關於狂犬病病毒（Rabies virus）的敘述，下列何者最適當？","options":["A. 感染後，病毒不會在肌肉細胞複製","B. 被帶有狂犬病病毒的狗咬傷後立刻施打抗病毒免疫球蛋白，再配合疫苗施打，可有效防止狂犬病的發生","C. 狂犬病病毒的基因體為環狀 DNA","D. 犬類是狂犬病病毒的唯一宿主"],"correctIndex":1,"explanation":"關於狂犬病病毒（Rabies virus）的敘述，下列何者最適當？<br>•\tA. 錯誤： 被動物咬傷後，狂犬病毒會先在傷口附近的肌肉細胞內局部複製，隨後才與乙醯膽鹼受體結合進入神經末梢 。 <br>•\tB. 正確： 狂犬病潛伏期較長（病毒沿著軸突向中樞神經極緩慢移動），因此被咬傷後立刻進行暴露後預防（PEP），同時施打特異性免疫球蛋白（HRIG）與常規五劑疫苗，可極高成功率防止發病 。 <br>•\tC. 錯誤： 狂犬病毒屬於彈狀病毒科，是單股負股 RNA 病毒，外觀呈子彈形 。 <br>•\tD. 錯誤： 狂犬病毒可以感染所有的溫血哺乳動物，野生動物如蝙蝠、狐狸等都是大自然中的重要宿主 。 <br>•\t正確答案：B"},{"originalId":21,"question":"關於 B 型肝炎病毒（Hepatitis B virus），下列敘述何者最不適當？","options":["A. HBeAg 是病毒包膜醣蛋白（envelope glycoproteins）","B. HBcAg 是病毒核衣殼蛋白（nucleocapsid protein）","C. HBx 有轉錄反式活化因子（transcriptional transactivator）功能","D. HBV polymerase（Pol）具有反轉錄酶活性（reverse transcriptase activity）"],"correctIndex":0,"explanation":"關於 B 型肝炎病毒（Hepatitis B virus），下列敘述何者最不適當？<br>•\tA. 錯誤（本題選A）： HBeAg 是核心蛋白基因編碼並經剪切後分泌到細胞外的可溶性抗原，它不是包膜醣蛋白（HBV 的包膜醣蛋白是 HBsAg，即表面抗原） 。 <br>•\tB、C、D. 正確： HBcAg 組成核心殼體 ；HBx 有反式活化功能，具備致癌潛力 ；HBV 複製過程中需要利用前基因體 RNA 反轉錄成 DNA，其聚合酶確實有反轉錄酶活性 。 <br>•\t正確答案：A"},{"originalId":22,"question":"病毒感染時最常利用下列何種蛋白質進入細胞內？","options":["A. 基質蛋白（matrix protein）","B. 蛋白水解酶（protease）","C. 醣蛋白（glycoprotein）","D. 核心蛋白（core protein）"],"correctIndex":2,"explanation":"病毒感染時最常利用下列何種蛋白質進入細胞內？<br>•\tC. 正確： 對於有外套膜的病毒來說，突出身體表面的套膜醣蛋白（Envelope Glycoprotein，如流感的 HA、HIV 的 gp120） 是與宿主細胞表面特異性受體結合並介導病毒進入細胞的核心分子 。 <br>•\t正確答案：C"},{"originalId":23,"question":"下列何種病毒感染人類引發疾病後，比較不會直接造成細胞增生形成腫瘤？","options":["A. B型肝炎病毒（HBV）","B. 人類嗜淋巴球病毒一型（HTLV-1）","C. 人類乳突瘤病毒（HPV）","D. 人類免疫缺陷病毒（HIV）"],"correctIndex":3,"explanation":"下列何種病毒感染人類引發疾病後，比較不會直接造成細胞增生形成腫瘤？<br>•\tD. 正確： HIV 主要是透過破壞 CD4+ T 細胞導致後天免疫缺乏（愛滋病） 。雖然愛滋病人容易罹患卡波西氏肉瘤（由 HHV-8 引起）或淋巴瘤（由 EBV 引起），但 HIV 病毒本身「不會直接」促使宿主細胞惡性增生，它是間接致癌 。相反地，HBV、HTLV-1、HPV 都擁有直接干擾細胞週期調控、直接誘導細胞癌變增生的特定基因產物 。 <br>•\t正確答案：D"},{"originalId":24,"question":"郵輪上的一群人出現了上吐下瀉的症狀，未經治療，症狀在2～3天都獲得緩解。他們最可能感染了下列何種病毒？","options":["A. 腺病毒40型（Adenovirus 40）","B. 諾羅病毒（Norovirus）","C. 輪狀病毒（Rotavirus group A）","D. 腸病毒D68（Enterovirus D68）"],"correctIndex":1,"explanation":"郵輪上的一群人出現了上吐下瀉的症狀，未經治療，症狀在2～3天都獲得緩解。他們最可能感染了下列何種病毒？<br>•\tB. 正確： 諾羅病毒（Norovirus） 是引起成人與兒童集體腹瀉（尤其是郵輪、學校、軍營等人口密集封閉空間）最常見的罪魁禍首，其臨床特點為傳染力極強、病程短（2-3天即可自行緩解） 。 <br>•\t正確答案：B"},{"originalId":25,"question":"下列臨床症狀，何者與麻疹病毒感染較無關？","options":["A. 腦炎（encephalitis）","B. 畏光（photophobia）","C. 口腔出現科氏斑點（Koplik spots）","D. 進行性多灶性白質腦病（Progressive multifocal leukoencephalopathy, PML）"],"correctIndex":3,"explanation":"下列臨床症狀，何者與麻疹病毒感染較無關？<br>•\tD. 正確（本題選D）： 進行性多灶性白質腦病（PML）是由 JC 多瘤病毒（JCV） 在免疫抑制患者體內活化引起的 。麻疹病毒所引發的遠期嚴重神經系統併發症是亞急性硬化全腦炎（SSPE），而非 PML 。 <br>•\tA、B、C. 錯誤： 麻疹典型症狀包含 3C（咳嗽、鼻炎、結膜炎導致畏光） ，口腔黏膜有科氏斑（Koplik spots） ，且能引起急性腦炎 。 <br>•\t正確答案：D"},{"originalId":26,"question":"有關人類中東呼吸症候群（MERS）病毒，下列敘述何者最適當？","options":["A. 被感染的病人會產生出血及休克之病徵","B. 遺傳基因為正股(+)RNA","C. 主要是以果子狸為中間宿主而傳播","D. 喜歡在室溫25 ℃ 複製生長"],"correctIndex":1,"explanation":"有關人類中東呼吸症候群（MERS）病毒，下列敘述何者最適當？<br>•\tA. 錯誤： MERS 主要表現為嚴重急性呼吸道疾病（肺炎、呼吸衰竭）與腎衰竭，而非主要表現為出血與休克（那是伊波拉或登革出血熱的特徵） 。 <br>•\tB. 正確： MERS-CoV 屬於冠狀病毒科，其遺傳基因為正股（+）單股 RNA 。 <br>•\tC. 錯誤： MERS 的主要中間傳播宿主是單峰駱駝（果子狸是 2003 年 SARS 的中間宿主） 。 <br>•\tD. 錯誤： 作為人類致病冠狀病毒，其最適合在人體體溫（37 ℃）環境下複製生長 。 <br>•\t正確答案：B"},{"originalId":27,"question":"有關人類免疫缺陷病毒（HIV）的敘述，下列何者最不適當？","options":["A. 病毒之蛋白酶（protease）主要作用於宿主細胞蛋白質","B. 病毒Rev蛋白質可調控病毒mRNA轉送至細胞質","C. 病毒Tat蛋白質為一極強的轉活化因子（transactivator）","D. 在複製的早期會產生多種剪接（spliced）的mRNA"],"correctIndex":0,"explanation":"有關人類免疫缺陷病毒（HIV）的敘述，下列何者最不適當？<br>•\tA. 錯誤（本題選A）： HIV 的蛋白酶（Protease）主要是用來切斷病毒自身合成的 Gag-Pol 多肽前驅物，使其成熟為具有功能性的病毒核心結構蛋白與酶，並非主要作用於「宿主細胞蛋白質」 。 <br>•\tB、C、D. 正確： HIV 在複製早期會產生多種完全剪接的 mRNA ；Tat 蛋白質為強烈的轉錄反式活化因子 ；Rev 蛋白質調控未剪接的病毒 mRNA 運送出核 。 <br>•\t正確答案：A"},{"originalId":28,"question":"造成病毒性肺炎的病原，下列何者最不常見？","options":["A. 輪狀病毒（rotavirus）","B. 副流感病毒（parainfluenza virus）","C. 流感病毒（influenza virus）","D. 腺病毒（adenovirus）"],"correctIndex":0,"explanation":"造成病毒性肺炎的病原，下列何者最不常見？<br>•\tA. 正確（本題選A）： 輪狀病毒（Rotavirus） 是高度專一性侵犯腸道上皮細胞、引發嬰兒腸胃炎（水瀉） 的病原 ，極少侵犯呼吸道，因此絕對不是造成肺炎的常見病毒。副流感、流感及腺病毒皆為非常經典的呼吸道致病原 。 <br>•\t正確答案：A"},{"originalId":29,"question":"下列有關普里昂（prion）的敘述，何者最不適當？","options":["A. 病人被普里昂感染只能在腦部測到其存在","B. 一般對抗病毒的化學及物理方法無法抑制普里昂的活性","C. 普里昂感染之病人腦內會產生海綿狀腦病變","D. 普里昂是以蛋白質的形式進行感染"],"correctIndex":0,"explanation":"下列有關普里昂（prion）的敘述，何者最不適當？<br>•\tA. 錯誤（本題選A）： 雖然主要病變在中樞神經，但在庫賈氏病或新型庫賈氏病患者的扁桃腺、脾臟、淋巴結等周邊淋巴組織中，同樣可以偵測到異常普里昂蛋白（PrP^Sc）的聚集，並非「只能在腦部測到」 。 <br>•\tB、C、D. 正確： Prion 缺乏核酸，常規物理/化學消毒法難以破壞 ；會造成腦組織海綿狀病變 ；完全以蛋白質形式進行感染 。 <br>•\t正確答案：A"},{"originalId":30,"question":"有關 parvovirus B19 的敘述，下列何者最適當？","options":["A. 為雙股 DNA 病毒","B. 主要傳播途徑為糞口傳染","C. 感染並引起紅血球的先驅細胞（erythroid precursor）溶解","D. 感染兒童時，造成嬰兒玫瑰疹"],"correctIndex":2,"explanation":"有關 parvovirus B19 的敘述，下列何者最適當？<br>•\tA. 錯誤： Parvovirus B19 屬於細小病毒科，是單股 DNA 病毒，而非雙股 。 <br>•\tB. 錯誤： 主要傳播途徑是呼吸道飛沫或分泌物傳播，非糞口傳染 。 <br>•\tC. 正確： Parvovirus B19 會特異性地結合紅血球先驅細胞表面的 P 抗原並進入細胞複製，引發紅血球先驅細胞溶解，在特定溶血性貧血患者身上可引發危險的急性再生不良性貧血危機 。 <br>•\tD. 錯誤： 兒童感染會造成傳染性紅斑（俗稱巴掌臉） ；嬰兒玫瑰疹是由 HHV-6 或 HHV-7 引起的。 <br>•\t正確答案：C"},{"originalId":31,"question":"藉由血清學的方式無法檢驗出正常的 prion（PrPC）與異常的 prion（PrPSC）的差異。一種新的檢驗方式稱作 “real-time quaking-induced conversion（RT-QuIC）”，可以快速檢驗出檢體內是否含有 PrPSC。這是利用 prion 的那一種特性？","options":["A. PrPC會聚集成纖絲（prion fibril）","B. PrPSC會聚集成纖絲（prion fibril）","C. PrPC會將 PrPSC轉換成 PrPC","D. PrPSC的蛋白質半衰期較 PrPC短"],"correctIndex":1,"explanation":"RT-QuIC（real-time quaking-induced conversion）可以快速檢驗出檢體內是否含有 PrPSC。這是利用 prion 的那一種特性？<br>•\tB. 正確： RT-QuIC 技術的原理是將檢體中極少量的異常 PrP^Sc（作為種子）加入過量的正常 PrP^C 中並震盪。異常的 PrP^Sc 會誘導正常 PrP^C 結構改變，進而聚集成微小的澱粉樣普里昂纖絲（Prion fibril），透過與纖絲結合的螢光染料便可敏銳測出。因此是利用其能「聚集成纖絲」的自催化特性 。 <br>•\t<br>o\t註： C 選項敘述顛倒，應是 PrP^Sc 將 PrP^C 轉換成 PrP^Sc 。 <br>•\t正確答案：B"},{"originalId":32,"question":"痘病毒（poxvirus）與大多數其他人類 DNA 病毒主要之差異為：","options":["A. 在細胞質複製","B. 其基因體為線型雙股 DNA","C. 有自己的 DNA 聚合酶","D. 利用 strand-displacement 的方式複製其 DNA"],"correctIndex":0,"explanation":"痘病毒（poxvirus）與大多數其他人類 DNA 病毒主要之差異為：<br>•\tA. 正確： 絕大多數 DNA 病毒都必須進入宿主細胞核內利用細胞的轉錄與複製機轉。但痘病毒（Poxvirus）體積巨大，其整個複製生命週期完全在「細胞質」中進行，其病毒顆粒內自備了完整的 DNA/RNA 聚合酶等轉錄複製所需的酶系統 。 <br>•\t正確答案：A"},{"originalId":33,"question":"有關病毒感染治療藥物之敘述，下列何者最不適當？","options":["A. 茚地那韋（indinavir）常用來治療單純疱疹病毒（herpes simplex virus）之感染","B. 利巴韋林（ribavirin）合併干擾素（interferon）可用於治療 C 型肝炎病毒之感染","C. 被狂犬病動物咬到之病人，必須施打馬或人之抗狂犬病病毒血清或免疫球蛋白","D. 金剛烷胺（amantadine）可抑制 A 型流行性感冒病毒（influenza A virus）"],"correctIndex":0,"explanation":"有關病毒感染治療藥物之敘述，下列何者最不適當？<br>•\tA. 錯誤（本題選A）： Indinavir（茚地那韋） 是一種愛滋病毒（HIV）的蛋白酶抑制劑 ，臨床上不用於治療單純疱疹病毒（HSV 的首選特效藥為 Acyclovir） 。 <br>•\t正確答案：A"},{"originalId":34,"question":"在托育中心的一歲男嬰，持續兩天水瀉並嘔吐，且有輕微發燒現象，之後因為脫水而住院。他最可能受到下列何種病毒的感染？","options":["A. 輪狀病毒（rotavirus）","B. 流感病毒（influenza virus）","C. B 型肝炎病毒（hepatitis B virus）","D. EB 病毒（Epstein-Barr virus）"],"correctIndex":0,"explanation":"在托育中心的一歲男嬰，持續兩天水瀉並嘔吐，且有輕微發燒現象，之後因為脫水而住院。他最可能受到下列何種病毒的感染？<br>•\tA. 正確： 在秋冬季節，托育中心或幼兒園嬰幼兒集體出現嘔吐、發燒、隨後排出嚴重的水瀉，導致脫水住院，最符合輪狀病毒（Rotavirus） 的臨床表徵 。 <br>•\t正確答案：A"},{"originalId":35,"question":"下列有關病毒的敘述，何者最適當？","options":["A. RNA病毒複製時，基因體的複製錯誤率大於DNA病毒","B. 病毒複製的速率是以等比級數方式增加","C. 流感病毒（influenza virus）對環境的耐受性比腸病毒（enterovirus）強","D. 所有RNA病毒均在寄主細胞質中完成複製工作"],"correctIndex":0,"explanation":"下列有關病毒的敘述，何者最適當？<br>•\tA. 正確： RNA 病毒複製時所使用的 RNA 聚合酶缺乏校正（proofreading）功能，因此其基因體複製時的突變錯誤率遠高於具有校正機制的 DNA 病毒 。 <br>•\tB. 錯誤： 病毒複製是透過在寄主細胞內組裝，最後以單次「大量爆發（Burst）」釋放子代，並非像細菌二分裂那樣以等比級數增加 。 <br>•\tC. 錯誤： 流感病毒有外套膜（對酸、乾燥敏感）；腸病毒無外套膜。因此腸病毒對環境的耐受性遠比流感病毒強 。 <br>•\tD. 錯誤： 雖然大部分 RNA 病毒在細胞質複製，但 流感病毒 與 反轉錄病毒（HIV） 必須在細胞核內進行其核心的轉錄與部分複製步驟 。 <br>•\t正確答案：A"},{"originalId":36,"question":"下列那一個最有可能是病毒感染引發「全身性類感冒 ed interferon）"],"correctIndex":0,"explanation":"下列那一種藥物，主要抑制 C 型肝炎病毒（hepatitis C virus）的聚合酶（polymerase）？<br>•\tA. 正確： Sofosbuvir（索華迪） 是一種核苷酸類似物前驅藥，能特異性與病毒 RNA 競爭，從而靶向抑制 HCV 的 NS5B RNA依賴性RNA聚合酶 。 <br>•\tB. 錯誤： Boceprevir 是 HCV 的 NS3/4A 蛋白酶抑制劑 。 <br>•\tC. 錯誤： Lamivudine 是用於治療 HIV/HBV 的反轉錄酶/DNA聚合酶抑制劑，對 HCV 無效 。 <br>•\t正確答案：A"},{"originalId":55,"question":"病毒感染寄主會引感免疫致病性（immunopathogenesis），下列何項因子最有可能造成第四型過敏及發炎反應（type IV hypersensitivity and inflammation）？","options":["A. 病毒抗體","B. 干擾素","C. 多形核白血球（polymorphonuclear leukocyte）","D. 細胞激素（cytokine）"],"correctIndex":3,"explanation":"病毒感染寄主會引感免疫致病性，下列何項因子最有可能造成第四型過敏及發炎反應？（答案具備延伸性）<br>•\t<br>o\t解析： 在標準免疫學定義中，第四型過敏反應是由 T 細胞（CD4+ Th1 或 CD8+ CTL） 所介導的「遲發型細胞免疫」 。當 T 細胞識別病毒抗原後，會釋放大量的 D. 細胞激素（Cytokines） 來召集並活化巨噬細胞，進而引發局部的組織發炎與損傷。因此在給定的選項中，細胞激素（D） 是最核心介導第四型過敏反應的病理發炎因子 。 <br>•\t正確答案：D"},{"originalId":56,"question":"下列何種細胞不是愛滋病毒（HIV）主要感染的對象？","options":["A. CD4 T細胞","B. 嗜中性白血球（neutrophil）","C. 巨噬細胞（macrophage）","D. 樹突細胞（dendritic cells）"],"correctIndex":1,"explanation":"下列何種細胞不是愛滋病毒（HIV）主要感染的對象？<br>•\tB. 正確（本題選B）： HIV 主要依賴細胞表面的 CD4 分子 作為入侵的主受體 。嗜中性白血球表面不表達 CD4 分子，因此不會被 HIV 感染 。CD4 T細胞、巨噬細胞及樹突細胞表面均表達 CD4（或共同受體 CCR5/CXCR4），皆為 HIV 侵犯的對象 。 <br>•\t正確答案：B"},{"originalId":57,"question":"新型抗流感病毒藥物紓伏效（baloxavir marboxil）抑制對象為何？\n註：本題原國考選項應為聚合酶複合物中的 PA 蛋白，若以下列選項而言，僅 PB2 同屬聚合酶複合體。","options":["A. PB2","B. M2","C. HA","D. NA"],"correctIndex":0,"explanation":"新型抗流感病毒藥物紓伏效（baloxavir marboxil）抑制對象為何？（本題有官方改題爭議）<br>•\t<br>o\t⚠️解析說明： Baloxavir 的精確作用靶點是流感病毒聚合酶複合物中的 PA 蛋白（帽狀結構內切酶）。在當年國考的選項異動中，由於 PA、PB1 與 PB2 共同組成了流感的「聚合酶三聚體複合物」，因此在給出的四個選項中，唯有 A. PB2 屬於同一個聚合酶核心功能系統，故本題在特定考卷上選 A 。 <br>•\t正確答案：A"},{"originalId":58,"question":"有關疱疹病毒（Herpesvirus）與其相關疾病之配對，下列何者錯誤？","options":["A. 單純疱疹病毒一型（HSV-1）：疱疹性腦炎（herpes encephalitis）","B. EB病毒（Epstein-Barr virus）：單核球增多症（mononucleosis）","C. 水痘病毒（VZV）：帶狀疱疹","D. 人類疱疹病毒六型（HHV-6）：疱疹性咽峽炎（herpangina）"],"correctIndex":3,"explanation":"有關疱疹病毒（Herpesvirus）與其相關疾病之配對，下列何者錯誤？<br>•\tD. 錯誤（本題選D）： 疱疹性咽峽炎（Herpangina） 主要是由 A 型克沙奇病毒 等腸病毒

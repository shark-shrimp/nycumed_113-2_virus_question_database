1 M氫氧化鈉（NaOH）溶液","D. 紫外線消毒"],"correctIndex":3,"explanation":"下列何種方法，最不能去除外科器械上的傳染性蛋白質（prion）之感染能力？<br>•\tD. 正確（本題選D）： Prion 完全由蛋白質構成，不含有核酸 。紫外線（UV） 的滅菌原理是破壞核酸（DNA/RNA）的鏈結結構 ，因此紫外線對 Prion 完全沒有任何去除活性的效果 。高溫高壓長時滅菌、1M 氫氧化鈉或強效次氯酸鈉（漂白水）則是少數能有效使 Prion 變性去活化的方法 。 <br>•\t正確答案：D"},{"originalId":64,"question":"關於人類乳突瘤病毒（Human papillomavirus, HPV）的敘述，下列何者錯誤？","options":["A. 可以感染皮膚以及黏膜組織","B. 沒有外套膜（envelope）","C. 其E1A與E1B蛋白質可以活化致癌基因","D. HPV-16和HPV-18常與癌症的形成官方"],"correctIndex":2,"explanation":"關於人類乳突瘤病毒（Human papillomavirus, HPV）的敘述，下列何者錯誤？<br>•\tC. 錯誤（本題選C）： E1A 與 E1B 蛋白質是腺病毒（Adenovirus） 的致癌功能蛋白 。HPV 負責使宿主細胞轉型癌變的核心致癌基因產物是 E6 和 E7 蛋白質 。 <br>•\t正確答案：C"},{"originalId":65,"question":"關於肝炎病毒（hepatitis viruses）之敘述，下列何者錯誤？","options":["A. A型肝炎病毒與C型肝炎病毒皆為正股RNA病毒","B. B型肝炎病毒與C型肝炎病毒皆有外套膜（envelope）","C. A型肝炎病毒與E型肝炎病毒常透過血液傳染","D. B型肝炎病毒在宿主細胞核內複製"],"correctIndex":2,"explanation":"關於肝炎病毒（hepatitis viruses）之敘述，下列何者錯誤？<br>•\tC. 錯誤（本題選C）： A 型肝炎病毒（HAV）與 E 型肝炎病毒（HEV） 屬於腸道肝炎，常透過糞口途徑（受污染的食物和水）傳播 ，而非透過血液傳染 。 <br>•\t正確答案：C"},{"originalId":66,"question":"下列何者為人類免疫缺陷病毒（Human immunodeficiency virus, HIV）之套膜蛋白質（envelope protein）？","options":["A. gp120","B. gp21","C. p66","D. p55"],"correctIndex":0,"explanation":"下列何者為人類免疫缺陷病毒（HIV）之套膜蛋白質（envelope protein）？<br>•\tA. 正確： HIV 的套膜（env）基因產物經剪切後，會形成負責與 CD4 受體結合的表面套膜醣蛋白 gp120 ，以及跨膜醣蛋白 gp41。 <br>•\t<br>o\t註： p55 為 Gag 核心蛋白前驅物 ；p66 為反轉錄酶組件 。 <br>•\t正確答案：A"},{"originalId":67,"question":"下列那一種肝炎病毒為去氧核醣核酸病毒（DNA virus）？","options":["A. A型肝炎病毒","B. B型肝炎病毒","C. C型肝炎病毒","D. D型肝炎病毒"],"correctIndex":1,"explanation":"下列那一種肝炎病毒為去氧核醣核酸病毒（DNA virus）？<br>•\tB. 正確： 在常見的肝炎病毒中，唯有 B 型肝炎病毒（HBV）是 DNA 病毒 ，其他皆為 RNA 病毒 。 <br>•\t正確答案：B"},{"originalId":68,"question":"以細胞學方式鑑定病毒，下列何種病毒感染細胞後會引發細胞融合（syncytia）並形成巨大細胞？","options":["A. 腸病毒（enterovirus）","B. 登革病毒（dengue virus）","C. 人類免疫缺失病毒（human immunodeficiency virus）","D. 狂犬病病毒（rabies virus）"],"correctIndex":2,"explanation":"以細胞學方式鑑定病毒，下列何種病毒感染細胞後會引發細胞融合（syncytia）並形成巨大細胞？<br>•\tC. 正確： HIV 感染 CD4+ T 細胞時，其表面表達的套膜醣蛋白（gp120/gp41）會與鄰近未感染細胞的 CD4 分子發生特異性結合，進而介導細胞膜融合，在病理切片或體外培養中形成清晰可見的多核巨大細胞／細胞融合（Syncytia） 。 <br>•\t正確答案：C"},{"originalId":69,"question":"下列何種病毒感染最容易引起嬰兒先天性白內障（congenital cataract）之病徵？","options":["A. 單純疱疹病毒（herpes simplex virus）","B. 腸病毒（enterovirus）","C. 腺病毒（adenovirus）","D. 德國麻疹病毒（rubella virus）"],"correctIndex":3,"explanation":"下列何種病毒感染最容易引起嬰兒先天性白內障（congenital cataract）之病徵？<br>•\tD. 正確： 孕婦在懷孕初期（前三個月）若初次感染德國麻疹病毒（Rubella virus），病毒極易透過胎盤引發先天性德國麻疹症候群（CRS），其最經典的三大嬰兒畸形表徵即為：先天性白內障、感音性耳聾與先天性心臟病（如 PDA） 。 <br>•\t正確答案：D"},{"originalId":70,"question":"下列病毒，那幾種最不可能經由性行為感染？①肝炎病毒A型（HAV） ②單純疱疹病毒（herpes simplex virus） ③茲卡病毒（Zika virus） ④麻疹病毒（measles virus）","options":["A. 1","B. 2","C. 3","D. 4"],"correctIndex":0,"explanation":"下列病毒，那幾種最不可能經由性行為感染？ ① 肝炎病毒A型 ② 單純疱疹病毒 ③ 茲卡病毒 ④ 麻疹病毒<br>•\t解析： ② HSV-2 是極經典的性傳染病 ；③ 茲卡病毒已被證實可透過精液經性行為人傳人 ；① HAV 雖主走糞口，但在特定親密接觸（如男男口肛性行為）中亦可傳播。而 ④ 麻疹病毒 是完全高強度依賴呼吸道飛沫與空氣傳播的病毒 ，在醫學定義上絕對不屬於由性行為介導的傳染病。 <br>•\t正確答案：選包含 ④ 的選項（僅 1 種病毒最不可能）"},{"originalId":71,"question":"目前對愛滋病的治療用藥不包含下列何種類型的藥物？","options":["A. Reverse transcriptase inhibitor","B. Protease inhibitor","C. Integrase inhibitor","D. Neuraminidase inhibitor"],"correctIndex":3,"explanation":"目前對愛滋病的治療用藥不包含下列何種類型的藥物？<br>•\tD. 正確（本題選D）： 神經胺酸酶抑制劑（Neuraminidase Inhibitor，如克流感） 是專門用來抑制流感病毒釋放的藥物 。HIV 病毒本身並沒有神經胺酸酶結構 。反轉錄酶抑制劑、蛋白酶抑制劑、整合酶抑制劑皆為當前 HIV HAART 雞尾酒療法的常規核心用藥 。 <br>•\t正確答案：D"},{"originalId":72,"question":"下列有關副黏液病毒（paramyxovirus）的敘述，下列何者最適當？","options":["A. 病毒基因體（genome）即是mRNA，可以被直接轉譯成蛋白質","B. 病毒顆粒中並未包裹RNA聚合酶（RNA polymerase）","C. 病毒感染後引發細胞融合（syncytium）","D. 在病毒複製過程中，所有病毒蛋白的產量是一致的"],"correctIndex":2,"explanation":"下列有關副黏液病毒（paramyxovirus）的敘述，下列何者最適當？<br>•\tC. 正確： 副黏液病毒科（如麻疹、RSV）在外套膜上皆擁有特異性的融合蛋白（F protein），能引發受感染細胞與鄰近正常細胞的膜融合，形成病理上特徵性的多核巨大細胞（細胞融合 Syncytia） 。 <br>•\tA、B. 錯誤： 副黏液病毒屬於負股單股 RNA 病毒，無法直接作為 mRNA 進行轉譯，其病毒顆粒內必須自備依賴 RNA 的 RNA 聚合酶。<br>•\t正確答案：C"},{"originalId":73,"question":"下列何種病毒不屬於小RNA病毒科（Picornaviridae）？","options":["A. A型肝炎病毒（hepatitis A virus）","B. 腸病毒（enterovirus）","C. 鼻病毒（rhinovirus）","D. 冠狀病毒（coronavirus）"],"correctIndex":3,"explanation":"下列何種病毒不屬於小RNA病毒科（Picornaviridae）？<br>•\t正確答案：D. 冠狀病毒。這是基本送分題。很佛很佛。"},{"originalId":74,"question":"下列有關絲狀病毒（filovirus）的敘述，何者正確？","options":["A. 病毒可經由蝙蝠及猴子感染人類，也可以人傳人","B. 2018年的伊波拉（Ebola）病毒大流行發生在海地","C. 病毒基因為正股(+)RNA","D. 伊波拉（Ebola）病毒的顆粒是子彈型"],"correctIndex":0,"explanation":"絲狀病毒 (Filovirus) 的敘述<br>•\t正確答案：A. 病毒可經由蝙蝠及猴子感染人類，也可以人傳人<br>•\t選項剖析：<br>o\tA 正確： 絲狀病毒科（如伊波拉病毒、馬堡病毒）的自然宿主多為果蝠。病毒可透過人類接觸受感染的野生動物（如果蝠、猴子、猩猩）的體液而傳染給人，並能透過直接接觸患者體液或血液造成高效率的人傳人。<br>o\tB 錯誤：2014-2016 年及 2018 年的伊波拉大流行主要發生在西非及中非地區（如剛果民主共和國、幾內亞等），海地則是與霍亂大流行較相關。<br>o\tC 錯誤：絲狀病毒的基因體為負股 (-) 單股 RNA。<br>o\tD 錯誤：子彈型是彈狀病毒科（如狂犬病病毒）的特徵。絲狀病毒外觀呈獨特的長絲狀、U型或6字型。"},{"originalId":75,"question":"有關腺病毒（adenovirus）的敘述，下列何者正確？","options":["A. 病毒蛋白質E6和E7會抑制p53的作用","B. 感染上皮細胞，會在細胞核內形成包涵體（inclusion body）","C. 具有線型雙股DNA，並含有外套膜（envelope）","D. 在淋巴組織造成溶解性感染（lytic infection）"],"correctIndex":1,"explanation":"腺病毒 (Adenovirus) 的敘述<br>•\t正確答案：B. 感染上皮細胞，會在細胞核內形成包涵體 (inclusion body)<br>•\t選項剖析：<br>o\tB 正確： 腺病毒在宿主上皮細胞的細胞核內大量複製，會形成特徵性的嗜鹼性包涵體（因為它是 DNA 病毒，複製場所在核內）。<br>o\tA 錯誤：抑制 p53 的 E6、抑制 pRb 的 E7 是人類乳突瘤病毒 (HPV) 的蛋白質。腺病毒的致癌蛋白是 E1A（抑制 Rb） 與 E1B（抑制 p53）。<br>o\tC 錯誤：腺病毒是線型雙股 DNA 沒錯，但它是無套膜（Naked）的病毒。<br>o\tD 錯誤：腺病毒在上皮細胞造成溶解性感染；在扁桃腺或腺樣體等淋巴組織中，則是建立長期的潛伏性感染 (Latent infection)。"},{"originalId":76,"question":"下列那一種病毒會以反轉錄酶（reverse transcriptase）複製病毒基因體？","options":["A. 乳突瘤病毒（papillomavirus）","B. 西尼羅河病毒（West Nile virus）","C. B型肝炎病毒（hepatitis B virus）","D. 呼吸道細胞融合病毒（respiratory syncytial virus）"],"correctIndex":2,"explanation":"使用反轉錄酶 (Reverse transcriptase) 複製的病毒<br>•\t正確答案：C. B型肝炎病毒 (hepatitis B virus)<br>•\t選項剖析：<br>o\tC 正確： B 型肝炎病毒（HBV）屬於肝 DNA 病毒科，但它的複製週期極為特殊。病毒進入細胞核後會先轉錄出「前基因體 RNA (pregenomic RNA)」，接著在細胞質中利用自己編碼的反轉錄酶（RNA-dependent DNA polymerase），將這段 RNA 反轉錄成子代的 DNA。<br>o\tA、B、D 錯誤：乳突瘤（DNA 病毒）、西尼羅河及 RSV（皆為 RNA 病毒）在常規複製中皆不使用反轉錄酶。"},{"originalId":77,"question":"抗病毒藥物奧斯他偉（oseltamivir），主要是抑制病毒的那一種酵素？","options":["A. 蛋白酶（protease）","B. 神經氨酸酶（neuraminidase）","C. 胸腺嘧啶激酶（thymidine kinase）","D. 反轉錄酶（reverse transcriptase）"],"correctIndex":1,"explanation":"抗病毒藥物奧斯他偉 (Oseltamivir)<br>•\t正確答案：B. 神經氨酸酶 (neuraminidase)<br>•\t選項剖析：<br>o\tB 正確： 奧斯他偉（商品名：克流感 Tamiflu）是專門治療流感病毒的神經氨酸酶 (NA) 抑制劑。它能阻止病毒切斷與宿主細胞相連的唾液酸，從而將新組裝的病毒顆粒困在細胞表面，阻斷病毒的釋放。"},{"originalId":78,"question":"下列何種病毒會在宿主細胞內造成內格里小體（Negri bodies）的產生？","options":["A. 狂犬病病毒（Rabies virus）","B. 單純疱疹病毒（Herpes-simplex virus, HSV）","C. 痘病毒（Poxvirus）","D. B型肝炎病毒（Hepatitis B virus）"],"correctIndex":0,"explanation":"內格里小體 (Negri bodies)<br>•\t正確答案：A. 狂犬病病毒 (Rabies virus)<br>•\t選項剖析：<br>o\tA 正確： 狂犬病病毒在感染神經系統後，會在大腦海馬迴或小腦的柏金氏細胞的細胞質內，形成特異性的嗜酸性包涵體，即為內格里小體 (Negri body)，是診斷的病理鐵證。<br>o\tB 錯誤：HSV 形成的是細胞核內的 Cowdry Type A 包涵體。"},{"originalId":79,"question":"有關抑制病毒的藥物中，下列何者是胜肽類的藥物？","options":["A. 恩夫韋（enfuvirtide）","B. 丙氧鳥苷（ganciclovir）","C. 拉米夫定（lamivudine）","D. 奧斯他偉（oseltamivir）"],"correctIndex":0,"explanation":"胜肽類抗病毒藥物<br>•\t正確答案：A. 恩夫韋 (enfuvirtide)<br>•\t選項剖析：<br>o\tA 正確： Enfuvirtide (又稱 T-20) 是一種針對 HIV 的融合抑制劑。它是一段人工合成的 36 個胺基酸胜肽，能結合 HIV 的跨膜蛋白 gp41，阻止病毒套膜與宿主細胞膜融合。<br>o\tB、C 錯誤：皆為核苷（酸）類似物。<br>o\tD 錯誤：Oseltamivir 為神經氨酸酶抑制劑，非胜肽結構。"},{"originalId":80,"question":"有關德國麻疹病毒（rubella virus）的敘述，下列何者錯誤？","options":["A. 人類為唯一宿主","B. 只有一種血清型","C. 可施打MMR疫苗預防感染","D. 常規以喉頭拭子（throat swab）培養病毒，做為診斷感染的根據"],"correctIndex":3,"explanation":"德國麻疹病毒 (Rubella virus) 敘述<br>•\t正確答案：D. 常規以喉頭拭子 (throat swab) 培養病毒，做為診斷感染的根據<br>•\t選項剖析：<br>o\tD 錯誤： 雖然病毒存在於呼吸道，但德國麻疹病毒生長緩慢且難以培養（CPE 不明顯）。因此，臨床常規診斷不依賴病毒培養，而是利用血清學檢驗（測特異性 IgM 或 IgG 力價上升）或 RT-PCR 來確診。<br>o\tA、B、C 正確：人類是唯一宿主，因只有一種穩定血清型，所以 MMR 活疫苗的預防效果極佳。"},{"originalId":81,"question":"在12月中旬，一位5歲男童出現發燒、頭痛、喉嚨痛、流鼻水、打噴嚏、無痰性乾咳、肌肉痛不舒服等症狀， 病情持續4天沒有好轉，卻進一步發展為細菌性肺炎（pneumonia）及肌炎（myositis），與該男童同住之家人 一星期後亦出現類似症狀，此男童最可能受下列何種病原感染？","options":["A. 麻疹病毒（Measles virus）","B. 呼吸道細胞融合病毒（Respiratory syncytial virus）","C. 流行性感冒病毒（Influenza virus）","D. 腸病毒71型（Enterovirus 71）"],"correctIndex":2,"explanation":"男童冬季流感併發症<br>•\t正確答案：C. 流行性感冒病毒 (Influenza virus)<br>•\t選項剖析：<br>o\tC 正確： 「冬季（12月）」、「群聚感染」、「高燒/肌肉痛/乾咳」，且後續極易破壞呼吸道黏膜，引發致命的次發性細菌性肺炎（如金黃色葡萄球菌）及肌炎。這是流行性感冒最經典的臨床敘述。"},{"originalId":82,"question":"在愛滋病（AIDS）患者常見的卡波西肉瘤（Kaposi sarcoma），是由下列那種致病原伺機性感染所造成？","options":["A. 白色念珠菌（Candida albicans）","B. 人類黴漿菌（Mycoplasma hominis）","C. 第八型人類疱疹病毒（Human herpesvirus 8）","D. 新型隱球菌（Cryptococcus neoformans）"],"correctIndex":2,"explanation":"卡波西肉瘤 (Kaposi sarcoma) 致病原<br>•\t正確答案：C. 第八型人類疱疹病毒 (Human herpesvirus 8, HHV-8)<br>•\t選項剖析：<br>o\tC 正確： 愛滋病患者因 T 細胞免疫低下，容易遭到潛伏的 HHV-8（又稱卡波西肉瘤相關疱疹病毒 KSHV） 伺機活化並感染血管內皮細胞，引發紫紅色的多發性血管腫瘤（Kaposi sarcoma）。"},{"originalId":83,"question":"關於小DNA病毒（Parvovirus）的敘述，下列何者錯誤？","options":["A. 其基因體（genome）是線型雙股DNA","B. 小朋友如果感染小DNA病毒（Parvovirus）B19， 會在兩側臉頰產生整片發紅的現象，俗稱巴掌臉（slapped cheek）","C. 在免疫缺乏的病人身上，B19會造成慢性貧血","D. 病毒本身不帶有DNA聚合酶（polymerase）， 因此只能在生長中的細胞裏複製"],"correctIndex":0,"explanation":"小 DNA 病毒 (Parvovirus) 敘述<br>•\t正確答案：A. 其基因體 (genome) 是線型雙股 DNA<br>•\t選項剖析：<br>o\tA 錯誤： 小 DNA 病毒科（Parvoviridae）的名字由來就是它極小，它是動物病毒中極少數的「線型單股 DNA (ssDNA)」病毒。<br>o\tB 正確：B19 感染兒童會引起傳染性紅斑（第五病），出現典型「巴掌臉」。<br>o\tC 正確：因偏好攻擊紅血球前驅細胞，免疫不全者無法清除病毒，會導致慢性貧血。<br>o\tD 正確：因基因體太小，無法自己編碼 DNA 聚合酶，必須依賴宿主細胞進入 S 期（生長分裂期）提供的酵素才能複製。"},{"originalId":84,"question":"有關流感病毒減毒疫苗（live attenuated influenza vaccine）的敘述，下列何者錯誤？","options":["A. 適當生長溫度是攝氏25度","B. 大部分在鼻咽部感染","C. 容易刺激IgA抗體的產生","D. 適用於60歲以上之成人"],"correctIndex":3,"explanation":"流感減毒疫苗 (LAIV) 敘述<br>•\t正確答案：D. 適用於60歲以上之成人<br>•\t選項剖析：<br>o\tD 錯誤： 鼻噴式的減毒活疫苗（LAIV）含有活的（但致病力弱的）流感病毒，因此禁止或不建議使用於免疫力較差的族群，包含 2 歲以下幼兒、50 歲以上中老年人、孕婦及免疫不全者。這類人群只能施打死毒（去活化）疫苗。<br>o\tA、B、C 正確：它是一種冷適應株，在 25℃（類似鼻腔低溫）生長良好，透過鼻腔噴霧給藥，能有效刺激黏膜產生分泌型 IgA 抗體。"},{"originalId":85,"question":"腸病毒71型（Enterovirus EV71）造成死亡主要的原因是：","options":["A. 侵犯腸胃道，造成腸道細胞脫落，及嚴重的電解質不平衡","B. 感染後可以持續潛伏在腸道M細胞中，多次不斷再活化，因而造成持續性症狀","C. 侵犯不同部位的組織，尤其是神經系統","D. 病人體內產生的抗體可以和病毒結合，增加病毒的感染力"],"correctIndex":2,"explanation":"腸病毒 71 型 (EV71) 死亡主因<br>•\t正確答案：C. 侵犯不同部位的組織，尤其是神經系統<br>•\t選項剖析：<br>o\tC 正確： 腸病毒 71 型除了引起手足口病外，最可怕的是它具備強烈的嗜神經性。它會侵犯中樞神經系統的腦幹（引發腦幹腦炎），造成交感神經風暴，最終引發急速惡化且高致死率的神經性肺水腫及心肺衰竭。"},{"originalId":86,"question":"有關JC病毒（JC virus, JCV）的敘述，下列何者錯誤？","options":["A. 會感染神經膠狀細胞（glial cell）","B. 其T（large T）抗原與DNA複製有關","C. 其t（small t）抗原與抑制p53及p105RB之功能有關","D. 在免疫不全病人能造成進行性多灶性白質腦病（progressive multifocal leukoencephalopathy, PML）"],"correctIndex":2,"explanation":"JC 病毒 (JCV) 敘述<br>•\t正確答案：C. 其 t (small t) 抗原與抑制 p53 及 p105RB 之功能有關<br>•\t選項剖析：<br>o\tC 錯誤： 多瘤病毒（JCV、BKV、SV40）負責結合並抑制 p53 與 pRb 功能的致癌蛋白，是它們的 大 T 抗原（Large T antigen），而非小 t 抗原。<br>o\tA、D 正確：JCV 專一性感染破壞中樞神經的寡樹突神經膠狀細胞，引發脫髓鞘疾病 PML。"},{"originalId":87,"question":"下列對於小兒麻痺疫苗（polio vaccines）的描述何者錯誤？","options":["A. 小兒麻痺疫苗（polio vaccines）可分為去活性 （inactivated）與減毒疫苗（live-attenuated）二種型式","B. 小兒麻痺病毒可感染人類與牛隻","C. 在臺灣小兒麻痺所推薦的疫苗以去活性（inactivated）疫苗為主","D. 口服小兒麻痺疫苗是由三種減毒（live-attenuated）的病毒株所組成"],"correctIndex":1,"explanation":"小兒麻痺疫苗 (Polio vaccines)<br>•\t正確答案：B. 小兒麻痺病毒可感染人類與牛隻<br>•\t選項剖析：<br>o\tB 錯誤： 小兒麻痺病毒（Poliovirus）的受體（CD155）僅存在於靈長類。因此，人類是它唯一天然宿主，不會感染牛隻等其他動物。這也是為何它有望成為繼天花後，第二個在地球上被根除的人類疾病。<br>o\tA、C、D 皆正確。Sabin 為口服活疫苗，Salk 為注射死疫苗（台灣現行常規接種 IPV）。"},{"originalId":88,"question":"下列腫瘤之發生何者與Epstein-Barr病毒的相關性最低？","options":["A. 子宮頸癌","B. 鼻咽癌","C. 伯基特氏淋巴瘤（Burkitt lymphoma）","D. 何杰金氏淋巴瘤（Hodgkin lymphoma）"],"correctIndex":0,"explanation":"與 EBV 相關性最低的腫瘤<br>•\t正確答案：A. 子宮頸癌<br>•\t選項剖析：<br>o\tA 正確： 子宮頸癌是由高危險型人類乳突瘤病毒（HPV 16, 18 等）引起，與 EB 病毒無關。<br>o\tB、C、D 皆是 EB 病毒被公認高度相關的惡性腫瘤。"},{"originalId":89,"question":"D型肝炎病毒（HDV）是一種有缺陷的病毒。下列那種肝炎病毒對肝細胞中HDV的複製至關重要？","options":["A. A型肝炎病毒","B. B型肝炎病毒","C. C型肝炎病毒","D. E型肝炎病毒"],"correctIndex":1,"explanation":"幫助 D 型肝炎 (HDV) 複製的病毒<br>•\t正確答案：B. B型肝炎病毒<br>•\t選項剖析：<br>o\tB 正確： D 型肝炎病毒是缺陷病毒，它必須「借用」B 型肝炎病毒 (HBV) 的表面抗原 (HBsAg) 作為自己的外套膜，才能組裝出具傳染力的病毒顆粒並離開肝細胞。"},{"originalId":90,"question":"下列何種細胞易受JC polyomavirus感染？","options":["A. 寡樹突神經膠細胞（oligodendrocyte）","B. 星狀神經膠細胞（astrocyte）","C. 微膠細胞（microglia）","D. 神經元細胞（neuron）"],"correctIndex":0,"explanation":"易受 JC 多瘤病毒感染的細胞<br>•\t正確答案：A. 寡樹突神經膠細胞 (oligodendrocyte)<br>•\t選項剖析：<br>o\tA 正確： JC 病毒在中樞神經系統中具有高度細胞專一性，專門攻擊並裂解負責形成神經髓鞘的寡樹突神經膠細胞，導致神經失去保護層（去髓鞘），引發進行性多灶性白質腦病 (PML)。"},{"originalId":91,"question":"下列那⼀種病毒有兩條單股RNA基因體，其中⼀條為雙義（ambisense）RNA？","options":["A. 拉薩病毒（Lassa virus）","B. 登⾰病毒（Dengue virus）","C. 中東呼吸症候群冠狀病毒（MERS-CoV）","D. 克⾥米亞-剛果出⾎熱病毒（Crimean-Congo hemorrhagic fever virus）"],"correctIndex":0,"explanation":"雙義 (ambisense) RNA 的病毒<br>•\t正確答案：A. 拉薩病毒 (Lassa virus)<br>•\t選項剖析：<br>o\tA 正確： 沙狀病毒科（Arenaviridae，如拉薩病毒）與布尼亞病毒科的部分成員，擁有極特殊的「雙義 (Ambisense) RNA」基因體。它們的 RNA 鏈一部分是正股編碼，另一部分是負股編碼。拉薩病毒具有 L（大）與 S（小）兩條單股 RNA 片段，皆採用雙義編碼。"},{"originalId":92,"question":"關於EB 病毒的敘述，下列何者正確？","options":["A. 受EB病毒感染的成⼈，通常會出現帶狀疱疹","B. 在愛滋病⼈體內，EB病毒主要感染T細胞，造成T細胞的過度增⽣","C. 在⿐咽癌病⼈⾎液中，會偵測到抗EB病毒蛋⽩質的抗體力價上升","D. EB病毒感染B細胞之後，會進入潛伏狀態，完全不表現任何病毒RNA或蛋⽩質，以躲避免疫系統攻擊"],"correctIndex":2,"explanation":"EB 病毒的敘述<br>•\t正確答案：C. 在鼻咽癌病人血液中，會偵測到抗 EB 病毒蛋白質的抗體力價上升<br>•\t選項剖析：<br>o\tC 正確： 鼻咽癌（NPC）與 EBV 高度相關。NPC 患者的血清中，特別針對 EBV 早期抗原 (EA) 或病毒衣殼抗原 (VCA) 的 IgA 抗體力價會顯著異常升高，常被用作鼻咽癌篩檢的重要血清學標記。<br>o\tA 錯誤：帶狀疱疹是由 VZV 引起。<br>o\tB 錯誤：EBV 主要感染 B 細胞 與上皮細胞，非 T 細胞。<br>o\tD 錯誤：潛伏期的 EBV 雖然不進行大量複製，但並非「完全不表現」。它會選擇性表現 EBNA (核抗原)、LMP (潛伏膜蛋白) 及 EBER (小RNA) 等分子以維持潛伏及促細胞增生。"},{"originalId":93,"question":"有關傳染性蛋⽩質（Prion）的敘述，下列何者正確？","options":["A. 具有抗原性","B. 可被福⾺林及紫外線去除活性","C. 無法有效刺激宿主產⽣⼲擾素（interferon）","D. 會造成肺泡細胞堅實化病變"],"correctIndex":2,"explanation":"傳染性蛋白質 (Prion) 的敘述<br>•\t正確答案：C. 無法有效刺激宿主產生干擾素 (interferon)<br>•\t選項剖析：<br>o\tC 正確： Prion 是由宿主體內正常的蛋白質 ($PrP^C$) 摺疊錯誤變成致病型 ($PrP^{Sc}$)。因為是「自體蛋白」的序列，免疫系統不會將它視為外來物，所以它沒有免疫原性，不會引起發炎，也無法刺激宿主細胞產生干擾素。<br>o\tB 錯誤：Prion 對化學消毒（如福馬林、高濃度酒精）及物理滅菌（紫外線、一般高溫煮沸）具備極強的抗性，極難去除活性。"},{"originalId":94,"question":"下列何種流感病毒蛋⽩質是屬於質⼦通道（proton channel），與病毒釋放到細胞質有關？","options":["A. 基質蛋⽩質（matrix protein, M1）","B. 膜蛋⽩質（membrane protein, M2）","C. 核殼體蛋⽩質（nucleocapsid protein, NP）","D. RNA聚合酶（polymerase, PA）"],"correctIndex":1,"explanation":"流感病毒的質子通道 (Proton channel)<br>•\t正確答案：B. 膜蛋白質 (membrane protein, M2)<br>•\t選項剖析：<br>o\tB 正確： A 型流感病毒套膜上的 M2 蛋白 形成了一個微小的質子通道。當病毒被吞入內體 (Endosome) 時，M2 會讓外部的氫離子 (H+) 進入病毒核心，使其酸化。這會促使核殼體解離，完成病毒脫殼並釋放 RNA 進入細胞質。抗病毒藥物 Amantadine 的目標就是阻斷這個通道。"},{"originalId":95,"question":"對於痘科病毒（Poxvirus）的敘述，下列何者正確？","options":["A. 天花的撲滅，是因為全⾯接種猴痘科（monkeypox）病毒的死毒疫苗","B. 天花的撲滅，是因為全⾯接種天花病毒（variola virus）的減毒疫苗","C. 猴痘科病毒對動物的感染⽬前仍然流傳於非洲，但不會感染⼈類","D. 痘科病毒感染細胞後的複製過程在細胞質內進⾏，不需要宿主的DNA複製系統協助"],"correctIndex":3,"explanation":"痘科病毒 (Poxvirus) 的敘述<br>•\t正確答案：D. 痘科病毒感染細胞後的複製過程在細胞質內進行，不需要宿主的 DNA 複製系統協助<br>•\t選項剖析：<br>o\tD 正確： 同前述，痘病毒是最大、最複雜的 DNA 病毒，自備全套聚合酶酵素群，因此能打破 DNA 病毒的常規，完全在「細胞質」中複製。<br>o\tA、B 錯誤：天花撲滅是靠接種活的牛痘病毒 (Vaccinia virus) 疫苗，因為它與天花有交叉保護力，且對人體較安全。<br>o\tC 錯誤：猴痘病毒 (Mpox) 是人畜共通，會感染人類（近年全球亦有大規模爆發）。"},{"originalId":96,"question":"關於嬰兒玫瑰疹（roseola）的敘述，下列何者錯誤？","options":["A. 可由⼈類疱疹第六型病毒（human herpesvirus 6）感染所造成","B. 被感染的成⼈有可能產⽣單核球增多症（mononucleosis）","C. 被感染的幼兒通常不會發燒","D. 病⼈體內的病毒會在Ｔ細胞內造成潛伏性感染（latent infection）"],"correctIndex":2,"explanation":"嬰兒玫瑰疹 (Roseola) 錯誤敘述<br>•\t正確答案：C. 被感染的幼兒通常不會發燒<br>•\t選項剖析：<br>o\tC 錯誤： 這完全違背了玫瑰疹的招牌症狀！嬰兒玫瑰疹的最大特徵就是「突發高燒（可達 39-40℃），且持續 3-5 天」。燒退的同時，全身會迅速冒出紅疹（熱退疹出）。<br>o\tA、B、D 正確：由 HHV-6 引起；在成人初次感染可引起類似單核球增多症；痊癒後病毒終身潛伏於 T 細胞與巨噬細胞中。"},{"originalId":97,"question":"傳染登⾰熱的病媒蚊是下列何者？","options":["A. 熱帶家蚊、⽩腹叢蚊","B. 埃及斑蚊、⽩線斑蚊","C. ⽩腹叢蚊、⼩⿊蚊","D. 中華瘧蚊、熱帶家蚊"],"correctIndex":1,"explanation":"傳染登革熱的病媒蚊<br>•\t正確答案：B. 埃及斑蚊、白線斑蚊<br>•\t選項剖析：<br>o\tB 正確： 這是台灣公衛必考常識。埃及斑蚊 (Aedes aegypti) 主要分布在嘉義以南，習性在室內；白線斑蚊 (Aedes albopictus) 分布全島，多在戶外。兩者皆為傳播登革熱及茲卡病毒的元凶。"},{"originalId":98,"question":"以下何種肝炎病毒常是造成旅⾏者肝炎（traveler hepatitis）的元凶，並且懷孕婦女感染有將近20%的死亡率？","options":["A. A型肝炎病毒","B. B型肝炎病毒","C. D型肝炎病毒","D. E型肝炎病毒"],"correctIndex":3,"explanation":"造成旅行者肝炎且孕婦高死亡率<br>•\t正確答案：D. E型肝炎病毒 (HEV)<br>•\t選項剖析：<br>o\tD 正確： 「旅行者肝炎 (飲食不潔/糞口傳染)」加上關鍵字「孕婦感染有高達近 20% 的致死率（爆發性肝衰竭）」，這絕對是 E 型肝炎病毒 專屬的臨床特徵考點。"},{"originalId":99,"question":"病理診斷狂⽝病（Rabies）的最主要依據是觀察到：","options":["A. Lewy body","B. Kuru plaque","C. Negri body","D. Stress granules"],"correctIndex":2,"explanation":"病理診斷狂犬病的最主要依據<br>•\t正確答案：C. Negri body<br>•\t選項剖析：<br>o\tC 正確： 同第 78 題。在感染動物或病患的腦組織（海馬迴或小腦）神經細胞質中，觀察到嗜酸性的內格里小體 (Negri body)，是診斷狂犬病的決定性病理標記。<br>o\tA (Lewy body) 見於帕金森氏症；B (Kuru plaque) 見於 Prion 疾病庫魯症。"},{"originalId":100,"question":"一名受EB病毒（Epstein-Barr virus, EBV）感染的病人，其血清學檢查如下：anti-VCA IgM (+)、anti-VCA IgG (+)、anti-EA (+/-)、anti-EBNA (-)，此病人的情況屬於下列何者？","options":["A. EB病毒感染的急性期（acute primary infection）","B. EB病毒慢性感染期（chronic primary infection）","C. 曾被EB病毒感染（past infection）","D. 曾被EB病毒感染，現在病毒再活化（reactivation）"],"correctIndex":0,"explanation":"EB 病毒血清學檢查判讀<br>•\t正確答案：A. EB病毒感染的急性期 (acute primary infection)<br>•\t選項剖析：<br>o\tA 正確： 血清學解碼：<br>1.\tanti-VCA IgM (+)：這是代表「近期/急性原發感染」的最強指標。<br>2.\tanti-VCA IgG (+)：表示已出現免疫反應。<br>3.\tanti-EBNA (-)：EBNA（核抗原）抗體通常要到感染後數週甚至幾個月才會出現（代表康復或潛伏期）。<br>\tIgM 陽性 + EBNA 陰性 = 確診為「急性原發感染期」。"},{"originalId":101,"question":"下列何者不屬於目前美國食品與藥物管理局（FDA）認可的HIV抗病毒藥物？","options":["A. 蛋白酶抑制劑（protease inhibitor）","B. 嵌入酶抑制劑（integrase inhibitor）","C. 核苷類似物反轉錄酶抑制劑（nucleoside analog RT inhibitor）","D. 病毒出芽抑制劑（budding inhibitor）"],"correctIndex":3,"explanation":"非 FDA 認可之 HIV 抗病毒藥物<br>•\t正確答案：D. 病毒出芽抑制劑 (budding inhibitor)<br>•\t選項剖析：<br>o\tD 正確： 目前主流的抗 HIV 藥物（HAART 雞尾酒療法）類別包含：核苷酸/非核苷酸反轉錄酶抑制劑 (C)、蛋白酶抑制劑 (A)、嵌入酶（整合酶）抑制劑 (B) 以及融合/進入抑制劑。目前沒有針對抑制病毒「出芽 (Budding)」階段而獲核可的抗 HIV 藥物。"},{"originalId":102,"question":"下列病毒中，現在何種能以施打減毒疫苗方式進行最佳預防？","options":["A. 單純疱疹病毒（Herpes simplex virus）","B. 第八型人類疱疹病毒（Human herpesvirus-8）","C. EB病毒（Epstein-Barr virus）","D. 水痘-帶狀疱疹病毒（Varicella-zoster virus）"],"correctIndex":3,"explanation":"可以施打減毒疫苗預防的病毒<br>•\t正確答案：D. 水痘-帶狀疱疹病毒 (Varicella-zoster virus, VZV)<br>•\t選項剖析：<br>o\tD 正確： 台灣兒童常規施打的水痘疫苗，以及成人用來防皮蛇的傳統帶狀疱疹疫苗 (Zostavax)，皆是採用 Oka 病毒株所製成的減毒活疫苗，預防效果極佳。<br>o\tA、B、C 等其他疱疹病毒，目前皆無核准的商用疫苗。"},{"originalId":103,"question":"下列何種病毒最常造成先天性疾病，並影響新生兒聽力與智能發展？","options":["A. 麻疹病毒（Measles virus）","B. 單純疱疹病毒（Herpes simplex virus）","C. 巨細胞病毒（Cytomegalovirus）","D. B19細小病毒（Parvovirus B19）"],"correctIndex":2,"explanation":"最常影響新生兒聽力與智能發展的先天感染<br>•\t正確答案：C. 巨細胞病毒 (Cytomegalovirus, CMV)<br>•\t選項剖析：<br>o\tC 正確： CMV 是全球開發中國家及已開發國家最常見的先天性感染原（TORCH 第一名）。新生兒若在子宮內感染，出生後最常見且不可逆的後遺症就是感覺神經性耳聾（聽力喪失）以及智力發育遲緩/微小腦。"},{"originalId":104,"question":"感染下列何種病毒，若自行服用阿司匹靈（Aspirin）等水楊酸類（salicylates）退燒藥物後，最易增加兒童罹患雷氏症候群（Reye syndrome）的風險？","options":["A. 德國麻疹病毒（Rubella virus）","B. 麻疹病毒（Measles virus）","C. 流感病毒（Influenza virus）","D. 狂犬病病毒（Rabies virus）"],"correctIndex":2,"explanation":"服用水楊酸 (Aspirin) 易誘發雷氏症候群<br>•\t正確答案：C. 流感病毒 (Influenza virus)<br>•\t選項剖析：<br>o\tC 正確： 醫學禁忌常識。兒童或青少年在感染流行性感冒病毒 (Influenza) 或水痘病毒 (VZV) 期間，絕對禁止服用阿斯匹靈 (Aspirin) 等水楊酸類退燒藥。這極易誘發 雷氏症候群 (Reye syndrome)，導致猛爆性肝炎與急性腦水腫，致死率極高。因此兒童發燒退燒首選是普拿疼 (Acetaminophen) 或伊普芬 (Ibuprofen)。"},{"originalId":105,"question":"人類是下列何種病毒中，最明確的天然宿主？","options":["A. 辛德畢斯病毒（Sindbis virus）","B. 塞姆利基森林病毒（Semliki Forest virus）","C. 西尼羅腦炎病毒（West Nile encephalitis virus）","D. 基孔肯雅病毒（Chikungunya virus）"],"correctIndex":3,"explanation":"蟲媒病毒的天然宿主<br>•\t正確答案：D. 基孔肯雅病毒（Chikungunya virus）<br>•\t選項剖析：<br>o\tD 正確： 基孔肯雅病毒（Chikungunya virus）雖然在叢林循環中會感染靈長類，但在爆發大流行的「都市傳播循環（Urban cycle）」中，人類是其最主要的擴大宿主（Amplifying host）與天然儲存宿主，透過埃及斑蚊與白線斑蚊在人與人之間高效傳播。<br>o\tA、B、C 錯誤：辛德畢斯病毒（Sindbis）、塞姆利基森林病毒（Semliki Forest）以及西尼羅腦炎病毒（West Nile virus），在大自然中最主要的天然儲存宿主都是鳥類（Birds），蚊子吸了鳥血後再叮咬人類，人類通常只是「終端宿主（Dead-end host）」。"},{"originalId":106,"question":"治療愛滋病（AIDS）的藥物疊氮胸苷（azidothymidine, AZT），是針對病毒那個基因的產物？","options":["A. env","B. gag","C. tat","D. pol"],"correctIndex":3,"explanation":"抗愛滋藥物 AZT 的基因標的<br>•\t正確答案：D. pol<br>•\t選項剖析：<br>o\tD 正確： 疊氮胸苷（AZT, Zidovudine）是醫學史上第一個核苷酸類反轉錄酶抑制劑（NRTI）。在 HIV 的基因體中，pol 基因（Polymerase gene） 專門負責編碼病毒複製所需的三大核心酵素：反轉錄酶（Reverse transcriptase）、蛋白酶（Protease）與整合酶（Integrase）。因此 AZT 針對的就是 pol 基因的產物。<br>o\tA 錯誤：env 基因編碼的是外套膜醣蛋白（gp120 與 gp41）。<br>o\tB 錯誤：gag 基因編碼的是核心結構蛋白（如 p24 核殼蛋白）。<br>o\tC 錯誤：tat 基因編碼的是轉錄反式活化因子（加速病毒 RNA 轉錄）。"},{"originalId":107,"question":"下列何者會先被病毒的thymidine kinase磷酸化而干擾病毒複製，因此對被感染的細胞具選擇性，主要用於治療疱疹病毒（herpes viruses）的感染？","options":["A. abacavir","B. acyclovir","C. amantadine","D. azidothymidine"],"correctIndex":1,"explanation":"疱疹病毒特效藥 Acyclovir 的機轉<br>•\t正確答案：B. acyclovir<br>•\t選項剖析：<br>o\tB 正確： 這是抗病毒藥物藥理學必考的「神級設計」！Acyclovir（阿昔洛韋） 進入細胞後，必須依賴疱疹病毒自己編碼的「胸苷激酶（Viral Thymidine Kinase, TK）」 進行第一次磷酸化，才能被活化。這代表它在沒有被病毒感染的正常細胞中是完全休眠無毒的，因此對被感染的細胞具有極高的選擇性特異性。<br>o\tA 錯誤：Abacavir 是治療 HIV 的反轉錄酶抑制劑。<br>o\tC 錯誤：Amantadine 是治療 A 型流感病毒的 M2 質子通道抑制劑。<br>o\tD 錯誤：Azidothymidine (AZT) 是治療 HIV 的反轉錄酶抑制劑。"},{"originalId":108,"question":"本雅病毒（Bunyaviruses）大多藉由節肢動物傳播，然而下列何者例外？","options":["A. 漢坦病毒（Hantaan virus）","B. 裂谷熱病毒（Rift valley fever virus）","C. 加利福尼亞腦炎病毒（California encephalitis virus）","D. 克里米亞-剛果出血熱病毒（Crimean-Congo hemorrhagic fever virus）"],"correctIndex":0,"explanation":"本雅病毒（Bunyaviruses）傳播途徑<br>•\t正確答案：A. 漢坦病毒（Hantaan virus）<br>•\t選項剖析：<br>o\tA 正確（例外）： 本雅病毒科（Bunyaviridae）絕大多數成員都是蟲媒病毒（Arboviruses），必須靠節肢動物（蚊、蜱）叮咬傳播。唯一的例外是漢他病毒（Hantaan virus），它是透過囓齒類動物（老鼠）的排泄物氣溶膠，經由人類「吸入」或「接觸」傳染，不需要節肢動物媒介。<br>o\tB、C、D 錯誤：裂谷熱（蚊）、加州腦炎（蚊）、克里米亞-剛果出血熱（蜱）皆為典型的節肢動物媒介病毒。"},{"originalId":109,"question":"帶有下列那一種基因之同合子（homozygous）缺陷的人，對於人類免疫缺陷病毒（HIV）感染相對地具有抗性？","options":["A. 17p（p53）","B. HLA-B 5701","C. CCR5-delta 32","D. t（11；22）（q24；q12）"],"correctIndex":2,"explanation":"HIV 抗性基因突變<br>•\t正確答案：C. CCR5-delta 32<br>•\t選項剖析：<br>o\tC 正確： HIV 入侵宿主細胞時，除了需要主受體 CD4 之外，還需要輔助受體（CCR5 或 CXCR4）。擁有 CCR5-delta 32 同合子基因突變的個體，其細胞表面無法表現正常的 CCR5 蛋白。由於感染初期的 HIV 幾乎都是嗜巨噬細胞型（M-tropic，專門利用 CCR5），因此這種人對 HIV 感染具有極強的天然抗性。<br>o\tA、D 錯誤：p53 是抑癌基因；t(11;22) 是尤文氏肉瘤（Ewing sarcoma）的典型染色體易位，皆與 HIV 無關。<br>o\tB 錯誤：HLA-B*5701 是用來預測使用抗愛滋藥物 Abacavir 是否會產生嚴重過敏反應的基因標記，並非天然抗性基因。"},{"originalId":110,"question":"關於小兒麻痺病毒（poliovirus）的敘述，下列何者正確？","options":["A. 其基因體是由雙股RNA所組成","B. 病毒套膜（envelope）上的醣蛋白質（glycoprotein）不容易產生突變","C. 病毒顆粒很穩定，可以透過下水道系統汙染水源造成感染","D. 沙克（Salk）減毒疫苗和沙賓（Sabin）死毒疫苗，常被用來預防其所引起的疾病"],"correctIndex":2,"explanation":"小兒麻痺病毒（Poliovirus）<br>•\t正確答案：C. 病毒顆粒很穩定，可以透過下水道系統汙染水源造成感染<br>•\t選項剖析：<br>o\tA 錯誤： 小兒麻痺病毒屬於小RNA病毒科（Picornaviridae），其基因體是單股正股 RNA（+ssRNA），而非雙股。<br>o\tB 錯誤： 它是無套膜（Naked）病毒，因此表面沒有套膜醣蛋白。<br>o\tC 正確： 因為無套膜，它對胃酸、膽汁及外界環境（如消毒水、下水道汙水）具有極強的抵抗力，能輕易透過糞口途徑造成大規模傳染。<br>o\tD 錯誤： 選項寫反了！沙克（Salk）疫苗是注射的死毒疫苗（IPV）；沙賓（Sabin）疫苗是口服的減毒活疫苗（OPV）。"},{"originalId":111,"question":"下列何種人類病毒最適合生長於攝氏33-35度，所以通常感染上呼吸道。不過，動物來源的此類病毒卻能生長在攝氏37度，因此能造成全身性感染？","options":["A. 間質肺炎病毒（Metapneumovirus）","B. 腺病毒（Adenovirus）","C. 呼吸道細胞融合病毒（Respiratory syncytial virus）","D. 冠狀病毒（Coronavirus）"],"correctIndex":3,"explanation":"呼吸道病毒的生長溫度特性<br>•\t正確答案：D. 冠狀病毒（Coronavirus）<br>•\t選項剖析：<br>o\tD 正確： 一般引起人類普通感冒的冠狀病毒，最適生長溫度為 33-35°C，因此只會侷限在溫度較低的上呼吸道。然而，來自動物的新興冠狀病毒（如 SARS、MERS、SARS-CoV-2）卻能適應人體核心體溫 37°C，從而能長驅直入下呼吸道與肺部，甚至造成全身性嚴重感染。其他選項的病毒較無此明顯的溫度適應雙相特徵。"},{"originalId":112,"question":"有關病毒與其細胞受器（cell receptor）的配對，下列何者錯誤？","options":["A. EB病毒（Epstein-Barr virus）- CD21","B. 流感病毒（Influenza virus）- 水楊酸（sialic acid）","C. B19病毒（B19 virus） - 紅血球M抗原（erythrocyte M antigen）","D. 鼻病毒（Rhinovirus）- ICAM-1"],"correctIndex":2,"explanation":"病毒與細胞受器配對<br>•\t正確答案：C. B19病毒（B19 virus） - 紅血球M抗原（erythrocyte M antigen）<br>•\t選項剖析：<br>o\tA 正確： EBV 利用套膜蛋白 gp350 結合 B 細胞表面的 CD21（CR2）。<br>o\tB 正確： 流感病毒的血球凝集素（HA）結合呼吸道上皮細胞表面的水楊酸（Sialic acid）。<br>o\tC 錯誤： 微小病毒 B19（Parvovirus B19）結合的是紅血球前驅細胞表面的 P 抗原（P antigen / Globoside），而非 M 抗原。<br>o\tD 正確： 鼻病毒（Rhinovirus）主要結合呼吸道上皮細胞的 ICAM-1 分子。"},{"originalId":113,"question":"有關人類多瘤病毒（Human polyomavirus）的敘述，下列何者錯誤？","options":["A. 包括BK病毒及JC病毒","B. 不具有外套膜（envelope）","C. JC病毒感染免疫不全病人，常造成去髓鞘（demyelination）病變","D. T抗原可以活化p53，促進細胞死亡"],"correctIndex":3,"explanation":"人類多瘤病毒（Human polyomavirus）<br>•\t正確答案：D. T抗原可以活化p53，促進細胞死亡<br>•\t選項剖析：<br>o\tD 錯誤： 多瘤病毒（如 JC 病毒、BK 病毒及 SV40）的致癌機制，是利用其「大 T 抗原（Large T antigen）」去結合並抑制（去活化）腫瘤抑制蛋白 p53 與 Rb，藉此阻止細胞凋亡（死亡）並強迫細胞進入增殖期以利病毒複製。選項說「活化 p53、促進死亡」完全相反。<br>o\tA、B、C 皆為正確敘述。JC 病毒專攻少突膠質細胞，引發進行性多灶性白質腦病（PML）。"},{"originalId":114,"question":"下列三類病毒，何者可在神經系統造成如圖箭頭所指的病變？\n①水痘－帶狀疱疹病毒（Varicella-zoster virus） ②腸病毒（Enterovirus genus） ③西尼羅河病毒（West Nile virus）","options":["A. 僅①","B. 僅②","C. 僅①②","D. ①②③"],"correctIndex":3,"explanation":"神經系統（脊髓前角）病變<br>(本題國考常附圖標示脊髓「前角細胞 / 運動神經元」被破壞，引發無力麻痺)<br>•\t正確答案：D. ①②③<br>•\t選項剖析與邏輯解碼：<br>o\t這是一題著名的「刪去法與選項邏輯題」。<br>o\t② 腸病毒（如小兒麻痺、EV71） 與 ③ 西尼羅河病毒（WNV） 都能破壞脊髓前角，引起經典的「急性無力脊髓炎（AFP） / 類似小兒麻痺症狀」，這在醫學上是鐵證。<br>o\t① 水痘帶狀疱疹病毒（VZV）主要潛伏在背根神經節（感覺神經），但臨床上在極少數重症情況下，它確實可以蔓延侵犯前角細胞導致運動麻痺（Zoster paresis）。<br>o\t既然 ② 和 ③ 都正確，而選項中包含 ③ 的只有 D 選項（①②③），因此在國考邏輯上只能選 D。"},{"originalId":115,"question":"下列疾病中，何者與Epstein-Barr病毒的感染最無關？","options":["A. 鼻咽癌（nasopharyngeal carcinoma）","B. 慢性骨髓性白血病（chronic myelogenous leukemia）","C. 霍金氏疾病（Hodgkin's disease）","D. 布奇氏淋巴瘤（Burkitt's lymphoma）"],"correctIndex":1,"explanation":"與 Epstein-Barr 病毒最無關的疾病<br>•\t正確答案：B. 慢性骨髓性白血病（chronic myelogenous leukemia, CML）<br>•\t選項剖析：<br>o\tB 正確（最無關）： CML 的發病機制是因為第 9 對與第 22 對染色體發生易位（費城染色體），產生 BCR-ABL 融合基因所致，與病毒感染毫無關聯。<br>o\tA（鼻咽癌）、C（霍奇金氏淋巴瘤）、D（伯奇氏淋巴瘤）皆是被 WHO 明確列為與 EBV 感染具有高度因果關係的惡性腫瘤。"},{"originalId":116,"question":"下列那一項臨床檢驗項目，是常規做為評估以高效能雞尾酒治療愛滋病（AIDS）效果的主要指標？","options":["A. p24抗原（antigen）之測定","B. CD4:CD8 T-cell比例之測定","C. 血漿中人類免疫缺陷病毒（HIV）病毒量之測定","D. HIV抗原/抗體（antigen/antibody）組合測試（combo test）"],"correctIndex":2,"explanation":"評估愛滋病（AIDS）HAART 療效指標<br>•\t正確答案：C. 血漿中人類免疫缺陷病毒（HIV）病毒量之測定<br>•\t選項剖析：<br>o\tC 正確： 評估抗愛滋藥物（雞尾酒療法）有沒有效、病人有沒有按時服藥，或是病毒是否產生抗藥性，最直接且最靈敏的黃金標準就是測量血液中的 HIV RNA 病毒載量（Viral load）。若治療成功，病毒量應下降至測不到的水平。<br>o\tB 錯誤：CD4 數量是用來評估「免疫系統破壞程度」與「是否需預防伺機性感染」，反應速度不如病毒量快。<br>o\tA、D 錯誤：這些是用作初期「診斷篩檢」的工具，不適合用來追蹤療效。"},{"originalId":117,"question":"在器官移植之後，下列那一種病毒最可能造成器官移植感染，且對於抗病毒藥物很容易產生抗藥性？","options":["A. 腺病毒（Adenovirus）","B. 人類巨細胞病毒 （Cytomegalovirus）","C. B型肝炎病毒（Hepatitis B virus）","D. 冠狀病毒SARS CoV"],"correctIndex":1,"explanation":"器官移植後常見伺機性感染與抗藥性<br>•\t正確答案：B. 人類巨細胞病毒 （Cytomegalovirus, CMV）<br>•\t選項剖析：<br>o\tB 正確： CMV 是器官移植（特別是骨髓移植或腎移植）患者最致命且最常見的伺機性病毒。此外，在長期給予首選藥物（Ganciclovir）治療後，CMV 容易發生 UL97（激酶）或 UL54（聚合酶）基因突變，導致嚴重的抗藥性問題。"},{"originalId":118,"question":"下列何種病毒，最不會經由性接觸而傳染？","options":["A. 第一型人類嗜Ｔ淋巴球病毒（Human T-cell lymphotropic virus-1, HTLV-1）","B. 巨細胞病毒（Cytomegalovirus, CMV）","C. A型肝炎病毒（Hepatitis A virus, HAV）","D. C型肝炎病毒（Hepatitis C virus, HCV）"],"correctIndex":2,"explanation":"最不會經由性接觸傳染的病毒<br>•\t正確答案：C. A型肝炎病毒（Hepatitis A virus, HAV）<br>•\t選項剖析：<br>o\tC 正確： A型肝炎是標準的腸道傳染病（糞口途徑傳播）。雖然在特定極端親密接觸（如口肛交）中可能傳染，但比起血液及體液傳播的 B 肝、C 肝、HIV、CMV 等，它「經由常規性接觸傳播」的機率微乎其微。"},{"originalId":119,"question":"關於腮腺炎（mumps）的敘述，下列何者錯誤？","options":["A. 是透過呼吸道上皮細胞傳染的疾病","B. 感染都只有呼吸道症狀，不會造成全身性的感染","C. 腮腺炎病毒可以存在尿液中","D. 腮腺炎病毒減毒疫苗的效果很好，是目前使用的三合一疫苗中的一種成分"],"correctIndex":1,"explanation":"腮腺炎（mumps）<br>•\t正確答案：B. 感染都只有呼吸道症狀，不會造成全身性的感染<br>•\t選項剖析：<br>o\tB 錯誤： 腮腺炎病毒雖然由呼吸道入侵，但它絕對會引發病毒血症（全身性感染）！除了最典型的腮腺腫大外，病毒常會侵犯生殖腺（男性引發睪丸炎導致不孕、女性卵巢炎）、胰臟（胰臟炎），甚至中樞神經（無菌性腦膜炎）。<br>o\tA、C、D 皆為正確敘述。減毒活疫苗是 MMR（麻疹、腮腺炎、德國麻疹）三合一疫苗的成分。"},{"originalId":120,"question":"有關病毒（viruses）複製的敘述，下列何者錯誤？","options":["A. 具外套膜（envelope）的病毒一般對環境的抗性較低","B. RNA病毒之複製大部分是在細胞質中進行","C. RNA病毒之複製大部分不需要宿主細胞的酵素","D. 具有外套膜的病毒主要藉由細胞溶解（lysis）而釋出細胞外"],"correctIndex":3,"explanation":"病毒（viruses）複製<br>•\t正確答案：D. 具有外套膜的病毒主要藉由細胞溶解（lysis）而釋出細胞外<br>•\t選項剖析：<br>o\tD 錯誤： 這是基礎病毒學必考觀念。具有外套膜（Envelope）的病毒，為了要獲得那層膜，它們離開細胞的方式是溫和的出芽（Budding），不會立刻使宿主細胞破裂。相反地，無外套膜（Naked）的病毒才會在細胞內大量組裝後，直接撐破細胞膜，造成細胞溶解（Lysis）釋出。<br>o\tA 正確：外套膜主要成分是脂質，對乾燥、酸、洗手乳、乙醚極為敏感，故環境抗性低。<br>o\tB、C 正確：多數 RNA 病毒在細胞質複製，並自帶/編碼自己的 RNA 聚合酶。"},{"originalId":121,"question":"在生產過程中，從母親傳給嬰兒的肝炎病毒，下列何者最常見？","options":["A. A型","B. B型","C. C型","D. D型"],"correctIndex":1,"explanation":"母子垂直傳播最常見的肝炎病毒<br>•\t正確答案：B. B型（HBV）<br>•\t選項剖析：<br>o\tB 正確： 在台灣及亞洲等高盛行地區，B 型肝炎最主要的傳播途徑就是周產期傳染（母嬰垂直感染）。嬰兒免疫系統尚未成熟時若遭受感染，有高達 90% 會轉為終身慢性帶原。C 型雖然也會，但機率遠低於 B 肝。"},{"originalId":122,"question":"關於傳染性蛋白質（prion）所引起之疾病的敘述，下列何者錯誤？","options":["A. 潛伏期很長","B. 會引起激烈的免疫反應","C. 可經由眼角膜移植傳染","D. 病人常會有失智（dementia）症狀"],"correctIndex":1,"explanation":"傳染性蛋白質（prion）<br>•\t正確答案：B. 會引起激烈的免疫反應<br>•\t選項剖析：<br>o\tB 錯誤： 普里昂蛋白（Prion）本身是宿主體內原本就有的正常蛋白質（$PrP^C$）發生結構摺疊錯誤變成的異常構型（$PrP^{Sc}$）。因為是「自己人」的胺基酸序列，人體的免疫系統完全無法辨識它為外來物，因此絕對不會引發任何發炎或免疫反應。<br>o\tA、C、D 正確：潛伏期極長（數年至數十年）、會引發海綿狀腦病變（失智），並可透過受汙染的手術器械或角膜移植傳染。"},{"originalId":123,"question":"某一老人照護中心發生群聚感染，有25位長者出現水樣下痢、噁心及嘔吐等，症狀持續12至60小時不等。此最可能由下列何種病毒所引起？","options":["A. 巨細胞病毒（Cytomegalovirus）","B. 漢坦病毒（Hantaan virus）","C. 諾羅病毒（Norovirus）","D. B型肝炎病毒（Hepatitis B virus）"],"correctIndex":2,"explanation":"老人照護中心群聚腸胃炎<br>•\t正確答案：C. 諾羅病毒（Norovirus）<br>•\t選項剖析：<br>o\tC 正確： 「人口密集封閉空間（安養院、軍營、郵輪）」+「集體爆發急性水瀉嘔吐」+「短病程（1-3天內緩解）」，這是諾羅病毒在臨床考題中的標準起手式。輪狀病毒主要考點則會設定在「嬰幼兒」。"},{"originalId":124,"question":"有關狂犬病（rabies）之敘述，下列何者正確？","options":["A. 被感染了狂犬病細菌的病狗咬傷所引起的","B. 最初的入侵部位為肌肉；最終之感染部位為心臟","C. 最好的預防策略是對動物施打疫苗","D. 病原細菌入侵僅數天即嚴重發病"],"correctIndex":2,"explanation":"狂犬病（rabies）<br>•\t正確答案：C. 最好的預防策略是對動物施打疫苗<br>•\t選項剖析：<br>o\tC 正確： 狂犬病是人畜共通傳染病。只要阻斷了傳染源（為犬貓及野生動物施打狂犬病疫苗），就能在公衛源頭上徹底預防人類感染。<br>o\tA 錯誤：狂犬病是「病毒」引起，不是細菌。<br>o\tB 錯誤：最初在肌肉複製，最終沿神經上行破壞的是大腦中樞神經系統，而非心臟。<br>o\tD 錯誤：狂犬病潛伏期極長（數週至數月，甚至一年以上），並非入侵數天即發病。"},{"originalId":125,"question":"欲由登革熱患者身上分離病毒時，取患者下列那種檢體最適合？","options":["A. 喉頭拭子（throat swab）","B. 血液","C. 皮膚","D. 肛門拭子（anal swab）"],"correctIndex":1,"explanation":"登革熱病毒分離檢體<br>•\t正確答案：B. 血液<br>•\t選項剖析：<br>o\tB 正確： 登革熱病毒是由蚊子直接將病毒注入人體微血管。在病人發病初期的前 3 到 5 天（發燒期），血液中會出現極高濃度的病毒血症（Viremia）。此時抽血進行病毒分離或 RT-PCR 是最準確的黃金診斷期。"},{"originalId":126,"question":"關於人類免疫缺陷病毒（Human immunodeficiency virus, HIV）致病機轉之敘述，下列何者錯誤？","options":["A. 可造成巨噬細胞（macrophage）功能變差","B. 會引起CD4 T淋巴球（lymphocyte）減少","C. 感染B淋巴球，造成免疫功能下降","D. CD8 T淋巴球/CD4 T淋巴球比例上升"],"correctIndex":2,"explanation":"HIV 致病機轉<br>•\t正確答案：C. 感染B淋巴球，造成免疫功能下降<br>•\t選項剖析：<br>o\tC 錯誤： HIV 不會直接感染 B 淋巴球。它的表面受體 gp120 專一性辨識 CD4 分子，因此只會感染 CD4+ 輔助 T 細胞、巨噬細胞及樹突細胞。<br>o\tB、D 正確：因為 CD4 T 細胞被大量破壞殺死，數量銳減，導致 CD8/CD4 比例倒置（上升）。"},{"originalId":127,"question":"下列何者為最常造成人類病毒性心臟炎（carditis）的病原？","options":["A. 流行性感冒病毒（Influenza virus）","B. 單純疱疹病毒（Herpes simplex virus）","C. B型克沙奇病毒（Coxsackie B virus）","D. 71型腸病毒（Enterovirus 71）"],"correctIndex":2,"explanation":"病毒性心臟炎（carditis）<br>•\t正確答案：C. B型克沙奇病毒（Coxsackie B virus）<br>•\t選項剖析：<br>o\tC 正確： 在所有病毒中，克沙奇 B 型病毒（Coxsackie B）是最惡名昭彰的「嗜心肌性」病毒。它是引發人類急性病毒性心肌炎、心包膜炎及流行性胸膜痛（Pleurodynia）最常見的元凶。"},{"originalId":128,"question":"第一個經研究證實疫苗注射與人類癌症之預防有相關的是下列那一項疫苗注射？","options":["A. 牛痘疫苗","B. 沙克疫苗","C. 人類乳突病毒疫苗","D. B型肝炎疫苗"],"correctIndex":3,"explanation":"人類首支預防癌症疫苗<br>•\t正確答案：D. B型肝炎疫苗<br>•\t選項剖析：<br>o\tD 正確： 台灣自 1984 年起實施新生兒全面施打 B 肝疫苗計畫後，成功讓兒童期及青少年期的肝細胞癌（HCC）發生率驟降。這使 B 肝疫苗成為醫學史上第一支被臨床大規模數據證實能「預防人類癌症」的疫苗。HPV 疫苗則是後來才出現的第二支。"},{"originalId":129,"question":"有關肝炎病毒中，下列何者與黃熱病毒（yellow fever virus）屬同一科？","options":["A. Hepatitis A virus","B. Hepatitis B virus","C. Hepatitis C virus","D. Hepatitis D virus"],"correctIndex":2,"explanation":"與黃熱病毒（yellow fever virus）同科<br>•\t正確答案：C. Hepatitis C virus (C型肝炎病毒)<br>•\t選項剖析：<br>o\tC 正確： 黃熱病毒屬於黃病毒科（Flaviviridae）。肝炎病毒中，唯有 C 型肝炎病毒（HCV） 同樣屬於黃病毒科。<br>o\tHAV 是小 RNA 病毒科；HBV 是肝去氧核糖核酸病毒科（Hepadnaviridae）；HDV 是缺陷的三角病毒科（Deltaviridae）。"},{"originalId":130,"question":"下列那一種造成呼吸道感染的病毒，可不經由反轉錄作用（reverse transcription），而直接以polymerase chain reaction（PCR）檢測？","options":["A. 腺病毒（adenovirus）","B. A型流感病毒（influenza A virus）","C. 中東呼吸症候群冠狀病毒（MERS-CoV）","D. 呼吸道細胞融合病毒（respiratory syncytial virus）"],"correctIndex":0,"explanation":"不須經反轉錄作用（RT）即可 PCR 檢測<br>•\t正確答案：A. 腺病毒（adenovirus）<br>•\t選項剖析：<br>o\tA 正確： PCR（聚合酶連鎖反應）只能用來擴增 DNA。在選項中，只有腺病毒（Adenovirus）是 DNA 病毒，所以可以直接抽核酸做 PCR。<br>o\tB、C、D 皆為 RNA 病毒（流感、MERS、RSV）。要檢測它們的基因，必須先用反轉錄酶（Reverse transcriptase）把它們的 RNA 轉成 cDNA，這叫做 RT-PCR。"},{"originalId":131,"question":"有關人類乳突瘤病毒（Human Papillomavirus, HPV）的敘述，下列何者錯誤？","options":["A. HPV-6和HPV-11是引起子宮頸癌的低危險病毒株","B. E5 病毒蛋白質會與p53結合","C. E7病毒蛋白質會與p105RB蛋白質結合","D. E1蛋白質與病毒的複製有關"],"correctIndex":1,"explanation":"人類乳突瘤病毒（HPV）<br>•\t正確答案：B. E5 病毒蛋白質會與p53結合<br>•\t選項剖析：<br>o\tB 錯誤： 這是 HPV 最愛考的基因配對題。HPV 的致癌雙煞中：E6 蛋白會結合並降解 p53；而 E7 蛋白會結合並抑制 Rb（p105RB）。選項把 E5 誤寫成與 p53 結合了。<br>o\tA 正確：HPV 6、11 型是低危險型，主要引起尖形濕疣（菜花）。"},{"originalId":132,"question":"下列何種病毒，通常不經過垂直感染傳給胎兒？","options":["A. 德國麻疹病毒（Rubella virus）","B. 巨細胞病毒（Cytomegalovirus）","C. 呼腸病毒（Reovirus）","D. 單純疱疹病毒（Herpes simplex virus）"],"correctIndex":2,"explanation":"通常不經過垂直感染（母嬰感染）的病毒<br>•\t正確答案：C. 呼腸病毒（Reovirus）<br>•\t選項剖析：<br>o\tC 正確： 呼腸孤病毒科（如輪狀病毒）主要透過糞口途徑引起局部腸胃道感染，極少發生病毒血症進入胎盤，不會造成垂直感染。<br>o\tA、B、D 錯誤：德國麻疹（Rubella）、巨細胞病毒（CMV）、單純疱疹病毒（HSV）都是醫學上赫赫有名的 TORCH 綜合徵 成員，是專門會穿過胎盤或產道引發嚴重胎兒畸形與缺陷的垂直感染殺手。"},{"originalId":133,"question":"下列何種病毒複製時，會在細胞質產生一種稱為內基氏小體（Negri body）的包涵體？","options":["A. 天花病毒（variola virus）","B. 狂犬病病毒（rabies virus）","C. 人類巨細胞病毒（human cytomegalovirus）","D. 水痘–帶狀疱疹病毒（varicella-zoster virus）"],"correctIndex":1,"explanation":"內基氏小體（Negri body）<br>•\t正確答案：B. 狂犬病病毒（rabies virus）<br>•\t選項剖析：<br>o\tB 正確： 狂犬病病毒在感染神經系統後，會在大腦海馬迴或小腦的柏金氏細胞的細胞質內，形成特異性的嗜酸性包涵體，這就是著名的內基氏小體（Negri body），是狂犬病死後病理診斷的鐵證。"},{"originalId":134,"question":"人類腺病毒（adenovirus）與下列何種病毒使用相同的細胞受器（receptor）？","options":["A. B型克沙奇病毒（Coxsackie B virus）","B. 諾羅病毒（Norovirus）","C. 巨細胞病毒（Cytomegalovirus）","D. 流感病毒（Influenza virus）"],"correctIndex":0,"explanation":"與腺病毒共享受器的病毒<br>•\t正確答案：A. B型克沙奇病毒（Coxsackie B virus）<br>•\t選項剖析：<br>o\tA 正確： 這是病毒學的一個冷知識考點。這兩種病毒會競爭宿主細胞表面同一種膜蛋白受體來進入細胞。科學家為此將該受體直接命名為 CAR (Coxsackievirus and Adenovirus Receptor)。"},{"originalId":135,"question":"關於抗病毒藥物acyclovir之敘述，下列何者正確？","options":["A. 為adenosine衍生物","B. 須被宿主細胞之thymidine kinase加入第一個磷酸根後才易被活化產生藥效","C. 只會作用於被病毒感染細胞，不會影響其他正常細胞","D. 用于治療人類免疫缺乏病毒（human immunodeficiency virus）感染所引起之疾病"],"correctIndex":2,"explanation":"抗病毒藥物 Acyclovir<br>•\t正確答案：C. 只會作用於被病毒感染細胞，不會影響其他正常細胞<br>•\t選項剖析：<br>o\tC 正確： Acyclovir 是一種必須被「磷酸化」三次才能啟動活性的前驅藥。它最巧妙的設計在於：第一步的磷酸化，只能由疱疹病毒自己產生的「胸苷激酶（Viral TK）」來完成。因此，藥物進入未受感染的正常細胞時就像是休眠狀態，完全無毒，特異性極高！<br>o\tA 錯誤：它是鳥苷（Guanosine）衍生物。<br>o\tB 錯誤：是需要「病毒」的，而非「宿主」的胸苷激酶。<br>o\tD 錯誤：它是用來治療 HSV 與 VZV（疱疹病毒科）的特效藥，對 HIV 無效。"},{"originalId":136,"question":"下列何種病毒感染會造成單核球增多、嗜異性抗體（heterophile antibody）陰性以及肝炎的症狀？","options":["A. Epstein-Barr virus","B. Human herpesvirus-6","C. Human T-cell lymphotropic virus type 1","D. Cytomegalovirus"],"correctIndex":3,"explanation":"單核球增多、嗜異性抗體（heterophile antibody）陰性<br>•\t正確答案：D. Cytomegalovirus (巨細胞病毒)<br>•\t選項剖析：<br>o\tD 正確： 「傳染性單核球增多症（Mono）」有兩大元凶：<br>1.\tEB 病毒：最常見，檢測患者血清中的嗜異性抗體會呈現「陽性」。<br>2.\t巨細胞病毒（CMV）：臨床症狀與 EBV 幾乎一模一樣，但它誘發的嗜異性抗體檢測為「陰性」。這題出現「陰性」關鍵字，秒選 CMV。"},{"originalId":137,"question":"下列關於HIV（Human immunodeficiency virus）的敘述，何者錯誤？","options":["A. M-tropic病毒會利用CXCR4當作其細胞的受器之一","B. T-tropic病毒通常會隨著病人病程的進展而增加","C. Kaposi’s sarcoma是常見於愛滋病人的癌症","D. CD4 T細胞數目降至200/μL 以下，易出現伺機性感染"],"correctIndex":0,"explanation":"HIV 的趨性與受器<br>•\t正確答案：A. M-tropic病毒會利用CXCR4當作其細胞的受器之一<br>•\t選項剖析：<br>o\tA 錯誤： 也是極經典的選項相反題。<br>\t初期感染的病毒是 M-tropic（嗜巨噬細胞型），利用的是 CCR5 輔助受體。<br>\t疾病晚期突變出來的才是 T-tropic（嗜T細胞型），利用的才是 CXCR4 輔助受體。<br>o\tC 正確：卡波西氏肉瘤（HHV-8 引起）是愛滋病發病最經典的指標癌症。<br>o\tD 正確：CD4 降至 200/μL 以下，是正式宣告進入「愛滋病（AIDS）階段」的診斷標準。"},{"originalId":138,"question":"膿性指頭炎（whitlow）是由那一種病毒所引起？","options":["A. Cytomegalovirus","B. Herpes simplex virus","C. Human papillomavirus","D. Human herpesvirus-6"],"correctIndex":1,"explanation":"膿性指頭炎（Herpetic whitlow）<br>•\t正確答案：B. Herpes simplex virus (單純疱疹病毒)<br>•\t選項剖析：<br>o\tB 正確： 當醫護人員的手指（特別是甲溝周圍微小傷口）未戴手套接觸到病患口腔或生殖器的水疱分泌物時，HSV 病毒會鑽入指頭引發劇痛的群聚性水疱，這在職業醫學上稱為疱疹性指頭疽（Herpetic whitlow）。"},{"originalId":139,"question":"下列有關Parvoviridae的敘述，何者錯誤？","options":["A. Adenovirus-associated virus屬於這一科的病毒","B. 雙股DNA病毒","C. 沒有外套（envelope）","D. 結構屬於二十面體的病毒"],"correctIndex":1,"explanation":"細小病毒科（Parvoviridae）<br>•\t正確答案：B. 雙股DNA病毒<br>•\t選項剖析：<br>o\tB 錯誤： 病毒學 DNA 家族中，「Parvo (微小)」就是代表它小到只能容納單股基因。細小病毒科是極少數的單股 DNA（ssDNA）病毒。<br>o\tA 正確：AAV (Adeno-associated virus) 確實屬於此科，常被用於基因治療載體。<br>o\tC、D 正確：無套膜、具有二十面體對稱衣殼。"},{"originalId":140,"question":"下列何種病毒具有雙層蛋白衣（double-layered capsid），需經胰蛋白酶消化成ISVP（intermediate/infectious subviral particle）後才會增強其感染能力？","options":["A. 諾羅病毒（Norovirus）","B. 輪狀病毒（Rotavirus）","C. 副流感病毒（Parainfluenza virus）","D. 麻疹病毒（Measles virus）"],"correctIndex":1,"explanation":"雙層蛋白衣、ISVP<br>•\t正確答案：B. 輪狀病毒（Rotavirus）<br>•\t選項剖析：<br>o\tB 正確： 輪狀病毒屬於呼腸孤病毒科（Reoviridae），其形態特徵就是具有極其堅固的雙層甚至三層蛋白衣。當它進入宿主小腸時，外層蛋白被腸道內的胰蛋白酶（Trypsin）局部切斷消化後，會變成「感染性亞病毒顆粒（ISVP）」，此時它的感染能力反而會大幅躍升，這是輪狀病毒入侵細胞的獨門絕技。"},{"originalId":141,"question":"感染下列何種病毒，有機會經多年後復發引起亞急性硬化全腦炎（subacute sclerosing panencephalitis)？","options":["A. 麻疹病毒（Measles virus）","B. 腮腺炎病毒（Mumps virus）","C. 立百病毒（Nipah virus）","D. 亨得拉病毒（Hendra virus）"],"correctIndex":0,"explanation":"亞急性硬化全腦炎 (SSPE)<br>•\t正確答案：A. 麻疹病毒 (Measles virus)<br>•\t選項剖析：<br>o\tA 正確： 亞急性硬化全腦炎 (Subacute Sclerosing Panencephalitis, SSPE) 是一種罕見但致命的中樞神經系統退化性疾病。它是由於麻疹病毒發生變異（特別是 M 蛋白缺陷），在初次感染數年（通常 7 到 10 年）後潛伏於腦部再次活化所引起。<br>o\tB、C、D 錯誤：腮腺炎病毒主要引起腦膜炎；立百病毒和亨得拉病毒屬於副黏液病毒科，主要透過蝙蝠傳播，會引發急性嚴重腦炎，但沒有長期潛伏引發 SSPE 的特徵。"},{"originalId":142,"question":"現在已知的肝炎病毒中，下列那一項敘述錯誤？","options":["A. A型和E型傳染途徑為糞口傳染","B. A、C、D與E型之核酸均為RNA，唯有B型為部分雙股環狀（partially double-strandedcricular）DNA","C. B和C型可導致慢性肝炎","D. D型肝炎需A型之幫助來傳染和複製"],"correctIndex":3,"explanation":"肝炎病毒特性<br>•\t正確答案：D. D型肝炎需A型之幫助來傳染和複製<br>•\t選項剖析：<br>o\tD 錯誤： D 型肝炎病毒 (HDV) 是一種缺陷型 RNA 病毒，它需要的是 B 型肝炎病毒 (HBV) 的表面抗原 (HBsAg) 作為其外套膜，才能完成組裝與感染，而非依賴 A 型肝炎。<br>o\tA 正確：A 型 (HAV) 與 E 型 (HEV) 皆為腸道傳染的肝炎，傳播途徑是糞口傳染。<br>o\tB 正確：在所有肝炎病毒中，只有 B 型肝炎病毒 (HBV) 是 DNA 病毒（且為部分雙股環狀 DNA），其餘皆為 RNA 病毒。<br>o\tC 正確：B 型與 C 型肝炎病毒容易演變成慢性肝炎、肝硬化，甚至肝細胞癌。"},{"originalId":143,"question":"HIV-1各分離株（isolates）之間常有變異性，尤其那個基因差異最大？","options":["A. env","B. gag","C. pol","D. LTR"],"correctIndex":0,"explanation":"HIV-1 基因變異性<br>•\t正確答案：A. env<br>•\t選項剖析：<br>o\tA 正確： HIV-1 基因體中，env (envelope) 基因負責編碼外套膜醣蛋白 (gp120 與 gp41)。為了逃避宿主的免疫系統追捕（抗體中和），env 基因區域（特別是 gp120 的高變區 hypervariable regions, 如 V3 loop）的突變率極高，這也是愛滋病疫苗極難研發的主要原因。<br>o\tB, C 錯誤：gag 編碼結構蛋白 (如 p24)，pol 編碼核心酵素 (如反轉錄酶)。這兩者的保守性較高，變異較小。<br>o\tD 錯誤：LTR 是長末端重複序列，負責基因調控。"},{"originalId":144,"question":"下列那一種DNA病毒具有不同的血清型，會造成上呼吸道、結膜以及腸胃道的感染？","options":["A. 乳突瘤病毒（Papillomavirus）","B. 腺病毒（Adenovirus）","C. 痘病毒（Poxvirus）","D. B19細小病毒（Parvovirus B19）"],"correctIndex":1,"explanation":"多種感染表現的 DNA 病毒<br>•\t正確答案：B. 腺病毒 (Adenovirus)<br>•\t選項剖析：<br>o\tB 正確： 腺病毒是一種無套膜的 DNA 病毒，具有超過 50 種以上的血清型。不同的血清型對應不同的組織嗜性，可引起多種疾病，最經典的三大類為：上呼吸道感染（如咽炎）、眼部感染（如流行性角膜結膜炎/紅眼症）以及腸胃炎（特別是 40、41 型）。<br>o\tA 錯誤：乳突瘤病毒 (HPV) 引起疣及子宮頸癌。<br>o\tC 錯誤：痘病毒引起天花、軟疣等皮膚病變。<br>o\tD 錯誤：B19 病毒主要引起傳染性紅斑及貧血危機。"},{"originalId":145,"question":"常用來治療疱疹病毒的阿昔洛韋（Acyclovir）會被病毒的何種酵素磷酸化，進而抑制病毒的複製？","options":["A. 胞苷激酶（cytidine kinase）","B. 胸苷激酶（thymidine kinase）","C. 酪氨酸激酶（tyrosine kinase）","D. 周期蛋白依賴性激酶（cyclin dependent kinase）"],"correctIndex":1,"explanation":"Acyclovir 的磷酸化機制<br>•\t正確答案：B. 胸苷激酶 (thymidine kinase)<br>•\t選項剖析：<br>o\tB 正確： Acyclovir 是一種必須被活化才能生效的前驅藥物。它進入細胞後，必須由疱疹病毒自己編碼的胸苷激酶 (Viral Thymidine kinase, TK) 加上第一個磷酸根。這個機制讓 Acyclovir 只在「受病毒感染的細胞」內活化，對正常細胞無毒性，特異性極高。"},{"originalId":146,"question":"有關痘病毒（Poxvirus）的敘述，下列何者錯誤？","options":["A. 是最大的人類DNA病毒","B. 完全在細胞質中複製","C. 自己攜帶核醣核酸聚合酶（RNA polymerase），供基因轉錄","D. 動物的痘病毒不會傳給人"],"correctIndex":3,"explanation":"痘病毒 (Poxvirus) 特性<br>•\t正確答案：D. 動物的痘病毒不會傳給人<br>•\t選項剖析：<br>o\tD 錯誤： 許多動物的痘病毒都是典型的人畜共通傳染病，會傳染給人類！例如：猴痘 (Mpox)、牛痘 (Cowpox)、傳染性膿疱病毒 (Orf，羊傳人) 等等。<br>o\tA、B、C 皆為正確的痘病毒特徵。它是體積最大的人類病毒，雖然是 DNA 病毒，但因為自備了完整的轉錄與複製酵素（如 RNA 聚合酶、DNA 聚合酶），所以可以完全在細胞質中複製，不需進入細胞核。"},{"originalId":147,"question":"下列何種病毒不屬於腸病毒屬（Genus enterovirus）？","options":["A. 脊髓灰白質炎病毒（Poliovirus）","B. 輪狀病毒（Rotavirus）","C. 克沙奇病毒（Coxsackie virus）","D. 埃可病毒（Echovirus）"],"correctIndex":1,"explanation":"腸病毒屬 (Genus Enterovirus)<br>•\t正確答案：B. 輪狀病毒 (Rotavirus)<br>•\t選項剖析：<br>o\tB 正確（不屬於）： 輪狀病毒 (Rotavirus) 屬於呼腸孤病毒科 (Reoviridae)，其特徵為雙股 RNA、雙層衣殼。<br>o\tA、C、D 錯誤：脊髓灰白質炎病毒（小兒麻痺）、克沙奇病毒、伊科病毒 (Echovirus) 以及新型的腸病毒 (如 EV71)，全數歸類在小 RNA 病毒科 (Picornaviridae) 的腸病毒屬 (Enterovirus) 內。"},{"originalId":148,"question":"血球凝集（hemagglutination）試驗，不適用於下列何種病毒的檢測？","options":["A. 呼吸道細胞融合病毒（Respiratory syncytial virus）","B. 腮腺炎病毒（Mumps virus）","C. 副流感病毒（Parainfluenza virus）","D. 麻疹病毒（Measles virus）"],"correctIndex":0,"explanation":"血球凝集試驗 (Hemagglutination assay)<br>•\t正確答案：A. 呼吸道細胞融合病毒 (Respiratory syncytial virus, RSV)<br>•\t選項剖析：<br>o\tA 正確： 呼吸道細胞融合病毒 (RSV) 表面缺乏血球凝集素 (Hemagglutinin, HA) 及神經氨酸酶 (NA)，它是利用 G 醣蛋白來吸附宿主細胞。因為沒有 HA，所以無法用血球凝集試驗來檢測。<br>o\tB、C、D 錯誤：腮腺炎、副流感、麻疹等同屬於副黏液病毒科的其他成員，其表面皆帶有血球凝集素，可進行血球凝集試驗。"},{"originalId":149,"question":"關於羊搔癢症傳染性蛋白質（scrapie-like prion protein, PrPSC）的特性，下列何者錯誤？","options":["A. 是由基因突變所產生","B. 對福馬林有抗性","C. 能抵抗80℃高溫","D. 能抵抗紫外線"],"correctIndex":0,"explanation":"Prion (傳染性蛋白質) 的特性<br>•\t正確答案：A. 是由基因突變所產生<br>•\t選項剖析：<br>o\tA 錯誤： 羊搔癢症及大多數人類的散發性庫賈氏病 (sCJD)，其致病的 $PrP^{Sc}$ 是由正常蛋白質 $PrP^C$ 發生三維結構的錯誤摺疊（二面角改變，增加大量 beta-sheet）而來，並非基因突變。只有家族遺傳型的 Prion 疾病才與 PRNP 基因突變有關。<br>o\tB、C、D 正確：Prion 不含核酸，對物理（高溫 80℃ 以上、紫外線）及化學（福馬林、一般消毒水）極具抵抗力。"},{"originalId":150,"question":"EB病毒（Epstein-Barr virus）主要感染B淋巴球；它是以該細胞表面的何種分子為受體（receptor）？","options":["A. CR2","B. CD4","C. CD8","D. 醣蛋白（glycoprotein）"],"correctIndex":0,"explanation":"EB 病毒 (EBV) 的受體<br>•\t正確答案：A. CR2<br>•\t選項剖析：<br>o\tA 正確： EB 病毒利用其表面的醣蛋白 gp350/220，專一性結合 B 淋巴球表面的補體受體 CR2 (也稱為 CD21 分子)，藉此入侵 B 細胞。這是一個極常考的「受體-配體」配對題。<br>o\tB 錯誤：CD4 是 HIV 的受體。"},{"originalId":151,"question":"下列何者為減毒性活菌疫苗？","options":["A. 沙克疫苗（小兒麻痺注射疫苗）","B. 流行性感冒疫苗","C. 卡介苗（肺結核疫苗）","D. 破傷風疫苗"],"correctIndex":2,"explanation":"疫苗種類<br>•\t正確答案：C. 卡介苗 (肺結核疫苗)<br>•\t選項剖析：<br>o\tC 正確： 卡介苗 (Bacillus Calmette-Guérin, BCG) 是利用減毒的牛分枝桿菌製成的活菌疫苗。<br>o\tA 錯誤：沙克 (Salk) 疫苗為去活化/死毒 (Inactivated) 疫苗。<br>o\tB 錯誤：流感注射疫苗為死毒疫苗。<br>o\tD 錯誤：破傷風疫苗為類毒素 (Toxoid) 疫苗。"},{"originalId":152,"question":"會感染人體的致病性微生物種類繁多，但是只有少數被證明與癌症致病機轉有關。下列那一種細胞內感染的微生物有較強的證據會引起人類的癌症？","options":["A. 腸病毒七十一型","B. EB病毒（Epstein-Barr virus）","C. 鏈球菌","D. 結核分支桿菌"],"correctIndex":1,"explanation":"與癌症相關的感染原<br>•\t正確答案：B. EB病毒 (Epstein-Barr virus)<br>•\t選項剖析：<br>o\tB 正確： EB 病毒被世界衛生組織 (WHO) 列為第一級致癌物。它有極強的證據顯示與多種人類惡性腫瘤相關，包含伯奇氏淋巴瘤 (Burkitt's lymphoma)、鼻咽癌 (NPC) 以及霍奇金氏淋巴瘤等。"},{"originalId":153,"question":"下列關於傳染性紅斑症（erythema infectiosum）的敘述，何者錯誤？","options":["A. 臉部紅疹出現在類感冒症狀之後","B. 由Parvovirus B19 引起","C. 此病毒在成人可能會引發關節炎","D. 病毒偏好感染白血球前期細胞"],"correctIndex":3,"explanation":"傳染性紅斑症 (Erythema infectiosum / 第五病)<br>•\t正確答案：D. 病毒偏好感染白血球前期細胞<br>•\t選項剖析：<br>o\tD 錯誤： 引起傳染性紅斑症的微小病毒 B19 (Parvovirus B19)，其最核心的特徵是偏好感染紅血球前期細胞 (Erythroid precursor cells)，並在其中複製導致細胞裂解，這也是它會引起再生不良性貧血危機的原因。<br>o\tA、B、C 正確：典型症狀是臉上的「巴掌印」紅疹；成人在感染後容易出現關節炎/關節痛的併發症。"},{"originalId":154,"question":"嬰兒玫瑰疹（roseola infantum）或稱exanthem subitum 在發疹前會突然出現幾天的高燒，請問下列何種病毒會造成此疾病？","options":["A. Parvovirus B19","B. Human herpesvirus-6","C. Rubella virus","D. Varicella-zoster virus"],"correctIndex":1,"explanation":"嬰兒玫瑰疹 (Roseola infantum)<br>•\t正確答案：B. Human herpesvirus-6 (HHV-6)<br>•\t選項剖析：<br>o\tB 正確： 嬰兒玫瑰疹的典型臨床表現是：突發性持續高燒數天（可達 39-40℃），退燒後全身馬上長出粉紅色斑丘疹 (熱退疹出)。此病超過 90% 是由人類疱疹病毒第六型 (HHV-6) 引起（少數為 HHV-7）。"},{"originalId":155,"question":"下列病毒與其自然宿主之配對，何者錯誤？","options":["A. 黃熱病病毒（Yellow fever virus）與鳥類","B. 登革熱病毒（Dengue virus）與人類、猴子","C. 日本腦炎病毒（Japanese encephalitis virus）與鳥類、豬","D. 聖路易斯腦炎病毒（St. Louis encephalitis virus）與鳥類"],"correctIndex":0,"explanation":"病毒與自然宿主配對<br>•\t正確答案：A. 黃熱病病毒 (Yellow fever virus) 與鳥類<br>•\t選項剖析：<br>o\tA 錯誤： 黃熱病病毒 (Yellow fever virus) 的自然叢林循環主要是發生在靈長類 (猴子) 之間，並透過蚊子傳播，人類也是宿主之一。它的自然宿主並非鳥類。<br>o\tC、D 正確：日本腦炎病毒的增幅宿主是豬，自然宿主是鳥類；聖路易斯腦炎的自然宿主也是鳥類。"},{"originalId":156,"question":"下列何者為德國麻疹病毒（Rubella virus）的致病機制？","options":["A. 經消化道感染柱狀上皮細胞","B. 先在呼吸道增殖，再感染網狀內皮系統","C. 經蚊子叮咬直接產生病毒血症","D. 先在肌肉增殖，並擴散到中樞神經"],"correctIndex":1,"explanation":"德國麻疹 (Rubella) 致病機制<br>•\t正確答案：B. 先在呼吸道增殖，再感染網狀內皮系統<br>•\t選項剖析：<br>o\tB 正確： 德國麻疹病毒是透過飛沫經呼吸道吸入感染。病毒首先在上呼吸道及局部淋巴結複製增殖，隨後發生病毒血症，擴散至全身的網狀內皮系統、皮膚（發疹）及胎盤（引起先天性感染）。<br>o\tA 錯誤：非消化道感染。<br>o\tC 錯誤：非蚊蟲叮咬（蟲媒）傳播。"},{"originalId":157,"question":"下列關於 progressive multifocal leukoencephalopathy（PML）的敘述，何者錯誤？","options":["A. 常發生於免疫不全的病人","B. 由BK病毒所引起","C. 是一種脫髓鞘（demyelination）的疾病","D. 病人大部分2年內會死亡"],"correctIndex":1,"explanation":"進行性多灶性白質腦病 (PML)<br>•\t正確答案：B. 由BK病毒所引起<br>•\t選項剖析：<br>o\tB 錯誤： PML 是一種發生在免疫不全患者（如 AIDS 晚期）中，侵犯中樞神經髓鞘的嚴重疾病。它是因為潛伏在體內的 JC 病毒 (JCV) 活化所引起，而非 BK 病毒。（BK 病毒主要引起腎病變或出血性膀胱炎，好發於腎移植患者）。<br>o\tA、C、D 皆為 PML 的正確描述。"},{"originalId":158,"question":"下列何者會造成多個細胞的膜融合（syncytia），形成多核細胞？","options":["A. Herpesvirus","B. Bunyavirus","C. Flavivirus","D. Rotavirus"],"correctIndex":0,"explanation":"造成細胞膜融合 (Syncytia)<br>•\t正確答案：A. Herpesvirus (疱疹病毒科)<br>•\t選項剖析：<br>o\tA 正確： 在病毒學的細胞病變效應 (CPE) 中，會誘導宿主細胞發生膜融合、形成特徵性「多核巨大細胞 (Syncytia)」的經典病毒家族包括：副黏液病毒科 (麻疹、RSV)、疱疹病毒科 (HSV, VZV, CMV 等)，以及 HIV。<br>o\tB、C、D 錯誤：布尼亞、黃病毒、輪狀病毒一般不引發明顯的細胞融合。"},{"originalId":159,"question":"從事醫院臨床工作者為避免遭受B 型肝炎病毒的感染，常用的預防方法為何？","options":["A. 施打 B 型肝炎疫苗","B. 注射干擾素","C. 注射 B 型肝炎免疫球蛋白","D. 主動感染 B 型肝炎病毒"],"correctIndex":0,"explanation":"預防 B 肝感染的常用方法<br>•\t正確答案：A. 施打 B 型肝炎疫苗<br>•\t選項剖析：<br>o\tA 正確： 對於高風險的醫療從業人員，最根本、有效且最常用的預防方法，就是施打 B 型肝炎基因重組疫苗，刺激體內產生保護性表面抗體 (Anti-HBs)，獲得長期的主動免疫保護。<br>o\tC 錯誤：B 肝免疫球蛋白 (HBIG) 是發生意外針刺傷暴露後，或是 B 肝產婦生下嬰兒時才使用的「緊急被動免疫」。"},{"originalId":160,"question":"一旦感染下列何種病毒，在感染部位的抹片檢查可以看到有多核的融合細胞與內涵體 （inclusion body）？","options":["A. Herpes simplex virus","B. Human papillomavirus","C. Adenovirus","D. Epstein-Barr virus"],"correctIndex":0,"explanation":"多核融合細胞與內涵體 (Tzanck 抹片)<br>•\t正確答案：A. Herpes simplex virus (單純疱疹病毒)<br>•\t選項剖析：<br>o\tA 正確： 從水疱基底部刮取細胞進行 Tzanck 抹片染色，若能在顯微鏡下觀察到多核巨大細胞 (multinucleated giant cells) 以及核內的嗜酸性 Cowdry type A 內涵體，這是診斷 HSV 或 VZV (疱疹病毒) 感染的經典形態學鐵證。"},{"originalId":161,"question":"一旦感染下列何種病毒，可以及早利用接種疫苗的方式來預防病毒在體內擴散而發病？","options":["A. 玻納病毒（Borna disease virus）","B. 狂犬病毒（Rabies virus）","C. 線狀病毒（Filovirus）","D. 馬堡病毒（Marburg virus）"],"correctIndex":1,"explanation":"暴露後及早接種疫苗預防發病<br>•\t正確答案：B. 狂犬病毒 (Rabies virus)<br>•\t選項剖析：<br>o\tB 正確： 狂犬病的潛伏期相當長（數週至數月）。這是人類醫學中極少數可以在「被咬傷暴露後」才緊急施打疫苗 (配合免疫球蛋白 PEP)，藉由主動免疫趕在病毒侵犯大腦前產生足夠抗體，成功攔截病毒並預防發病的傳染病。"},{"originalId":162,"question":"下列對於副黏液病毒科（Paramyxoviridae）之敘述，何者正確？","options":["A. 為正股（positive sense）RNA病毒","B. 依核蛋白（nucleoprotein）共分為A、B及C三型","C. 核蛋白衣（nucleocapsid）為二十面體對稱結構","D. 皆具有套膜（envelope）及融合（fusion）蛋白質"],"correctIndex":3,"explanation":"副黏液病毒科 (Paramyxoviridae)<br>•\t正確答案：D. 皆具有套膜 (envelope) 及融合 (fusion) 蛋白質<br>•\t選項剖析：<br>o\tD 正確： 副黏液病毒科（包含麻疹、腮腺炎、副流感、RSV）的共同特徵，是具有脂質套膜，且套膜上都帶有特徵性的融合蛋白 (F protein)，能促使細胞融合形成 Syncytia。<br>o\tA 錯誤：基因體為負股 (-) RNA，非正股。<br>o\tB 錯誤：分 A、B、C 三型的是正黏液病毒科的流感病毒。<br>o\tC 錯誤：其核蛋白衣是螺旋對稱，非二十面體。"},{"originalId":163,"question":"下列何種病毒具有E1A與E1B這兩種促進細胞生長的活化因子？","options":["A. Adenovirus","B. Papillomavirus","C. Epstein-Barr virus","D. Cytomegalovirus"],"correctIndex":0,"explanation":"E1A 與 E1B 活化因子<br>•\t正確答案：A. Adenovirus (腺病毒)<br>•\t選項剖析：<br>o\tA 正確： 腺病毒在進入宿主細胞後，最早表現的功能蛋白就是 E1A 和 E1B。它們分別會結合並抑制宿主的 Rb 和 p53 抑癌蛋白，藉此強迫宿主細胞進入細胞分裂週期（S 期），提供病毒 DNA 複製所需的酶與環境。<br>o\tB 錯誤：HPV 是 E6 和 E7。"},{"originalId":164,"question":"下列何者不是致病性普里昂蛋白（scrapie-like prion protein, PrPSC）的特性？","options":["A. 致病潛伏期很長","B. 造成神經組織空洞化","C. 可存在於細胞外","D. 引起很強的免疫反應"],"correctIndex":3,"explanation":"致病性普里昂蛋白 (PrPSc) 特性<br>•\t正確答案：D. 引起很強的免疫反應<br>•\t選項剖析：<br>o\tD 錯誤： 同第 122 題觀念。普里昂蛋白是由宿主自身的正常蛋白轉變而來，因為胺基酸序列跟自體蛋白一模一樣，所以免疫系統無法辨識它，不會引起任何發炎或免疫反應。"},{"originalId":165,"question":"某25歲護士上班回家後，出現發燒、頭痛、喉嚨痛、流鼻水、打噴嚏、無痰性乾咳、肌肉痛 不舒服等症狀，病情持續了4天沒有好轉，反而進一步延伸為細菌性肺炎及肌炎 （myositis），該護士經住院治療二星期後痊瘍，此護士可能受下列何病原感染？","options":["A. 麻疹病毒（Measles virus）","B. 呼吸道細胞融合病毒（Respiratory syncytial virus）","C. 流行性感冒病毒（Influenza virus）","D. 腸病毒71型（Enterovirus 71）"],"correctIndex":2,"explanation":"護士流感併發肺炎與肌炎<br>•\t正確答案：C. 流行性感冒病毒 (Influenza virus)<br>•\t選項剖析：<br>o\tC 正確： 冬季突發高燒、無痰乾咳、極度疲倦與強烈全身肌肉痠痛，且常常在幾天後因為上皮細胞受損而引發嚴重的「次發性細菌性肺炎」或肌炎，這是流行性感冒 (流感病毒) 在成人身上最經典、最常考的臨床病程描述。"},{"originalId":166,"question":"某病毒可引起孩童之急性下呼吸道疾病，經由鼻腔分泌物分離出該病毒，發覺其不具血球凝 集作用，但可使感染之細胞融合（syncytia）。該病毒可能為下列何者？","options":["A. 流行性感冒病毒A型（Influenza virus A）","B. 副流行性感冒病毒（Parainfluenza virus）","C. 呼吸道細胞融合病毒（Respiratory syncytial virus）","D. 麻疹病毒（Measles virus）"],"correctIndex":2,"explanation":"孩童下呼吸道疾病，無血球凝集、有細胞融合<br>•\t正確答案：C. 呼吸道細胞融合病毒 (Respiratory syncytial virus, RSV)<br>•\t選項剖析：<br>o\tC 正確： 同第 148 題。 RSV 的兩大考點就是：(1) 是引起嬰幼兒細支氣管炎/下呼吸道感染最常見的病原。(2) 它沒有 HA 蛋白（無血球凝集作用），但有強大的 F 蛋白（促細胞融合）。"},{"originalId":167,"question":"下列關於腺病毒（adenovirus）的敘述，何者錯誤？","options":["A. 為DNA病毒","B. 引起結膜炎（conjunctivitis）","C. 可以潛伏於淋巴組織中","D. 具有外套（envelope）"],"correctIndex":3,"explanation":"腺病毒 (Adenovirus) 特徵<br>•\t正確答案：D. 具有外套 (envelope)<br>•\t選項剖析：<br>o\tD 錯誤： 腺病毒是醫學微生物學中極具代表性的「無套膜 (Naked)」雙股 DNA 病毒。因為無套膜，它對環境具有一定的耐受性，容易在泳池等環境中傳播。<br>o\tA、B、C 皆為正確。它可引起結膜炎，並能潛伏於腺樣體/扁桃腺等淋巴組織中。"},{"originalId":168,"question":"反轉錄病毒嵌入宿主的染色體中，其基因上那一個片段具有啟動子（promoter）序列可以調控病毒的轉錄（transcription）？","options":["A. LTR","B. gag","C. pol","D. env"],"correctIndex":0,"explanation":"反轉錄病毒的啟動子 (Promoter)<br>•\t正確答案：A. LTR (長末端重複序列)<br>•\t選項剖析：<br>o\tA 正確： 反轉錄病毒 (如 HIV) 的 RNA 轉成原病毒 DNA 並嵌入宿主染色體後，位於基因體兩端的 LTR (Long Terminal Repeat) 包含了極強的啟動子 (promoter) 及增強子 (enhancer) 序列，專門負責招募宿主的聚合酶來調控病毒 RNA 的大量轉錄。"},{"originalId":169,"question":"下列何種病毒，與精神分裂症（schizophrenia）有關？","options":["A. 西尼羅腦炎病毒（West Nile encephalitis virus）","B. 玻納病病毒（Borna disease virus）","C. 拉克里斯病毒（La Crosse virus）","D. 辛諾柏病毒（Sin Nombre virus）"],"correctIndex":1,"explanation":"與精神分裂症有關的病毒<br>•\t正確答案：B. 玻納病病毒 (Borna disease virus, BDV)<br>•\t選項剖析：<br>o\tB 正確： 玻納病毒是一種高度嗜神經性的 RNA 病毒。雖然它主要引起馬、羊等動物的神經疾病，但在早期的精神醫學與病毒學跨界研究中，有學者發現部分精神分裂症 (schizophrenia) 及重度憂鬱症患者的血清或腦脊髓液中存在 BDV 抗體或核酸，因此它常被放在考題中與精神疾病做連結。"},{"originalId":170,"question":"下列何者不是導致流感病毒產生抗原飄移（antigenic drift）之原因？","options":["A. 當兩種病毒發生基因重分配（genetic reassortment）所致","B. 因為病毒合成RNA常發生錯誤、引起突變所致","C. 常發生於血球凝集素基因（hemagglutinin gene）","D. 常發生於神經胺酸酶基因（neuraminidase gene）"],"correctIndex":0,"explanation":"流感病毒抗原飄移 (Antigenic drift)<br>•\t正確答案：A. 當兩種病毒發生基因重分配 (genetic reassortment) 所致<br>•\t選項剖析：<br>o\tA 錯誤（不屬於抗原飄移）： 流感病毒有兩種變異方式。<br>1.\t抗原飄移 (Drift)：是因為 RNA 複製出錯（點突變 point mutation）逐漸累積造成的微小改變，引發季節性流感。選項 B、C、D 皆描述了 Drift 的成因。<br>2.\t抗原轉變/大轉移 (Shift)：是因為兩種不同病毒感染同一細胞，其 8 段基因片段發生了基因重分配 (genetic reassortment)，產生全新抗原，引發世界大流行。因此選項 A 描述的是 Shift，而非 Drift。"},{"originalId":171,"question":"下列對於腸病毒（enteroviruses）的描述，何者錯誤？","options":["A. 在pH3至pH9之環境下仍具抗性","B. 病毒基因體（naked genome）本身具感染之能力","C. 病毒RNA在細胞中會被轉譯成polyprotein","D. 病毒在細胞核複製其子代"],"correctIndex":3,"explanation":"腸病毒 (Enteroviruses) 的描述<br>•\t正確答案：D. 病毒在細胞核複製其子代<br>•\t選項剖析：<br>o\tD 錯誤： 腸病毒屬於小 RNA 病毒科（Picornaviridae），為正股單股 RNA 病毒。絕大多數的 RNA 病毒（除了流感病毒與反轉錄病毒之外）都是在「細胞質 (Cytoplasm)」內進行複製與組裝的，不需要進入細胞核。<br>o\tA 正確：腸病毒無外套膜，對酸（pH 3~9）有極強抗性，所以能順利通過胃酸到達腸道感染。<br>o\tB 正確：正股 RNA 病毒的純化基因體（Naked genome）本身就具有 mRNA 的功能，直接注射入細胞就能引發感染。<br>o\tC 正確：正股 RNA 會先轉譯出一條超長的「多聚蛋白 (Polyprotein)」，然後再由病毒自身的蛋白酶將其切割成多個有功能的單一蛋白質。"},{"originalId":172,"question":"孕婦何時感染rubella virus最容易造成先天性胎兒畸形？","options":["A. 懷孕初期三個月","B. 懷孕中期三個月","C. 懷孕後期三個月","D. 周產期"],"correctIndex":0,"explanation":"德國麻疹 (Rubella) 感染孕婦<br>•\t正確答案：A. 懷孕初期三個月<br>•\t選項剖析：<br>o\tA 正確： 懷孕的前三個月（第一孕期）是胎兒器官（如心臟、眼睛、神經系統）正在分化與發育的黃金關鍵期。此時若感染德國麻疹，病毒穿過胎盤破壞正在分化的細胞，造成先天性胎兒畸形（CRS，如白內障、耳聾、先天性心臟病）的機率最高（可高達 80% 以上）。懷孕越後期，胎兒器官已成形，畸形機率就大幅下降。"},{"originalId":173,"question":"下列何者為臺灣地區傳播日本腦炎（Japanese B encephalomyelitis）的主要病媒蚊種？","options":["A. 埃及斑蚊（Aedes aegypti）","B. 白線斑蚊（Aedes albopictus）","C. 熱帶家蚊（Culex fatigans）","D. 三斑家蚊（Culex tritaeniorhychus）"],"correctIndex":3,"explanation":"臺灣日本腦炎病媒蚊<br>•\t正確答案：D. 三斑家蚊（Culex tritaeniorhynchus）<br>•\t選項剖析：<br>o\tD 正確： 臺灣地區傳播日本腦炎的最主要病媒蚊為三斑家蚊（以及環紋家蚊）。它們多孳生於水田、池塘等積水處，吸食帶有病毒的豬隻血液後再叮咬人類。<br>o\tA、B 錯誤：埃及斑蚊與白線斑蚊是「登革熱」與「茲卡病毒」的病媒蚊。"},{"originalId":174,"question":"下列何種反轉錄病毒沒有攜帶致癌基因（oncogene）？","options":["A. Avian erythroblastosis virus","B. Abelson murine leukemia virus","C. Rous sarcoma virus","D. HTLV-1（Human T-cell lymphotropic virus type 1）"],"correctIndex":3,"explanation":"未攜帶致癌基因 (oncogene) 的反轉錄病毒<br>•\t正確答案：D. HTLV-1（Human T-cell lymphotropic virus type 1）<br>•\t選項剖析：<br>o\tD 正確： 許多動物的反轉錄肉瘤/白血病病毒（如 A、B、C 選項）體內都帶有從宿主細胞「偷來」的致癌基因（v-onc，如 src, abl）。但 HTLV-1 基因體中「沒有」這種傳統的致癌基因。它的致癌機制是利用自身特有的 Tax 蛋白，去「反式活化 (transactivate)」宿主細胞的生長基因（如 IL-2 及其受體），促使 T 細胞不斷增生。"},{"originalId":175,"question":"下列關於HIV（Human immunodeficiency virus）病毒蛋白的功能，何者錯誤？","options":["A. Tat與運送病毒RNA到細胞質有關","B. Vif可以拮抗細胞中APOBEC-3G的作用","C. Vpu可以降低細胞上CD4的表現","D. gp41幫助病毒與細胞膜的融合"],"correctIndex":0,"explanation":"HIV 病毒蛋白功能<br>•\t正確答案：A. Tat與運送病毒RNA到細胞質有關<br>•\t選項剖析：<br>o\tA 錯誤： 功能寫錯了。負責將未剪接或單次剪接的病毒 RNA 「運送出細胞核到細胞質」的蛋白質是 Rev。Tat 的功能則是極強的「轉錄反式活化因子」，用來大幅加速病毒 RNA 的轉錄速度。<br>o\tB 正確：Vif 可以破壞宿主細胞的抗病毒蛋白 APOBEC-3G。<br>o\tC 正確：Vpu 能促進宿主細胞內 CD4 的降解，幫助病毒順利釋放。<br>o\tD 正確：gp41 是跨膜蛋白，專門負責病毒套膜與宿主細胞膜的融合。"},{"originalId":176,"question":"在細胞質內進行複製之DNA病毒為：","options":["A. EB病毒（Epstein-Barr virus）","B. 腺病毒（Adenovirus）","C. 痘病毒（Poxvirus）","D. 小DNA病毒（Parvovirus）"],"correctIndex":2,"explanation":"在細胞質內複製的 DNA 病毒<br>•\t正確答案：C. 痘病毒（Poxvirus）<br>•\t選項剖析：<br>o\tC 正確： 這是病毒學最愛考的「例外」！絕大多數 DNA 病毒必須在細胞核內複製；但痘病毒 (Poxvirus) 體積十分龐大，且自帶了完整的 DNA 聚合酶、RNA 聚合酶等全套複製裝備，因此它是唯一完全在「細胞質」中進行複製的 DNA 病毒。"},{"originalId":177,"question":"下列何種病毒的感染過程中有潛伏期（latency），且可再激活（reactivation）後，再進入潛伏期？","options":["A. Hepatitis B virus","B. Human immunodeficiency virus","C. Coxsackie virus A3","D. Varicella-zoster virus"],"correctIndex":3,"explanation":"具潛伏期、可再激活的病毒<br>•\t正確答案：D. Varicella-zoster virus (水痘-帶狀疱疹病毒)<br>•\t選項剖析：<br>o\tD 正確： 這是疱疹病毒科 (Herpesviridae) 的招牌特徵。VZV 初次感染引起水痘後，會進入感覺神經節建立「終身潛伏 (Latency)」。當宿主免疫力低下時，病毒會「再激活 (Reactivation)」引發帶狀疱疹（皮蛇）；病程結束後，病毒又會再次進入神經節潛伏。"},{"originalId":178,"question":"孕婦在懷孕期間感染下列那些病毒後，容易造成嬰兒先天性缺陷？①Cytomegalovirus ②Influenza virus ③Rubella virus ④Adenovirus","options":["A. ①②","B. ①③","C. ②③","D. ③④"],"correctIndex":1,"explanation":"TORCH 先天性感染病毒<br>•\t正確答案：B. ①③<br>•\t選項剖析：<br>o\t① CMV (巨細胞病毒) 與 ③ Rubella (德國麻疹病毒) 是鼎鼎大名的 TORCH 綜合症成員（T: 弓漿蟲, O: 其他如梅毒/微小病毒, R: Rubella, C: CMV, H: HSV），極易透過胎盤感染胎兒引發嚴重畸形、耳聾與智力障礙。<br>o\t② 流感病毒與 ④ 腺病毒主要引起呼吸道感染，通常不會引發嚴重的胎兒先天性畸形。"},{"originalId":179,"question":"目前接種的B型肝炎疫苗是屬於下列那一種？","options":["A. 活病毒","B. 活減毒疫苗","C. 死病毒","D. 基因重組次單位疫苗"],"correctIndex":3,"explanation":"目前接種的 B 型肝炎疫苗種類<br>•\t正確答案：D. 基因重組次單位疫苗 (Recombinant subunit vaccine)<br>•\t選項剖析：<br>o\tD 正確： 早期的 B 肝疫苗是從帶原者血漿中純化（血漿疫苗），但有感染其他血液疾病的風險。目前全球常規施打的 B 肝疫苗，都是利用酵母菌或哺乳動物細胞進行基因重組工程，大量製造 B 肝表面抗原 (HBsAg) 所製成的次單位疫苗，非常安全。"},{"originalId":180,"question":"下列那個病毒不會因有機溶劑或膽鹽之處理而喪失活性？","options":["A. Hantaan virus","B. HIV","C. Influenza viruses","D. Hepatitis A virus"],"correctIndex":3,"explanation":"對有機溶劑 / 膽鹽具抗性的病毒<br>•\t正確答案：D. Hepatitis A virus (A型肝炎病毒)<br>•\t選項剖析：<br>o\tD 正確： 乙醚、氯仿等有機溶劑及膽鹽會溶解「脂質」。因此，具有脂質外套膜 (Enveloped) 的病毒（如 Hantaan, HIV, Influenza）一旦碰到這些溶劑就會被破壞而喪失活性。HAV (A肝) 是腸病毒科的成員，屬於無套膜 (Naked) 病毒，所以對這些脂質溶劑與腸道膽汁具有強大的抵抗力。"},{"originalId":181,"question":"有關C型肝炎病毒的敘述，何者錯誤？","options":["A. 屬於Flaviviridae","B. 具有envelope","C. 已經有疫苗可以預防感染","D. 與肝癌有關"],"correctIndex":2,"explanation":"C型肝炎病毒 (HCV) 敘述<br>•\t正確答案：C. 已經有疫苗可以預防感染<br>•\t選項剖析：<br>o\tC 錯誤： C 型肝炎病毒的 RNA 聚合酶缺乏校對能力，突變率極高（容易產生準種 Quasispecies），能輕易逃脫免疫系統，因此至今仍沒有任何有效的 HCV 疫苗。但目前已有特效藥 (DAA) 可以治癒。<br>o\tA, B, D 皆正確。它屬於黃病毒科，有套膜，且長期感染會導致肝硬化與肝細胞癌。"},{"originalId":182,"question":"孕婦感染下列何種病毒，最容易造成胎兒先天性畸形？","options":["A. 單純疱疹病毒一型","B. 帶狀疱疹病毒","C. 德國麻疹病毒","D. 麻疹病毒"],"correctIndex":2,"explanation":"易造成胎兒畸形的病毒<br>•\t正確答案：C. 德國麻疹病毒 (Rubella virus)<br>•\t選項剖析：<br>o\tC 正確： 同 172 題。德國麻疹病毒是引發「先天性胎兒畸形 (白內障、耳聾、PDA心臟病)」最具代表性的致畸胎殺手。"},{"originalId":183,"question":"下列那一種病毒需進入寄主細胞之細胞核進行基因體複製（genome replication）？","options":["A. Poxvirus","B. Paramyxovirus","C. Bunyavirus","D. Orthomyxovirus"],"correctIndex":3,"explanation":"需進入細胞核複製的 RNA 病毒<br>(註：本題題幹寫「基因體複製」，選項多為 RNA 病毒。在 RNA 病毒中，會進核的例外是流感)<br>•\t正確答案：D. Orthomyxovirus (正黏液病毒 / 流感病毒)<br>•\t選項剖析：<br>o\tD 正確： 這又是一個經典例外題。絕大多數 RNA 病毒在細胞質複製；但 Orthomyxovirus (流感病毒) 因為需要透過「搶奪宿主 mRNA 的 5' 端帽 (Cap-snatching)」來作為自己轉錄的引子，因此它的 RNA 必須進入宿主的細胞核內進行轉錄與複製。"},{"originalId":184,"question":"使用於孩童之MMR三合一減毒疫苗，包含那三種病毒？","options":["A. Measles-Mumps-Rubella","B. Measles-Mumps-Rotavirus","C. Measles-Mumps-Reovirus","D. Measles-Mumps-Rhinovirus"],"correctIndex":0,"explanation":"MMR 三合一疫苗成分<br>•\t正確答案：A. Measles-Mumps-Rubella<br>•\t選項剖析：<br>o\tA 正確： MMR 疫苗是預防三種常見兒童傳染病的減毒活疫苗，分別是：Measles (麻疹)、Mumps (腮腺炎)、Rubella (德國麻疹)。"},{"originalId":185,"question":"下列有關流行性感冒病毒的敘述，何者錯誤？","options":["A. 基因含多段，因此重組現象普遍發生","B. 共分A、B、C三型","C. B型常造成全世界大流行","D. 病毒感染後，續發性細菌感染（secondary bacterial infection），常引起肺炎"],"correctIndex":2,"explanation":"流行性感冒病毒敘述<br>•\t正確答案：C. B型常造成全世界大流行<br>•\t選項剖析：<br>o\tC 錯誤： 會因為動物病毒與人類病毒發生基因重分配 (Reassortment / 抗原大轉變 Shift) 而造成「全世界大流行 (Pandemic)」的，只有 A 型流感病毒。B 型流感僅會發生抗原飄移 (Drift)，只能造成區域性流行 (Epidemic)。<br>o\tA, B, D 皆為正確敘述。流感常因破壞呼吸道纖毛上皮，引發致命的次發性細菌性肺炎（如金黃色葡萄球菌、肺炎鏈球菌）。"},{"originalId":186,"question":"南部爆發登革熱大流行，若患者有下列何種臨床症狀時，醫師會診斷為登革病毒（dengue viruses）之感染？①紅疹（rash） ②關節炎（arthritis） ③血小板減少（thrombocytopenia） ④出血熱（hemorrhagic fever）","options":["A. ①②③","B. ①②④","C. ②③④","D. ①③④"],"correctIndex":3,"explanation":"登革熱 (Dengue fever) 臨床症狀<br>•\t正確答案：D. ①③④<br>•\t選項剖析：<br>o\t登革熱最典型的特徵為：突發高燒、後眼窩痛、骨頭肌肉痠痛（故稱斷骨熱）、① 紅疹 (Rash)。在重症時，會出現血管通透性增加與凝血功能異常，導致 ③ 血小板極度減少 (Thrombocytopenia) 與 ④ 登革出血熱 (DHF) 或登革休克症候群 (DSS)。<br>o\t② 關節炎 (Arthritis)：通常「長達數週至數月的嚴重關節炎」是基孔肯雅熱 (Chikungunya) 的招牌症狀，登革熱主要是關節/肌肉痛 (Arthralgia) 而非典型的長期發炎腫脹，故在最佳解的組合中排除 ②。"},{"originalId":187,"question":"愛滋病病人的Kaposi’s sarcoma是由下列何種病毒感染所引起？","options":["A. HSV-1（herpes simplex virus type 1）","B. HHV-8（human herpes virus type 8）","C. CMV（cytomegalovirus）","D. HSV-2（herpes simplex virus type 2）"],"correctIndex":1,"explanation":"卡波西氏肉瘤 (Kaposi's sarcoma) 病原<br>•\t正確答案：B. HHV-8 (human herpes virus type 8)<br>•\t選項剖析：<br>o\tB 正確： 卡波西氏肉瘤是愛滋病患者最常見的伺機性惡性腫瘤，它已被證實是由第八型人類疱疹病毒 (HHV-8) 感染血管內皮細胞所引起的。"},{"originalId":188,"question":"王先生於SARS流行期間到大陸進行商務旅行，在香港停留一晚後返臺。回國後第2天晚上，即高燒至40℃不退；經X光檢查，肺部有瀰漫性發炎現象。若抽血檢驗，預期可以測得對SARS冠狀病毒（SARS-coronavirus）的那一種抗體亞型？","options":["A. IgA","B. IgE","C. IgG","D. IgM"],"correctIndex":3,"explanation":"感染初期測得的抗體亞型<br>•\t正確答案：D. IgM<br>•\t選項剖析：<br>o\tD 正確： 根據基礎免疫學，人體在初次遭受任何病原體（包括 SARS）感染時，B 細胞第一波製造並分泌出來應戰的抗體永遠都是 IgM（大約在發病 7-10 天後可偵測到）。隨後經過同型轉換，才會大量產生 IgG（代表長期保護力與記憶）。雖然題目設定「第 2 天」在實務上可能還驗不到抗體，但只要問到「早期預期測得的抗體」，答案絕對是 IgM。"},{"originalId":189,"question":"人類個體受到人類免疫缺損病毒（HIV）攻擊後會導致免疫功能下降，造成次發免疫功能缺損（後天 性免疫缺乏症候群，通稱AIDS）。AIDS病患經常發現的皮膚癌Kaposi肉瘤，其直接成因為何？","options":["A. Kaposi 肉瘤疱疹病毒","B. 人類疱疹病毒第一型（HHV-1）","C. 免疫球蛋白血中濃度太低","D. 皮膚中B型肝炎病毒蛋白質堆積"],"correctIndex":0,"explanation":"Kaposi 肉瘤的直接成因<br>•\t正確答案：A. Kaposi 肉瘤疱疹病毒 (KSHV / HHV-8)<br>•\t選項剖析：<br>o\tA 正確： 同 187 題。愛滋病患者因為 CD4 T 細胞過低（次發性免疫缺損），無法壓制體內潛伏的致癌病毒。Kaposi 肉瘤的直接致癌元凶是 HHV-8（又稱 KSHV，卡波西氏肉瘤疱疹病毒）。"},{"originalId":190,"question":"下列那一種傳染病，是目前人類社會透過預防注射，最有可能根除的疾病？","options":["A. 結核病（tuberculosis）","B. 麻疹（measles）","C. 小兒麻痺（poliomyelitis）","D. 百日咳（diphtheria）"],"correctIndex":2,"explanation":"目前最有可能透過疫苗根除的疾病<br>•\t正確答案：C. 小兒麻痺（poliomyelitis）<br>•\t選項剖析：<br>o\tC 正確： 繼天花 (Smallpox) 於 1980 年成功根除後，WHO 目前傾注全球資源、最接近「全球根除」目標的疾病就是小兒麻痺 (Polio)（目前僅剩阿富汗與巴基斯坦有零星野生株案例）。麻疹也是極佳的候選者，但因傳染力過強且疫苗覆蓋率起伏，根除進度仍落後於小兒麻痺。"},{"originalId":191,"question":"下列何者易感染紅血球的前期細胞而造成貧血，或感染孕婦而造成死胎？","options":["A. parvovirus B19","B. JC virus","C. BK virus","D. cytomegalovirus"],"correctIndex":0,"explanation":"感染紅血球前期細胞造成貧血/死胎<br>•\t正確答案：A. parvovirus B19 (微小病毒B19)<br>•\t選項剖析：<br>o\tA 正確： 微小病毒 B19 專一性結合 P 抗原，高度嗜好感染骨髓中的紅血球前期細胞並導致細胞裂解。這在慢性溶血患者身上會引發致命的「再生不良性貧血危機」；若感染孕婦，會導致胎兒嚴重貧血、心臟衰竭，引發胎兒水腫 (Hydrops fetalis) 甚至死胎。"},{"originalId":192,"question":"下列何者不適合作為實驗室檢測流感病毒（influenza viruses）的方法？","options":["A. 以Madin-Darby 犬腎細胞株培養以檢測其細胞病變（cytopathologic effects）","B. 以血球凝集試驗（hemagglutination test）檢測細胞培養中之病毒","C. 以免疫螢光試驗（immunofluorescence test）檢測細胞培養中之病毒抗原","D. 以聚合酶鏈鎖反應（polymerase chain reaction）檢測病毒 DNA"],"correctIndex":3,"explanation":"不適合作為流感病毒實驗室檢測的方法<br>•\t正確答案：D. 以聚合酶鏈鎖反應（PCR）檢測病毒 DNA<br>•\t選項剖析：<br>o\tD 錯誤： 流行性感冒病毒是 RNA 病毒！傳統的 PCR 只能擴增 DNA。如果要用分子生物學方法檢測流感的 RNA，必須使用反轉錄酶先將其轉為 cDNA，也就是必須使用 RT-PCR (反轉錄聚合酶鏈鎖反應) 才行。"},{"originalId":193,"question":"陳先生，19歲，最近到南美洲遊學兩星期，回國後出現類流感症狀，癒後仍出現關節痛達數十天之久。請問最可能感染下列何種病毒？","options":["A. 登革熱病毒（dengue virus）","B. 塞姆利基森林病毒（Semliki Forest virus）","C. 黃熱病毒（yellow fever virus）","D. 基孔肯雅病毒（Chikungunya virus）"],"correctIndex":3,"explanation":"類流感並伴隨「長期關節痛」<br>•\t正確答案：D. 基孔肯雅病毒（Chikungunya virus）<br>•\t選項剖析：<br>o\tD 正確： 這是熱帶醫學的經典鑑別診斷。登革熱與基孔肯雅熱症狀極似（皆由蚊蟲叮咬），但 Chikungunya（在非洲語意指：痛得彎腰的疾病） 最大的特色就是發燒消退後，患者常會經歷長達數週甚至數月的極度嚴重關節炎/關節痛，這是它區別於登革熱的最重要考點。"},{"originalId":194,"question":"某3歲男童由育嬰中心回家後突然開始發高燒、喉嚨痛、咳嗽、肌肉酸痛及腹部疼痛、嘔吐等症狀，其母親即給予服用阿斯匹靈退燒，此男童服藥後不但病情未減輕反而引發肝功能異常與腦部病變（encephalopathy），最後此男童不幸死亡，此男童可能為何病原所感染？","options":["A. 流行性感冒噬血桿菌（Haemophilus influenzae）","B. 肺炎雙球菌（Streptococcus pneumoniae）","C. 流行性感冒病毒（influenza virus）","D. 麻疹病毒（measles virus）"],"correctIndex":2,"explanation":"流感 + 阿斯匹靈 -> 腦病變與肝異常<br>•\t正確答案：C. 流行性感冒病毒（influenza virus）<br>•\t選項剖析：<br>o\tC 正確： 孩童在感染流感病毒 (Influenza) 或水痘病毒 (VZV) 時，若使用含水楊酸成分的退燒藥（如阿斯匹靈 Aspirin），極易誘發致命的 雷氏症候群 (Reye's syndrome)。其特徵就是猛爆性肝功能異常及急性腦病變。這也是為何兒童發燒絕對禁用阿斯匹靈的原因。"},{"originalId":195,"question":"一位25歲男子休假赴東南亞旅行，為了節省費用，吃住均找價錢最低廉者，回國後2星期出現發燒、噁心、腹部疼痛、沒有食慾及感到疲勞等症狀，雖然去看了醫生並服了藥，4天後仍發生黃疸的現象，此男子可能得了什麼疾病？","options":["A. 黃熱病","B. 肝炎","C. 登革熱","D. 腸胃炎"],"correctIndex":1,"explanation":"東南亞旅遊、吃住低廉、黃疸<br>•\t正確答案：B. 肝炎 (特別是 A 型或 E 型肝炎)<br>•\t選項剖析：<br>o\tB 正確： 旅遊史（東南亞）、飲食不潔（吃住低廉）、發燒疲勞噁心，加上最關鍵的體徵 黃疸 (Jaundice)，這是極度經典的「腸胃道傳染型肝炎」——也就是 A 型肝炎病毒 (HAV) 或 E 肝的臨床表現。"},{"originalId":196,"question":"下列何種病毒經乙醚（ether）處理後會喪失感染活性？","options":["A. hepatitis A virus","B. influenza virus","C. rotavirus","D. poliovirus"],"correctIndex":1,"explanation":"經乙醚 (ether) 處理後會喪失感染活性<br>•\t正確答案：B. influenza virus (流感病毒)<br>•\t選項剖析：<br>o\tB 正確： 同 180 題。乙醚是脂溶性溶劑，會破壞病毒的脂質外套膜 (Envelope)。選項中，HAV (A肝)、Rotavirus (輪狀)、Poliovirus (小兒麻痺) 全都是無套膜 (Naked) 病毒，不怕乙醚；只有流感病毒具有外套膜，碰到乙醚就會喪失活性。"},{"originalId":197,"question":"單純疱疹病毒（Herpes simplex virus）之治療藥物樂威素（Acyclovir），其抑制病毒複製之機轉為何？","options":["A. 阻止病毒胸腺激酶（thymidine kinase）作用","B. 阻止病毒DNA之複製","C. 阻止病毒附著於寄主細胞上","D. 阻止病毒之解體（uncoating）"],"correctIndex":1,"explanation":"Acyclovir 抑制病毒複製之機轉<br>•\t正確答案：B. 阻止病毒DNA之複製<br>•\t選項剖析：<br>o\tB 正確： 雖然 Acyclovir 第一步是「被病毒胸苷激酶 (TK) 活化（磷酸化）」，但它真正的藥理作用機制，是它的三磷酸活化型態會假裝成正常的核苷酸，搶先結合到病毒的 DNA 聚合酶上。因為它缺乏 3'-OH 端，一旦接上去就會造成「鏈終止 (Chain termination)」，從而直接阻止病毒 DNA 的延長與複製。"},{"originalId":198,"question":"HIV-1經由黏膜感染進入人體時，主要藉由何種細胞攜帶進入淋巴結？","options":["A. NK cell","B. CD8 T cell","C. Dendritic cell","D. CD4 T cell"],"correctIndex":2,"explanation":"HIV 經黏膜進入淋巴結的「特洛伊木馬」<br>•\t正確答案：C. Dendritic cell (樹突細胞)<br>•\t選項剖析：<br>o\tC 正確： 當 HIV 進入人體黏膜（如生殖道）時，黏膜層的樹突細胞 (Dendritic cells) 會利用其表面的 DC-SIGN 受體抓住 HIV 病毒。樹突細胞原本的職責是抓取抗原並移動到淋巴結去呈遞給 T 細胞，沒想到這正好成了 HIV 的「免費計程車」。HIV 就這樣被安然無恙地運送到淋巴結中，直接感染那裡大量密集的 CD4 T 細胞。"},{"originalId":199,"question":"下列那一種疾病不是由Epstein-Barr病毒（EBV）引起的？","options":["A. 毛狀口腔白斑病（Hairy oral leukoplakia）","B. 角膜結膜炎（Keratoconjunctivitis）","C. 傳染性單核球增多症（Infectious mononucleosis）","D. 伯奇氏淋巴瘤（Burkitt lymphoma）"],"correctIndex":1,"explanation":"非由 EBV 引起的疾病<br>•\t正確答案：B. 角膜結膜炎（Keratoconjunctivitis）<br>•\t選項剖析：<br>o\tB 正確： 角膜結膜炎（如流行性角結膜炎 EKC）最經典的病原體是腺病毒 (Adenovirus)。其他選項 A（毛狀白斑）、C（傳染性單核球增多症）、D（伯奇氏淋巴瘤）全是 EB 病毒 (EBV) 的經典傑作。"},{"originalId":200,"question":"下列那一病毒感染，不經由抑制寄主腫瘤抑制基因之功能形成腫瘤？","options":["A. 腺病毒（Adenovirus）","B. 人類嗜T細胞病毒（HTLV-1）","C. 人類乳突病毒（HPV）","D. 多瘤病毒（SV40）"],"correctIndex":1,"explanation":"非經由抑制「腫瘤抑制基因」致癌的病毒<br>•\t正確答案：B. 人類嗜T細胞病毒（HTLV-1）<br>•\t選項剖析：<br>o\tB 正確： 同 174 題。<br>\tA 腺病毒 (E1A/E1B)、C 乳突病毒 HPV (E6/E7)、D 多瘤病毒 SV40 (Large T antigen)，這三種 DNA 致癌病毒的共同絕招，都是分泌蛋白去直接綁架並抑制宿主的抑癌基因 (p53 與 Rb)。<br>\t只有 HTLV-1 (反轉錄 RNA 病毒) 是利用 Tax 蛋白去「活化/促進」生長基因的表現，而非抑制腫瘤抑制基因。"},{"originalId":201,"question":"一位有多位性伴侶之少女在陰道出現潰瘍性瘡傷，並有發癢、疼痛、排尿困難及全身性症狀，並持 續發燒10天左右，Papanicolaou（Pap）抹片檢查顯示多核巨大細胞（syncytia）及Cowdry A型包涵體，此少女之病徵是由何病毒感染所引起的？","options":["A. 單純疱疹病毒（Herpes simplex virus）","B. 人類乳突病毒（HPV）","C. 細小病毒B19（Parvovirus B19）","D. 德國麻疹病毒（Rubella virus）"],"correctIndex":0,"explanation":"生殖器潰瘍與多核巨大細胞<br>•\t正確答案：A. 單純疱疹病毒（Herpes simplex virus）<br>•\t選項剖析：<br>o\tA 正確： 陰道潰瘍性瘡傷，加上 Pap 抹片檢查看到多核巨大細胞（syncytia）以及核內嗜酸性的 Cowdry A 型包涵體，這是 HSV（單純疱疹病毒）或 VZV（水痘帶狀疱疹病毒）感染細胞後的典型病理特徵。在生殖器部位，最常見的就是 HSV-2 引起的生殖器疱疹。<br>o\tB 錯誤：人類乳突病毒（HPV）會引起尖形濕疣（菜花）及子宮頸癌，其典型細胞病變是「挖空細胞（Koilocyte）」。"},{"originalId":202,"question":"某 hospital 育嬰室之25歲護士，回家後出現流鼻水、輕微咳嗽及稍微發燒現象，此狀況延續了數天，咳嗽變的更嚴重，並發出“吠”的聲音，激動時會有喘鳴聲。除此之外，該護士看來無異樣，除了一直咳嗽，經X光檢查發現頸部內下聲門明顯變窄。此症狀由下列何種病毒感染所引起？","options":["A. 副流行性感冒病毒（Parainfluenza virus）","B. 流行性感冒病毒（Influenza virus）","C. 呼吸道細胞融合病毒（Respiratory syncytial virus）","D. 鼻病毒（Rhinovirus）"],"correctIndex":0,"explanation":"狗吠聲咳嗽與哮喘（Croup）<br>•\t正確答案：A. 副流行性感冒病毒（Parainfluenza virus）<br>•\t選項剖析：<br>o\tA 正確： 這是極其經典的兒科/感染科考題。患者出現發出「吠」聲的咳嗽（barking cough）、吸氣性喘鳴（stridor），且 X 光顯示頸部聲門下狹窄（Steeple sign / 尖塔徵），這是哮吼（Croup，又稱喉氣管支氣管炎）的標準表現。高達 75% 的哮吼是由副流行性感冒病毒引起的。"},{"originalId":203,"question":"一個曾經被流感病毒感染過的人，其體內最具中和性保護力的抗體，應具有辨識那一種病毒蛋白質的能力？","options":["A. 血球凝集素（hemagglutinin, HA）","B. 基質（matrix, M）蛋白","C. 核套蛋白（nucleocapsid, NP）","D. 非結構（nonstructural, NS）蛋白"],"correctIndex":0,"explanation":"流感病毒的中和抗體標的<br>•\t正確答案：A. 血球凝集素（hemagglutinin, HA）<br>•\t選項剖析：<br>o\tA 正確： 流感病毒表面的血球凝集素（HA）負責與宿主細胞表面的唾液酸受體結合，是病毒「入侵」的關鍵鑰匙。因此，人體產生對抗 HA 的抗體可以阻擋病毒結合細胞，具有最強的中和性保護力。也是目前流感疫苗最重要的抗原成分。<br>o\tB、C、D 皆為病毒的內部或非結構蛋白，針對它們的抗體無法直接中和（攔截）病毒感染。"},{"originalId":204,"question":"有關E型肝炎病毒的敘述，下列何者正確？","options":["A. 可造成慢性肝炎甚至肝癌","B. 可以RT-PCR進行偵測","C. 感染孕婦有較低的致死率","D. 病毒基因體只含有一個大的open reading frame（ORF）"],"correctIndex":1,"explanation":"E 型肝炎病毒（HEV）<br>•\t正確答案：B. 可以 RT-PCR 進行偵測<br>•\t選項剖析：<br>o\tB 正確： E 型肝炎病毒是單股 RNA 病毒，因此在急性期可以使用反轉錄聚合酶鏈鎖反應（RT-PCR）來偵測血液或糞便中的病毒 RNA。<br>o\tA 錯誤：與 A 肝相似，E 肝絕大多數為急性感染，不會造成慢性肝炎或肝癌（極少數免疫不全患者例外）。<br>o\tC 錯誤：這是 HEV 的最大特色——它感染一般人通常輕微，但感染孕婦（特別是第三孕期）會引發猛爆性肝炎，致死率高達 20%。<br>o\tD 錯誤：HEV 基因體包含 3 個開放閱讀框（ORFs），而非 1 個。"},{"originalId":205,"question":"下列何種病毒之抗體測定是目前捐血時必須檢驗的項目？","options":["A. Hepatitis A virus","B. Hepatitis C virus","C. Hepatitis E virus","D. Hepatitis D virus"],"correctIndex":1,"explanation":"捐血時必須檢驗的病毒<br>•\t正確答案：B. Hepatitis C virus（C型肝炎病毒）<br>•\t選項剖析：<br>o\tB 正確： 為了防止血液傳染病，台灣目前的血袋常規檢驗項目包含：B 肝（HBV）、C 肝（HCV）、愛滋病毒（HIV）以及人類嗜 T 淋巴球病毒（HTLV）。<br>o\tA、E 錯誤：HAV 與 HEV 主要是糞口傳染。<br>o\tD 錯誤：預防了 B 肝的傳播，就等於預防了 D 肝（因為 HDV 必須依賴 HBV）。"},{"originalId":206,"question":"下列何種病毒不會造成呼吸道感染？","options":["A. Hepatitis D virus","B. Influenza virus","C. Respiratory syncytial virus","D. Adenovirus"],"correctIndex":0,"explanation":"不會造成呼吸道感染的病毒<br>•\t正確答案：A. Hepatitis D virus（D型肝炎病毒）<br>•\t選項剖析：<br>o\tA 正確： D 型肝炎病毒是一種缺陷型病毒，專門感染肝臟細胞，透過血液和體液傳染，完全不會引起呼吸道感染。<br>o\tB、C、D 皆為常見的呼吸道病原體。"},{"originalId":207,"question":"下列有關日本腦炎病毒（Japanese encephalitis virus）與登革熱病毒（Dengue virus）特性之敘述，何者正確？","options":["A. 均可注射疫苗，預防感染","B. 被感染之宿主可再直接散播病毒","C. 均由埃及斑蚊傳播","D. 感染後均產生感冒般症狀（flu-like symptom）"],"correctIndex":3,"explanation":"日本腦炎與登革熱的共同特性<br>•\t正確答案：D. 感染後均產生感冒般症狀（flu-like symptom）<br>•\t選項剖析：<br>o\tD 正確： 兩者皆屬於黃病毒科（Flaviviridae），在被病媒蚊叮咬後的初期，病毒進入血液產生病毒血症（viremia），都會引起發燒、疲倦、肌肉痠痛等類似感冒的初期症狀。<br>o\tA 錯誤：目前主要廣泛施打的是日本腦炎疫苗；登革熱疫苗因有抗體依賴性增強（ADE）風險，施打條件受限，並非兩者皆普遍作為常規預防。<br>o\tB 錯誤：兩者皆需透過「蚊子」傳播，人類無法「直接」散播病毒給他人。<br>o\tC 錯誤：日本腦炎由三斑家蚊/環紋家蚊傳播；登革熱由埃及斑蚊/白線斑蚊傳播。"},{"originalId":208,"question":"野生小兒麻痺病毒株已近乎絕跡，陳醫師發現疑似案例，下列何種實驗方法最能夠確定其為小兒麻痺野生株或沙賓口服疫苗株？","options":["A. 紅血球凝集試驗","B. 溶菌斑實驗","C. 基因定序","D. 單株抗體中和反應"],"correctIndex":2,"explanation":"區分野生株與疫苗株<br>•\t正確答案：C. 基因定序<br>•\t選項剖析：<br>o\tC 正確： 沙賓口服疫苗（OPV）是減毒活疫苗，它與野生株的差異僅在於基因體上的少數幾個點突變。要確切區分分離出的病毒是野生株，還是疫苗株發生了「突變回復原毒力（VDPV）」，最精準且唯一能定讞的方法就是進行基因定序。"},{"originalId":209,"question":"某男大學生正在談戀愛，突然身體不適出現嚴重之虛弱無力、疲勞、發燒、咽喉炎及腺體腫脹等症狀，經醫師診斷後給予氨比西林（Ampicillin）治療後出現紅疹，血液抹片檢查觀察到非典型淋巴細胞，且血清內測得嗜異性抗體（heterophile antibody）。下列有關該疾病之敘述何者正確？","options":["A. 由EB病毒（Epstein-Barr virus）感染所引起的傳染性單核球增多症（infectious mononucleosis）","B. 由HIV病毒（Human immunodeficiency virus）感染所引起之免疫缺失症","C. 由巨細胞病毒（Cytomegalovirus）感染所引起之類單核球增多症（mononucleosis-like）","D. 由單純疱疹病毒（Herpes simplex virus）感染所引起之咽喉炎"],"correctIndex":0,"explanation":"接吻病與安比西林紅疹<br>•\t正確答案：A. 由EB病毒（Epstein-Barr virus）感染所引起的傳染性單核球增多症（infectious mononucleosis）<br>•\t選項剖析：<br>o\tA 正確： 這是醫學考試中極其經典的情境題！年輕人出現發燒、咽喉炎、淋巴結腫大，血液中有非典型淋巴球及嗜異性抗體（heterophile antibody），這就是 EB 病毒引起的傳染性單核球增多症。更具指標性的考點是：這類患者若被誤診為細菌感染而給予安比西林（Ampicillin），幾乎都會爆發全身性紅疹。"},{"originalId":210,"question":"下列何種病毒，會引起睪丸、卵巢、胰臟等腺體發炎之病症？","options":["A. 麻疹病毒","B. 呼吸道融合病毒","C. 副流行性感冒病毒","D. 腮腺炎病毒"],"correctIndex":3,"explanation":"多種腺體發炎<br>•\t正確答案：D. 腮腺炎病毒（Mumps virus）<br>•\t選項剖析：<br>o\tD 正確： 腮腺炎病毒（Mumps）高度嗜好腺體組織。除了最典型的腮腺炎（耳下腺腫大），病毒跑到其他腺體就會引起嚴重的併發症，包含：睪丸炎（成年男性感染可能導致不孕）、卵巢炎以及胰臟炎。"},{"originalId":211,"question":"下列那一項生物性危害之侵入方式，以食入途徑為主？","options":["A. 疱疹病毒（Herpes virus）","B. 流感病毒（Influenza virus）","C. 分枝桿菌（Mycobacteria）","D. 腸病毒（Enterovirus）"],"correctIndex":3,"explanation":"食入途徑（糞口傳染）為主<br>•\t正確答案：D. 腸病毒（Enterovirus）<br>•\t選項剖析：<br>o\tD 正確： 腸病毒（如小兒麻痺、克沙奇、A 肝）因為無外套膜，能抵抗胃酸及膽鹽，主要透過受污染的食物、水或手口接觸，以食入途徑（糞口傳染）侵入人體。<br>o\tA、B、C 主要是經由體液、飛沫或空氣傳播。"},{"originalId":212,"question":"下列何者與病毒造成寄主細胞之轉型（transformation）無關？","options":["A. Adenovirus E1A","B. Papillomavirus E6","C. HIV Nef","D. Simian virus 40（SV40）T antigen"],"correctIndex":2,"explanation":"與寄主細胞轉型（致癌）無關<br>•\t正確答案：C. HIV Nef<br>•\t選項剖析：<br>o\tC 正確： HIV 的 Nef 蛋白主要功能是將宿主細胞表面的 CD4 和 MHC-I 分子降解（downregulation），幫助病毒逃避免疫系統辨識，它不是致癌基因。<br>o\tA、B、D 的蛋白質（Adenovirus 的 E1A、HPV 的 E6、SV40 的 T antigen）都是惡名昭彰的病毒致癌因子，它們藉由綁架宿主的 p53 或 Rb 抑癌蛋白，促使細胞發生惡性轉型（Transformation）。"},{"originalId":213,"question":"抑制單純疱疹病毒之藥物acyclovir，其標的為何？","options":["A. 直接破壞病毒的組成，造成病毒結構解離","B. 阻止病毒從寄主細胞中釋放出來","C. 病毒胸腺激酶（thymidine kinase）","D. 抑制病毒RNA合成酶（RNA polymerase）的作用"],"correctIndex":2,"explanation":"Acyclovir 的標的<br>•\t正確答案：C. 病毒胸腺激酶（thymidine kinase）<br>•\t選項剖析：<br>o\tC 正確： Acyclovir 是一個前驅藥物，它之所以對人體細胞無毒且具備高度特異性，是因為它必須依賴疱疹病毒自己編碼的「胸腺激酶（Viral Thymidine Kinase）」來加上第一個磷酸根。雖然它最終活化後是抑制 DNA 聚合酶，但在這類藥物機制考題中，TK 是其專一性結合與活化的「首要標的」。"},{"originalId":214,"question":"下列那一種病毒感染可能引起軍隊中常發生之發燒、咳嗽、喉嚨痛、咽喉炎及頸腺炎（cervical adenitis）等病徵之疾病？","options":["A. 副流行性感冒病毒（Parainfluenza virus）","B. 單純疱疹病毒（Herpes simplex virus）","C. 人類乳突狀病毒（HPV）","D. 腺病毒（Adenovirus）"],"correctIndex":3,"explanation":"軍營中的急性呼吸道疾病 (ARD)<br>•\t正確答案：D. 腺病毒（Adenovirus）<br>•\t選項剖析：<br>o\tD 正確： 腺病毒第 4 型與第 7 型是引起新兵訓練中心、軍營等擁擠環境中爆發急性呼吸道疾病（ARD）的最主要元凶。常見症狀包括發燒、咽喉炎、嚴重咳嗽與頸部淋巴結炎。"},{"originalId":215,"question":"下列有關正黏液病毒（Orthomyxoviridae）及副黏液病毒（Paramyxoviridae）科病毒比較之敘述，何者正確？","options":["A. 兩者都會造成細胞融合（Syncytium）","B. 基因體皆有分段（segmented）","C. 兩者RNA splicing 皆發生在核內","D. 兩者皆可經由呼吸道傳染"],"correctIndex":3,"explanation":"正黏液 vs. 副黏液病毒<br>•\t正確答案：D. 兩者皆可經由呼吸道傳染<br>•\t選項剖析：<br>o\tD 正確： 兩者皆為常見的呼吸道病原，主要透過飛沫傳染。<br>o\tA 錯誤：副黏液會造成細胞融合（有 F 蛋白），正黏液（流感）不會。<br>o\tB 錯誤：只有正黏液的基因體有分段（8 段），副黏液是單一長鏈。<br>o\tC 錯誤：正黏液在「細胞核」內複製並發生 RNA splicing；副黏液完全在「細胞質」內複製。"},{"originalId":216,"question":"下列有關疱疹病毒（Herpesvirus）之敘述，何者錯誤？","options":["A. 雙股DNA病毒","B. 唇部疱疹（cold sore）主要由第一型單純疱疹病毒（HSV-1）所引起","C. 病毒感染後，病人痊癒，終生免疫，不再犯病","D. 人類疱疹病毒第八型（HHV-8）感染產生卡波西氏肉瘤（Kaposi’s sarcoma）"],"correctIndex":2,"explanation":"疱疹病毒敘述<br>•\t正確答案：C. 病毒感染後，病人痊癒，終生免疫，不再犯病<br>•\t選項剖析：<br>o\tC 錯誤： 疱疹病毒家族最聲名狼藉的特色就是「潛伏感染（Latency）」與「復發（Reactivation）」。一旦感染，病毒就會終生潛伏在神經節或淋巴球中，當免疫力低下時就會跑出來作亂，絕對不會「不再犯病」。"},{"originalId":217,"question":"某國小一年級女童來自農村，家中飼養雞、鴨及豬等動物，於八月多雨之酷暑下突然開始發燒、嘔吐、頭痛，此外還抽筋、意識不清、手部震顫，角弓反張，最後該病人牙關緊閉、四肢僵硬，並呈現昏迷之現象。該患者可能被何種病原菌所感染？","options":["A. 登革病毒（Dengue virus）","B. 禽流感病毒（Influenza virus）","C. 日本腦炎病毒（Japanese encephalitis virus）","D. C型肝炎病毒（HCV）"],"correctIndex":2,"explanation":"夏季、農村、腦炎<br>•\t正確答案：C. 日本腦炎病毒（Japanese encephalitis virus）<br>•\t選項剖析：<br>o\tC 正確： 這題給滿了所有關鍵字！夏季（多雨酷暑）、農村/豬隻（增幅宿主）、高燒抽筋、角弓反張、腦炎/昏迷。這是由三斑家蚊傳播的日本腦炎病毒最典型的流行病學與臨床寫照。"},{"originalId":218,"question":"下列何種病毒，其核酸為雙鏈負股RNA，經由糞口途徑傳染，發病初期出現如感冒樣症狀，發燒、嘔吐、咳嗽、流鼻水，1至2天後會造成腸黏膜發炎、絨毛萎縮，這時候會出現水瀉，有如蛋花湯般的水便？","options":["A. 輪狀病毒（Rotavirus）","B. 腸病毒71型（EV71）","C. 鼻病毒（Rhinovirus）","D. 小兒麻痺病毒（Poliovirus）"],"correctIndex":0,"explanation":"雙股 RNA 與蛋花湯般水瀉<br>•\t正確答案：A. 輪狀病毒（Rotavirus）<br>•\t選項剖析：<br>o\tA 正確： 兒童嚴重腸胃炎的首要元凶。兩個最重要的考試線索：第一，它是極少數的「雙股 RNA」病毒（呼腸孤病毒科）；第二，它破壞腸道絨毛，引發嚴重滲透性腹瀉（蛋花湯樣水便）。"},{"originalId":219,"question":"濾過性病毒利用細胞表面的分子當作進入接受體來選擇可感染的細胞。HIV用CD4當作主要接受體，CXCR4和CCR5當作共同接受體。所以HIV主要感染下列那一種細胞？","options":["A. 細胞毒殺性T細胞","B. 輔助性T細胞","C. 活化的B細胞","D. 自然殺手（NK）細胞"],"correctIndex":1,"explanation":"HIV 的主要感染目標<br>•\t正確答案：B. 輔助性T細胞<br>•\t選項剖析：<br>o\tB 正確： HIV 利用其表面的 gp120 專一性結合人體細胞表面的 CD4 分子。人體中表現 CD4 分子最豐富的就是輔助性 T 細胞（Helper T cells）。這也是為何愛滋病患的 CD4 T 細胞計數會隨病程嚴重下降。"},{"originalId":220,"question":"王醫師為婦科疾病的權威醫師，他的門診病患中感染何型人類乳突病毒（HPV），會導致罹患子宮 頸癌風險大幅提高？","options":["A. Type 9","B. Type 6","C. Type 18","D. Type 11"],"correctIndex":2,"explanation":"高風險型子宮頸癌 HPV<br>•\t正確答案：C. Type 18<br>•\t選項剖析：<br>o\tC 正確： 人類乳突病毒（HPV）中，第 16 型與第 18 型是最著名的「高致癌風險型」，與 70% 以上的子宮頸癌直接相關。<br>o\tB、D 錯誤：第 6 型與第 11 型為「低風險型」，主要引起良性的生殖器疣（菜花）。"},{"originalId":221,"question":"器官移植後的病人出現肺炎併發症，應首先懷疑下列何種病毒感染是導致肺炎併發症的原因？","options":["A. 單純疱疹病毒（herpes simplex virus）","B. EB病毒（Epstein-Barr virus）","C. 腺病毒（adenovirus）","D. 巨細胞病毒（cytomegalovirus）"],"correctIndex":3,"explanation":"器官移植後的肺炎併發症<br>•\t正確答案：D. 巨細胞病毒（cytomegalovirus, CMV）<br>•\t選項剖析：<br>o\tD 正確： 這是移植醫學的鐵律。對於接受器官移植或骨髓移植而大量使用免疫抑制劑的患者，CMV（巨細胞病毒）是最常見、也最致命的伺機性感染病毒，極易引發 CMV 肺炎與視網膜炎。"},{"originalId":222,"question":"下列有關呼吸道細胞融合病毒（Respiratory syncytial virus）之敘述，何者正確？","options":["A. 屬於正黏液病毒（Orthomyxovirus）","B. 侵入呼吸道後會引起支氣管上皮細胞壞死、黏液分泌、發炎細胞浸潤、黏膜下層水腫","C. 感染後可終身免疫","D. 核酸為正股RNA"],"correctIndex":1,"explanation":"呼吸道細胞融合病毒 (RSV)<br>•\t正確答案：B. 侵入呼吸道後會引起支氣管上皮細胞壞死、黏液分泌、發炎細胞浸潤、黏膜下層水腫<br>•\t選項剖析：<br>o\tB 正確： 這是 RSV 引起嬰幼兒急性細支氣管炎（Bronchiolitis）的標準病理變化，會導致氣道阻塞與喘息。<br>o\tA 錯誤：屬於副黏液病毒（Paramyxoviridae）。<br>o\tC 錯誤：RSV 感染後抗體保護力短暫，一生中會反覆感染，無法終身免疫。<br>o\tD 錯誤：核酸為負股（Negative-sense）單股 RNA。"},{"originalId":223,"question":"在B型肝炎病毒造成急性感染之患者身上，下列何種抗體最早出現？","options":["A. Anti-HBc","B. Anti-PreS","C. Anti-HBs","D. Anti-HBe"],"correctIndex":0,"explanation":"急性 B 肝最早出現的抗體<br>•\t正確答案：A. Anti-HBc<br>•\t選項剖析：<br>o\tA 正確： 在 B 型肝炎病毒的血清學變化中，當表面抗原（HBsAg）出現後不久，免疫系統最先產生反應的抗體是核心抗體（Anti-HBc，特別是 IgM 型）。它是急性期與空窗期最重要的診斷指標。Anti-HBs 則要等到患者痊癒後的最後階段才會出現。"},{"originalId":224,"question":"下列那一種症狀不是由克沙奇A型病毒（Coxsackie A virus）所引起的？","options":["A. 疱疹性咽峽炎（herpangina）","B. 心臟炎（carditis）","C. 胸膜痛（pleurodynia）","D. 腦膜炎（meningitis）"],"correctIndex":0,"explanation":"克沙奇 A 型病毒的症狀區別<br>•\t正確答案：（考題常列 B 或 C，最標準排除的是 B. 心臟炎 與 C. 胸膜痛）<br>•\t選項剖析：<br>o\t醫學記憶口訣中，Coxsackie A 主攻「表面」（皮膚黏膜：如疱疹性咽峽炎 Herpangina、手足口病）；Coxsackie B 主攻「內部」（心肌/肌肉：如胸膜痛 Pleurodynia / Bornholm disease、心臟炎 Carditis）。<br>o\t兩者皆可引起無菌性腦膜炎（D）。<br>o\t此題為典型的鑑別題型，若單選，通常胸膜痛（流行性肌痛）與心臟炎都明確被歸類為克沙奇 B 型的招牌症狀，而並非 A 型所引起。(註：依據歷屆考選部公佈之答案，B 或 C 皆有可能為官方正確選項，實務上兩者皆主要為 B 型病毒引起)。"},{"originalId":225,"question":"Amantadine及Rimantadine藥物常被用來治療流行性感冒病毒A型，其抑制病毒入侵之機轉為何？","options":["A. 阻止病毒之入侵及解體（uncoating）","B. 阻止病毒在宿主內合成DNA","C. 阻止病毒在宿主內合成RNA","D. 阻止病毒在宿主內合成蛋白質"],"correctIndex":0,"explanation":"Amantadine 的抑制機轉<br>•\t正確答案：A. 阻止病毒之入侵及解體（uncoating）<br>•\t選項剖析：<br>o\tA 正確： Amantadine 與 Rimantadine 專門用來對付 A 型流感病毒。它們會堵住病毒套膜上的 M2 離子通道，阻止氫離子（H+）進入病毒內部。這會導致病毒的核蛋白無法與基質解離，從而成功阻止病毒的脫殼（Uncoating）過程。"},{"originalId":226,"question":"為了預防流行性感冒病毒感染，建議老人及兒童每年施打流感疫苗。需要每年施打的正確理由為何？","options":["A. 疫苗依據前一年流行的病毒株設計，無法涵蓋新出現的突變病毒","B. 疫苗為單一病毒株，無法涵蓋引起感染的病毒","C. 疫苗無多醣成分，引起長期免疫記憶的能力差","D. 疫苗為活病毒，在身上存活的時間短"],"correctIndex":0,"explanation":"每年施打流感疫苗的理由<br>•\t正確答案：A. 疫苗依據前一年流行的病毒株設計，無法涵蓋新出現的突變病毒<br>•\t選項剖析：<br>o\tA 正確： 流感病毒的 RNA 聚合酶容易出錯，導致表面的 HA 與 NA 基因不斷累積微小的突變，這稱為「抗原飄移（Antigenic drift）」。這使得去年產生的抗體無法有效辨識今年的變異株，因此 WHO 必須每年重新預測並更新疫苗株。"},{"originalId":227,"question":"一位患有尋常天疱瘡（Pemphigus vulgaris）的孕婦，剛剛平安產下3000公克的小男嬰，但是隨即發現小男嬰身上及四肢分布有紅斑，有些紅斑上有小水疱，因此迅速被送入新生兒加護病房治療。他的病因為何？","options":["A. 母親的自體免疫疾病之抗體，抗desmoglein 3抗體（anti-desmoglein 3 antibody）通過胎盤，暫時引起之病徵","B. 母親的自體免疫疾病之抗體，抗dsDNA抗體（anti-dsDNA antibody）通過胎盤，引起之胎兒皮膚系統之自體免疫病","C. 母親治療自體免疫疾病的用藥，在他身上引起不良反應","D. 母親的自體免疫疾病之遺傳，而且他一出生即發病"],"correctIndex":0,"explanation":"孕婦天疱瘡與新生兒症狀<br>•\t正確答案：A. 母親的自體免疫疾病之抗體，抗desmoglein 3抗體（anti-desmoglein 3 antibody）通過胎盤，暫時引起之病徵<br>•\t選項剖析：<br>o\tA 正確： 尋常天疱瘡（Pemphigus vulgaris）是一種第二型自體免疫過敏反應，由抗 desmoglein 1/3 的 IgG 抗體引起。因為 IgG 是唯一能穿透胎盤的抗體，母親體內的致病抗體會進入胎兒血液，破壞胎兒皮膚的橋粒連接，導致嬰兒出生時帶有水疱。這屬於被動轉移的暫時性病徵，幾週後等抗體代謝掉，嬰兒就會自行痊癒。"}];

    let quizData = [];
    let currentQ = 0, score = 0, selectedOpt = null, wrongRecords = [];

    function startQuiz() {
        quizData = isRandom ? [...originalData].sort(() => Math.random() - 0.5) : [...originalData];
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('quiz-screen').classList.add('active');
        loadQuestion();
    }

    function loadQuestion() {
        const q = quizData[currentQ];
        document.getElementById('progress-text').innerText = `進度：${currentQ + 1} / ${quizData.length}`;
        document.getElementById('original-q-num').innerText = `原始題號：${q.originalId}`;
        document.getElementById('question-text').innerText = q.question;
        
        const optsList = document.getElementById('options-list');
        optsList.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const li = document.createElement('li');
            li.innerText = opt;
            li.onclick = () => {
                selectedOpt = idx;
                document.querySelectorAll('.options li').forEach(el => el.classList.remove('selected'));
                li.classList.add('selected');
            };
            optsList.appendChild(li);
        });
        
        selectedOpt = null;
        document.getElementById('explanation-box').style.display = 'none';
        document.getElementById('explanation-box').className = 'explanation-box';
        document.getElementById('submit-btn').style.display = 'block';
    }

    function checkAnswer() {
        if(selectedOpt === null) return alert("請選擇答案！");
        const q = quizData[currentQ];
        const box = document.getElementById('explanation-box');
        
        if(selectedOpt === q.correctIndex) {
            score++;
            document.getElementById('result-title').innerHTML = "<span style='color:var(--success)'>✅ 答對了！</span>";
            box.classList.add('correct-border');
        } else {
            document.getElementById('result-title').innerHTML = `<span style='color:var(--danger)'>❌ 答錯了！正解：${q.options[q.correctIndex].substring(0,2)}</span>`;
            box.classList.add('wrong-border');
            wrongRecords.push(q);
        }
        
        document.getElementById('explanation-text').innerHTML = q.explanation;
        box.style.display = 'block';
        document.getElementById('submit-btn').style.display = 'none';
        
        const lis = document.querySelectorAll('.options li');
        lis[q.correctIndex].style.backgroundColor = '#d1fae5';
        if(selectedOpt !== q.correctIndex) lis[selectedOpt].style.backgroundColor = '#fee2e2';
    }

    function nextQuestion() {
        currentQ++;
        if(currentQ < quizData.length) loadQuestion();
        else showResult();
    }

    function pauseQuiz() {
        document.getElementById('quiz-screen').classList.remove('active');
        document.getElementById('pause-screen').classList.add('active');
        document.getElementById('pause-progress').innerText = `目前進度：${currentQ} / ${quizData.length} 題 | 目前得分：${score} 分`;
        
        const list = document.getElementById('current-wrong-list');
        if(wrongRecords.length === 0) {
            list.innerHTML = "<h3 style='text-align:center;color:var(--success)'>太棒了！目前還沒有任何錯題喔！🎉</h3>";
        } else {
            list.innerHTML = "<h3 style='color:var(--danger)'>📓 目前累積錯題</h3>";
            wrongRecords.forEach(q => {
                list.innerHTML += `<div class="wrong-item">
                    <h4>[第 ${q.originalId} 題]</h4>
                    <p>${q.question}</p>
                    <p style="color:var(--success)">正解：${q.options[q.correctIndex]}</p>
                    <p><strong>解析：</strong><br>${q.explanation}</p>
                </div>`;
            });
        }
    }

    function resumeQuiz() {
        document.getElementById('pause-screen').classList.remove('active');
        document.getElementById('quiz-screen').classList.add('active');
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        document.getElementById('final-score').innerText = `最終得分：${score} / ${quizData.length}`;
        
        const list = document.getElementById('wrong-answers-list');
        if(wrongRecords.length === 0) {
            list.innerHTML = "<h3 style='text-align:center;color:var(--success)'>太完美了！無錯題！</h3>";
        } else {
            list.innerHTML = "<h3 style='color:var(--danger)'>錯題本</h3>";
            wrongRecords.forEach(q => {
                list.innerHTML += `<div class="wrong-item">
                    <h4>[第 ${q.originalId} 題]</h4>
                    <p>${q.question}</p>
                    <p style="color:var(--success)">正解：${q.options[q.correctIndex]}</p>
                    <p><strong>解析：</strong><br>${q.explanation}</p>
                </div>`;
            });
        }
    }
</script>
